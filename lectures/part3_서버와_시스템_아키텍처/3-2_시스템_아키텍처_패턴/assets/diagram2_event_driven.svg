<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="520" fill="#fcfcfb"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">동기 호출 vs 이벤트 기반 통신</text>

  <defs>
    <marker id="arrowE" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Sync section -->
  <text x="60" y="80" font-size="15" font-weight="700" fill="#0b0b0b">동기 방식 (REST 직접 호출)</text>

  <rect x="60" y="100" width="180" height="60" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="150" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">주문 서비스</text>

  <line x1="240" y1="130" x2="360" y2="130" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowE)"/>
  <text x="300" y="118" text-anchor="middle" font-size="11" fill="#52514e">호출 후 응답 대기</text>

  <rect x="360" y="100" width="180" height="60" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="450" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">결제 서비스</text>

  <line x1="540" y1="130" x2="660" y2="130" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowE)"/>
  <text x="600" y="118" text-anchor="middle" font-size="11" fill="#52514e">호출 후 응답 대기</text>

  <rect x="660" y="100" width="180" height="60" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
  <text x="750" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">알림 서비스</text>

  <rect x="60" y="185" width="780" height="46" rx="8" fill="#e34948" fill-opacity="0.10" stroke="#e34948" stroke-width="2"/>
  <text x="450" y="213" text-anchor="middle" font-size="12.5" fill="#0b0b0b">체인 중 한 서비스라도 느려지거나 장애가 나면, 그 앞 단계 전체가 함께 블로킹됩니다</text>

  <!-- Event-driven section -->
  <text x="60" y="285" font-size="15" font-weight="700" fill="#0b0b0b">비동기 방식 (이벤트 기반)</text>

  <rect x="60" y="310" width="180" height="60" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="150" y="345" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">주문 서비스</text>

  <line x1="240" y1="340" x2="400" y2="340" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowE)"/>
  <text x="320" y="328" text-anchor="middle" font-size="11" fill="#52514e">이벤트 발행 후 즉시 종료</text>

  <rect x="400" y="310" width="200" height="60" rx="10" fill="#898781" fill-opacity="0.10" stroke="#898781" stroke-width="2.5"/>
  <text x="500" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">메시지 브로커</text>
  <text x="500" y="355" text-anchor="middle" font-size="11" fill="#52514e">(Kafka, RabbitMQ 등)</text>

  <line x1="600" y1="330" x2="700" y2="300" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowE)"/>
  <rect x="700" y="270" width="180" height="60" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="790" y="305" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">결제 서비스</text>
  <text x="790" y="255" text-anchor="middle" font-size="11" fill="#52514e">구독 (subscribe)</text>

  <line x1="600" y1="350" x2="700" y2="390" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowE)"/>
  <rect x="700" y="392" width="180" height="60" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
  <text x="790" y="427" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">알림 서비스</text>
  <text x="790" y="415" text-anchor="middle" font-size="11" fill="#52514e">구독 (subscribe)</text>

  <rect x="60" y="470" width="780" height="40" rx="8" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2"/>
  <text x="450" y="495" text-anchor="middle" font-size="12.5" fill="#0b0b0b">발행자는 구독자가 몇 개인지, 살아있는지조차 몰라도 됩니다 (결합도 낮음)</text>
</svg>
