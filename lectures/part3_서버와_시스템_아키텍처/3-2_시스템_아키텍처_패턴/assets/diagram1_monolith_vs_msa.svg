<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1100" height="600" fill="#fcfcfb"/>
  <text x="550" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">모놀리식 vs 마이크로서비스 — 배포 단위와 데이터 소유권</text>

  <line x1="550" y1="60" x2="550" y2="560" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- LEFT: Monolithic -->
  <text x="270" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">모놀리식 아키텍처</text>
  <rect x="60" y="96" width="420" height="290" rx="10" fill="#2a78d6" fill-opacity="0.08" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="270" y="118" text-anchor="middle" font-size="12" fill="#52514e">하나의 프로세스 · 하나의 배포 단위</text>

  <rect x="80" y="134" width="180" height="46" rx="8" fill="#fcfcfb" stroke="#898781" stroke-width="1.5"/>
  <text x="170" y="162" text-anchor="middle" font-size="13" fill="#0b0b0b">주문 모듈</text>
  <rect x="280" y="134" width="180" height="46" rx="8" fill="#fcfcfb" stroke="#898781" stroke-width="1.5"/>
  <text x="370" y="162" text-anchor="middle" font-size="13" fill="#0b0b0b">결제 모듈</text>

  <rect x="80" y="190" width="180" height="46" rx="8" fill="#fcfcfb" stroke="#898781" stroke-width="1.5"/>
  <text x="170" y="218" text-anchor="middle" font-size="13" fill="#0b0b0b">재고 모듈</text>
  <rect x="280" y="190" width="180" height="46" rx="8" fill="#fcfcfb" stroke="#898781" stroke-width="1.5"/>
  <text x="370" y="218" text-anchor="middle" font-size="13" fill="#0b0b0b">배송 모듈</text>

  <rect x="80" y="246" width="380" height="46" rx="8" fill="#fcfcfb" stroke="#898781" stroke-width="1.5"/>
  <text x="270" y="274" text-anchor="middle" font-size="13" fill="#0b0b0b">회원 모듈</text>

  <line x1="270" y1="292" x2="270" y2="320" stroke="#898781" stroke-width="2"/>
  <rect x="140" y="322" width="260" height="50" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
  <text x="270" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">단일 데이터베이스</text>

  <rect x="60" y="400" width="420" height="46" rx="8" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="270" y="428" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">배포 단위: 1개 — 전체를 한 번에 빌드·배포</text>

  <!-- RIGHT: Microservices -->
  <text x="830" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">마이크로서비스 아키텍처</text>

  <rect x="740" y="96" width="180" height="46" rx="10" fill="#898781" fill-opacity="0.10" stroke="#898781" stroke-width="2"/>
  <text x="830" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">API 게이트웨이</text>

  <!-- 5 services -->
  <g>
    <line x1="800" y1="142" x2="650" y2="180" stroke="#898781" stroke-width="1.5"/>
    <rect x="595" y="182" width="110" height="42" rx="8" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2"/>
    <text x="650" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">주문 서비스</text>
    <rect x="595" y="234" width="110" height="34" rx="6" fill="#2a78d6" fill-opacity="0.08" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="650" y="256" text-anchor="middle" font-size="11" fill="#52514e">DB</text>
  </g>
  <g>
    <line x1="815" y1="142" x2="770" y2="180" stroke="#898781" stroke-width="1.5"/>
    <rect x="715" y="182" width="110" height="42" rx="8" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2"/>
    <text x="770" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">결제 서비스</text>
    <rect x="715" y="234" width="110" height="34" rx="6" fill="#1baf7a" fill-opacity="0.08" stroke="#1baf7a" stroke-width="1.5"/>
    <text x="770" y="256" text-anchor="middle" font-size="11" fill="#52514e">DB</text>
  </g>
  <g>
    <line x1="830" y1="142" x2="890" y2="180" stroke="#898781" stroke-width="1.5"/>
    <rect x="835" y="182" width="110" height="42" rx="8" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2"/>
    <text x="890" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">재고 서비스</text>
    <rect x="835" y="234" width="110" height="34" rx="6" fill="#eda100" fill-opacity="0.10" stroke="#eda100" stroke-width="1.5"/>
    <text x="890" y="256" text-anchor="middle" font-size="11" fill="#52514e">DB</text>
  </g>
  <g>
    <line x1="850" y1="142" x2="1010" y2="180" stroke="#898781" stroke-width="1.5"/>
    <rect x="955" y="182" width="110" height="42" rx="8" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2"/>
    <text x="1010" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">배송 서비스</text>
    <rect x="955" y="234" width="110" height="34" rx="6" fill="#008300" fill-opacity="0.08" stroke="#008300" stroke-width="1.5"/>
    <text x="1010" y="256" text-anchor="middle" font-size="11" fill="#52514e">DB</text>
  </g>
  <g>
    <line x1="860" y1="142" x2="770" y2="300" stroke="#898781" stroke-width="1.5"/>
    <rect x="715" y="302" width="110" height="42" rx="8" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2"/>
    <text x="770" y="328" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">회원 서비스</text>
    <rect x="715" y="354" width="110" height="34" rx="6" fill="#4a3aa7" fill-opacity="0.08" stroke="#4a3aa7" stroke-width="1.5"/>
    <text x="770" y="376" text-anchor="middle" font-size="11" fill="#52514e">DB</text>
  </g>

  <rect x="600" y="400" width="460" height="46" rx="8" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="830" y="428" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">배포 단위: 서비스 개수만큼 — 각자 독립 배포</text>
</svg>
