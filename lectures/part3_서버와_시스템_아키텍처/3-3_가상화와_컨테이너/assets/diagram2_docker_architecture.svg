<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="480" fill="#fcfcfb"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">Docker 아키텍처</text>

  <defs>
    <marker id="arrowD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="50" y="170" width="160" height="70" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="130" y="202" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Docker Client</text>
  <text x="130" y="222" text-anchor="middle" font-size="11" fill="#52514e">CLI 명령 입력</text>

  <line x1="210" y1="205" x2="300" y2="205" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowD)"/>
  <text x="255" y="193" text-anchor="middle" font-size="11" fill="#52514e">build / run / pull</text>

  <!-- Daemon (big box) -->
  <rect x="300" y="100" width="380" height="280" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="490" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">Docker Daemon (dockerd)</text>

  <rect x="330" y="150" width="150" height="90" rx="8" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2"/>
  <text x="405" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">이미지 (Image)</text>
  <text x="405" y="205" text-anchor="middle" font-size="10.5" fill="#52514e">읽기 전용 계층</text>
  <text x="405" y="221" text-anchor="middle" font-size="10.5" fill="#52514e">(Dockerfile로 생성)</text>

  <line x1="405" y1="240" x2="405" y2="270" stroke="#898781" stroke-width="2" marker-end="url(#arrowD)"/>
  <text x="470" y="258" text-anchor="middle" font-size="10.5" fill="#52514e">docker run</text>

  <rect x="330" y="272" width="150" height="90" rx="8" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2"/>
  <text x="405" y="307" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">컨테이너</text>
  <text x="405" y="327" text-anchor="middle" font-size="10.5" fill="#52514e">이미지 + 쓰기 계층</text>
  <text x="405" y="343" text-anchor="middle" font-size="10.5" fill="#52514e">실행 중인 프로세스</text>

  <rect x="500" y="150" width="150" height="212" rx="8" fill="#898781" fill-opacity="0.06" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="575" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">네트워크 · 볼륨</text>
  <text x="575" y="205" text-anchor="middle" font-size="10.5" fill="#52514e">컨테이너 간 통신,</text>
  <text x="575" y="221" text-anchor="middle" font-size="10.5" fill="#52514e">데이터 영속화 관리</text>

  <!-- Registry -->
  <line x1="680" y1="240" x2="770" y2="240" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowD)"/>
  <line x1="770" y1="260" x2="680" y2="260" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowD)"/>
  <text x="725" y="228" text-anchor="middle" font-size="11" fill="#52514e">pull</text>
  <text x="725" y="278" text-anchor="middle" font-size="11" fill="#52514e">push</text>

  <rect x="770" y="170" width="180" height="140" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
  <text x="860" y="235" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">레지스트리</text>
  <text x="860" y="255" text-anchor="middle" font-size="11" fill="#52514e">(Docker Hub 등)</text>
  <text x="860" y="273" text-anchor="middle" font-size="11" fill="#52514e">이미지 저장소</text>

  <rect x="300" y="400" width="380" height="50" rx="8" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="490" y="430" text-anchor="middle" font-size="12" fill="#0b0b0b">같은 이미지로 컨테이너를 여러 개 실행해도 이미지 계층은 공유됩니다</text>
</svg>
