<svg xmlns="http://www.w3.org/2000/svg" width="920" height="660" viewBox="0 0 920 660" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="920" height="660" fill="#fcfcfb"/>
  <text x="460" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">OSI 7계층과 TCP/IP 4계층의 대응</text>
  <text x="460" y="56" text-anchor="middle" font-size="12" fill="#52514e">HTTP 요청은 응용 계층에서 시작해 링크 계층까지 내려가며 헤더가 하나씩 추가된다</text>

  <text x="190" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#52514e">OSI 7계층</text>
  <text x="700" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#52514e">TCP/IP 4계층 (PDU)</text>

  <!-- OSI boxes (left column) -->
  <g>
    <rect x="60" y="94" width="260" height="70" rx="10" fill="#898781" fill-opacity="0.08" stroke="#898781" stroke-width="2"/>
    <text x="190" y="134" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">응용 (Application)</text>
  </g>
  <g>
    <rect x="60" y="172" width="260" height="70" rx="10" fill="#898781" fill-opacity="0.08" stroke="#898781" stroke-width="2"/>
    <text x="190" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">표현 (Presentation)</text>
  </g>
  <g>
    <rect x="60" y="250" width="260" height="70" rx="10" fill="#898781" fill-opacity="0.08" stroke="#898781" stroke-width="2"/>
    <text x="190" y="290" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">세션 (Session)</text>
  </g>
  <g>
    <rect x="60" y="328" width="260" height="70" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="190" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">전송 (Transport)</text>
  </g>
  <g>
    <rect x="60" y="406" width="260" height="70" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="190" y="446" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">네트워크 (Network)</text>
  </g>
  <g>
    <rect x="60" y="484" width="260" height="70" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="190" y="524" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">데이터 링크 (Data Link)</text>
  </g>
  <g>
    <rect x="60" y="562" width="260" height="70" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="190" y="602" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">물리 (Physical)</text>
  </g>

  <!-- connecting lines -->
  <line x1="320" y1="129" x2="580" y2="129" stroke="#898781" stroke-width="2"/>
  <line x1="320" y1="207" x2="580" y2="207" stroke="#898781" stroke-width="2"/>
  <line x1="320" y1="285" x2="580" y2="285" stroke="#898781" stroke-width="2"/>
  <line x1="320" y1="363" x2="580" y2="363" stroke="#898781" stroke-width="2"/>
  <line x1="320" y1="441" x2="580" y2="441" stroke="#898781" stroke-width="2"/>
  <line x1="320" y1="519" x2="580" y2="519" stroke="#898781" stroke-width="2"/>
  <line x1="320" y1="597" x2="580" y2="597" stroke="#898781" stroke-width="2"/>

  <!-- TCP/IP boxes (right column) -->
  <g>
    <rect x="580" y="94" width="280" height="226" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="720" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">응용 계층 (Application)</text>
    <text x="720" y="152" text-anchor="middle" font-size="12" fill="#52514e">HTTP, DNS 등 사용자 프로토콜</text>
    <text x="720" y="300" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">PDU: 메시지 (Message)</text>
  </g>
  <g>
    <rect x="580" y="328" width="280" height="70" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="720" y="358" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">전송 계층 (Transport)</text>
    <text x="720" y="380" text-anchor="middle" font-size="12" fill="#52514e">PDU: 세그먼트 (Segment) · TCP/UDP</text>
  </g>
  <g>
    <rect x="580" y="406" width="280" height="70" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="720" y="436" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">인터넷 계층 (Internet)</text>
    <text x="720" y="458" text-anchor="middle" font-size="12" fill="#52514e">PDU: 패킷 (Packet) · IP</text>
  </g>
  <g>
    <rect x="580" y="484" width="280" height="148" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="720" y="514" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">링크 계층 (Link)</text>
    <text x="720" y="536" text-anchor="middle" font-size="12" fill="#52514e">이더넷, Wi-Fi</text>
    <text x="720" y="610" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">PDU: 프레임 (Frame)</text>
  </g>
</svg>
