<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="660" viewBox="0 0 1000 660" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="660" fill="#fcfcfb"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">클라우드 서비스 모델별 책임 분리</text>
  <text x="500" y="56" text-anchor="middle" font-size="12" fill="#52514e">오른쪽으로 갈수록 고객이 직접 관리하는 범위가 줄어든다</text>

  <!-- legend -->
  <rect x="330" y="70" width="18" height="18" rx="4" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/>
  <text x="354" y="84" font-size="12.5" fill="#0b0b0b">고객이 관리</text>
  <rect x="470" y="70" width="18" height="18" rx="4" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
  <text x="494" y="84" font-size="12.5" fill="#0b0b0b">제공자가 관리</text>

  <!-- column headers -->
  <text x="280" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">온프레미스</text>
  <text x="470" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">IaaS</text>
  <text x="660" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">PaaS</text>
  <text x="850" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">SaaS</text>

  <!-- row labels -->
  <text x="175" y="164" text-anchor="end" font-size="12.5" fill="#0b0b0b">애플리케이션</text>
  <text x="175" y="212" text-anchor="end" font-size="12.5" fill="#0b0b0b">데이터</text>
  <text x="175" y="260" text-anchor="end" font-size="12.5" fill="#0b0b0b">런타임</text>
  <text x="175" y="308" text-anchor="end" font-size="12.5" fill="#0b0b0b">미들웨어</text>
  <text x="175" y="356" text-anchor="end" font-size="12.5" fill="#0b0b0b">운영체제</text>
  <text x="175" y="404" text-anchor="end" font-size="12.5" fill="#0b0b0b">가상화</text>
  <text x="175" y="452" text-anchor="end" font-size="12.5" fill="#0b0b0b">서버(컴퓨트)</text>
  <text x="175" y="500" text-anchor="end" font-size="12.5" fill="#0b0b0b">스토리지</text>
  <text x="175" y="548" text-anchor="end" font-size="12.5" fill="#0b0b0b">네트워킹</text>

  <!-- grid: column x starts, width 180 -->
  <!-- On-Premise: all customer-managed (blue) -->
  <g>
    <rect x="190" y="140" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="188" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="236" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="284" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="332" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="380" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="428" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="476" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="190" y="524" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
  </g>

  <!-- IaaS: rows 1-5 blue (app,data,runtime,middleware,os), rows 6-9 grey -->
  <g>
    <rect x="380" y="140" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="380" y="188" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="380" y="236" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="380" y="284" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="380" y="332" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="380" y="380" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="380" y="428" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="380" y="476" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="380" y="524" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
  </g>

  <!-- PaaS: rows 1-2 blue (app, data), rows 3-9 grey -->
  <g>
    <rect x="570" y="140" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="570" y="188" width="180" height="44" rx="8" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
    <rect x="570" y="236" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="570" y="284" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="570" y="332" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="570" y="380" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="570" y="428" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="570" y="476" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="570" y="524" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
  </g>

  <!-- SaaS: all grey -->
  <g>
    <rect x="760" y="140" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="188" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="236" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="284" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="332" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="380" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="428" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="476" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
    <rect x="760" y="524" width="180" height="44" rx="8" fill="#898781" fill-opacity="0.14" stroke="#898781" stroke-width="2"/>
  </g>

  <rect x="150" y="588" width="800" height="52" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="550" y="610" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">경계는 "고객이 어디까지 직접 관리하는가"로 그어진다</text>
  <text x="550" y="628" text-anchor="middle" font-size="12" fill="#52514e">IaaS는 OS부터, PaaS는 코드·데이터만, SaaS는 데이터·설정만 고객이 관리한다</text>
</svg>
