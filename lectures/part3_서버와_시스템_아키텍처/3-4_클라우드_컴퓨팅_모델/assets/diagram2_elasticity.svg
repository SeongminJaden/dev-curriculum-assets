<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="900" height="540" fill="#fcfcfb"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">온프레미스 vs 클라우드 오토스케일링</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#52514e">세일 당일, 실제 트래픽 수요 곡선에 용량이 얼마나 가깝게 따라가는가</text>

  <!-- legend -->
  <line x1="120" y1="80" x2="150" y2="80" stroke="#898781" stroke-width="2.5" stroke-dasharray="5 4"/>
  <text x="158" y="84" font-size="12" fill="#0b0b0b">실제 트래픽(수요)</text>
  <line x1="330" y1="80" x2="360" y2="80" stroke="#e34948" stroke-width="2.5"/>
  <text x="368" y="84" font-size="12" fill="#0b0b0b">온프레미스 고정 용량</text>
  <line x1="560" y1="80" x2="590" y2="80" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="598" y="84" font-size="12" fill="#0b0b0b">클라우드 오토스케일링 용량</text>

  <!-- axes -->
  <line x1="80" y1="420" x2="840" y2="420" stroke="#898781" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="80" y2="420" stroke="#898781" stroke-width="1.5"/>
  <text x="30" y="270" text-anchor="middle" font-size="12" fill="#52514e" transform="rotate(-90 30 270)">부하 / 용량</text>
  <text x="460" y="452" text-anchor="middle" font-size="12" fill="#52514e">시간 (세일 당일 00:00 ~ 24:00)</text>

  <text x="80" y="440" text-anchor="middle" font-size="11" fill="#52514e">평소</text>
  <text x="460" y="440" text-anchor="middle" font-size="11" fill="#52514e">세일 시작 · 피크</text>
  <text x="840" y="440" text-anchor="middle" font-size="11" fill="#52514e">심야</text>

  <!-- waste regions (left, right) -->
  <polygon points="80,285 80,375 156,375 232,360 308,345 384,330 403,285" fill="#898781" fill-opacity="0.10"/>
  <polygon points="703,285 764,345 840,360 840,285" fill="#898781" fill-opacity="0.10"/>

  <!-- outage region -->
  <polygon points="403,285 460,150 536,120 612,165 703,285" fill="#e34948" fill-opacity="0.14"/>

  <!-- on-premise fixed capacity line -->
  <line x1="80" y1="285" x2="840" y2="285" stroke="#e34948" stroke-width="2.5"/>

  <!-- demand curve (dashed grey) -->
  <polyline points="80,375 156,375 232,360 308,345 384,330 460,150 536,120 612,165 688,270 764,345 840,360"
    fill="none" stroke="#898781" stroke-width="2.5" stroke-dasharray="6 4"/>

  <!-- cloud elastic capacity (aqua) -->
  <polyline points="80,360 156,360 232,345 308,330 384,315 460,135 536,105 612,150 688,255 764,330 840,345"
    fill="none" stroke="#1baf7a" stroke-width="2.5"/>

  <text x="530" y="108" text-anchor="middle" font-size="11.5" font-weight="700" fill="#e34948">장애 구간 (용량 초과)</text>
  <text x="160" y="395" text-anchor="middle" font-size="11.5" font-weight="700" fill="#52514e">유휴 자원 낭비</text>
  <text x="770" y="395" text-anchor="middle" font-size="11.5" font-weight="700" fill="#52514e">유휴 자원 낭비</text>

  <rect x="140" y="470" width="620" height="50" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="450" y="500" text-anchor="middle" font-size="12.5" fill="#0b0b0b">고정 용량은 장애와 낭비를 동시에 만들지만, 오토스케일링은 수요를 따라간다</text>
</svg>
