<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1040" height="560" fill="#fcfcfb"/>
  <text x="520" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">분리형(Discrete) GPU 구조 vs 통합 메모리 구조(UMA)</text>
  <text x="520" y="56" text-anchor="middle" font-size="13" fill="#52514e">데이터가 물리적으로 이동해야 하는가, 제자리에서 공유되는가</text>

  <defs>
    <marker id="arrow43a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
    <marker id="arrow43a2" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M10,0 L0,5 L10,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- LEFT: Discrete GPU -->
  <rect x="30" y="86" width="470" height="42" rx="10" fill="#2a78d6"/>
  <text x="265" y="113" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">분리형(Discrete) GPU 구조</text>

  <rect x="60" y="150" width="170" height="70" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="145" y="192" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">CPU</text>

  <rect x="290" y="150" width="170" height="70" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="375" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">시스템 RAM</text>
  <text x="375" y="203" text-anchor="middle" font-size="10.5" fill="#52514e">CPU 전용 메모리</text>

  <line x1="230" y1="185" x2="290" y2="185" stroke="#898781" stroke-width="2" marker-end="url(#arrow43a)" marker-start="url(#arrow43a2)"/>

  <rect x="60" y="330" width="170" height="70" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="145" y="372" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">GPU</text>

  <rect x="290" y="330" width="170" height="70" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="375" y="365" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">VRAM</text>
  <text x="375" y="383" text-anchor="middle" font-size="10.5" fill="#52514e">GPU 전용 메모리(GDDR/HBM)</text>

  <line x1="230" y1="365" x2="290" y2="365" stroke="#898781" stroke-width="2" marker-end="url(#arrow43a)" marker-start="url(#arrow43a2)"/>

  <!-- PCIe copy path -->
  <line x1="375" y1="220" x2="375" y2="330" stroke="#e34948" stroke-width="3.5" marker-end="url(#arrow43a)" marker-start="url(#arrow43a2)"/>
  <text x="392" y="270" font-size="12" font-weight="700" fill="#e34948">PCIe 버스</text>
  <text x="392" y="286" font-size="12" font-weight="700" fill="#e34948">데이터 복사 필요</text>

  <rect x="60" y="440" width="400" height="70" rx="10" fill="#898781" fill-opacity="0.06" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="80" y="464" font-size="12" fill="#0b0b0b" font-weight="700">GPU를 쓰려면 RAM → VRAM으로 복사하고,</text>
  <text x="80" y="482" font-size="12" fill="#0b0b0b" font-weight="700">계산 후 다시 VRAM → RAM으로 복사해야 한다.</text>
  <text x="80" y="500" font-size="11" fill="#52514e">복사 = 지연시간 + 동기화 비용 + 전력 소모</text>

  <!-- RIGHT: UMA -->
  <rect x="540" y="86" width="470" height="42" rx="10" fill="#1baf7a"/>
  <text x="775" y="113" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">통합 메모리 구조 (UMA)</text>

  <rect x="560" y="150" width="430" height="290" rx="14" fill="#1baf7a" fill-opacity="0.05" stroke="#1baf7a" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="775" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#1baf7a">SoC 패키지 경계</text>

  <rect x="590" y="190" width="160" height="70" rx="10" fill="#1baf7a" fill-opacity="0.14" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="670" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">CPU</text>

  <rect x="810" y="190" width="160" height="70" rx="10" fill="#1baf7a" fill-opacity="0.14" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="890" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">GPU</text>

  <rect x="620" y="350" width="310" height="60" rx="10" fill="#1baf7a" fill-opacity="0.22" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="775" y="376" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">공유 메모리 풀 (LPDDR)</text>
  <text x="775" y="394" text-anchor="middle" font-size="10.5" fill="#52514e">CPU · GPU가 같은 주소 공간을 직접 참조</text>

  <line x1="670" y1="260" x2="700" y2="350" stroke="#898781" stroke-width="2.5" marker-end="url(#arrow43a)" marker-start="url(#arrow43a2)"/>
  <line x1="890" y1="260" x2="850" y2="350" stroke="#898781" stroke-width="2.5" marker-end="url(#arrow43a)" marker-start="url(#arrow43a2)"/>
  <text x="775" y="300" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1baf7a">복사 없음 — 포인터만 전달</text>

  <rect x="560" y="460" width="430" height="70" rx="10" fill="#898781" fill-opacity="0.06" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="580" y="484" font-size="12" fill="#0b0b0b" font-weight="700">CPU가 쓴 데이터를 GPU가 그 자리에서 바로 읽는다.</text>
  <text x="580" y="502" font-size="12" fill="#0b0b0b" font-weight="700">데이터 이동 자체가 설계에서 제거되어 있다.</text>
  <text x="580" y="520" font-size="11" fill="#52514e">Apple Silicon, NVIDIA Jetson 등이 이 구조를 사용</text>
</svg>
