<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="520" viewBox="0 0 1000 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="520" fill="#fcfcfb"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">로봇의 실시간 인지-제어 루프와 UMA</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#52514e">센서 → 연산 → 구동 루프가 하나의 공유 메모리 위에서 돈다</text>

  <defs>
    <marker id="arrow43b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- 4 stage boxes -->
  <rect x="100" y="100" width="220" height="80" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="210" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">1. 카메라 센서</text>
  <text x="210" y="152" text-anchor="middle" font-size="11" fill="#52514e">프레임 촬영</text>

  <rect x="680" y="100" width="220" height="80" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="790" y="132" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">2. CPU 전처리</text>
  <text x="790" y="152" text-anchor="middle" font-size="11" fill="#52514e">왜곡 보정 · 크기 조정</text>

  <rect x="680" y="330" width="220" height="80" rx="10" fill="#eda100" fill-opacity="0.16" stroke="#eda100" stroke-width="2.5"/>
  <text x="790" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">3. GPU/NPU 추론</text>
  <text x="790" y="382" text-anchor="middle" font-size="11" fill="#52514e">물체 인식 · 장애물 회피</text>

  <rect x="100" y="330" width="220" height="80" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
  <text x="210" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">4. 제어 신호 → 모터</text>
  <text x="210" y="382" text-anchor="middle" font-size="11" fill="#52514e">구동 명령 전송</text>

  <!-- loop arrows -->
  <line x1="320" y1="140" x2="680" y2="140" stroke="#898781" stroke-width="2.5" marker-end="url(#arrow43b)"/>
  <line x1="790" y1="180" x2="790" y2="330" stroke="#898781" stroke-width="2.5" marker-end="url(#arrow43b)"/>
  <line x1="680" y1="370" x2="320" y2="370" stroke="#898781" stroke-width="2.5" marker-end="url(#arrow43b)"/>
  <line x1="210" y1="330" x2="210" y2="180" stroke="#898781" stroke-width="2.5" marker-end="url(#arrow43b)"/>

  <!-- center shared memory box -->
  <rect x="390" y="215" width="220" height="80" rx="12" fill="#4a3aa7" fill-opacity="0.14" stroke="#4a3aa7" stroke-width="2.5"/>
  <text x="500" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">공유 메모리 풀</text>
  <text x="500" y="268" text-anchor="middle" font-size="11" fill="#52514e">(UMA — 복사 없이 직접 접근)</text>

  <!-- dashed connectors from center to each stage -->
  <line x1="420" y1="215" x2="300" y2="180" stroke="#4a3aa7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="610" y1="215" x2="720" y2="180" stroke="#4a3aa7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="610" y1="295" x2="720" y2="330" stroke="#4a3aa7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="420" y1="295" x2="300" y2="330" stroke="#4a3aa7" stroke-width="1.5" stroke-dasharray="4 3"/>

  <rect x="100" y="440" width="800" height="60" rx="10" fill="#898781" fill-opacity="0.06" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="500" y="464" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">네 단계가 모두 같은 메모리 주소를 직접 참조하므로,</text>
  <text x="500" y="482" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">프레임마다 복사가 필요한 분리형 구조보다 지연시간과 전력이 줄어든다.</text>
</svg>
