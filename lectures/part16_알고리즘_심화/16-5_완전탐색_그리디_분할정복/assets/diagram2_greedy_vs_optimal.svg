<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="440" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">그리디가 성공하는 경우와 실패하는 경우</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 "매 순간 최선" 전략이 문제의 구조에 따라 최적이 되기도, 되지 못하기도 합니다</text>

  <!-- LEFT: success -->
  <rect x="40" y="80" width="500" height="330" rx="12" fill="#1baf7a" fill-opacity="0.08" stroke="#1baf7a" stroke-width="2"/>
  <text x="290" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#1baf7a">회의실 배정 — 그리디 = 최적 ✔</text>
  <text x="290" y="130" text-anchor="middle" font-size="12" fill="#52514e">"가장 빨리 끝나는 회의부터 고르기"</text>
  <!-- timeline -->
  <line x1="80" y1="180" x2="500" y2="180" stroke="#0b0b0b" stroke-width="1.5"/>
  <!-- meeting bars -->
  <rect x="90" y="160" width="110" height="18" rx="4" fill="#1baf7a"/><text x="145" y="174" text-anchor="middle" font-size="11" fill="#ffffff">회의 A</text>
  <rect x="210" y="160" width="130" height="18" rx="4" fill="#1baf7a"/><text x="275" y="174" text-anchor="middle" font-size="11" fill="#ffffff">회의 C</text>
  <rect x="360" y="160" width="120" height="18" rx="4" fill="#1baf7a"/><text x="420" y="174" text-anchor="middle" font-size="11" fill="#ffffff">회의 E</text>
  <!-- rejected overlapping (gray, dashed) -->
  <rect x="130" y="205" width="150" height="16" rx="4" fill="#b8b7b3" fill-opacity="0.5" stroke="#b8b7b3" stroke-dasharray="4 3"/><text x="205" y="217" text-anchor="middle" font-size="10.5" fill="#52514e">B(겹침·제외)</text>
  <rect x="300" y="205" width="140" height="16" rx="4" fill="#b8b7b3" fill-opacity="0.5" stroke="#b8b7b3" stroke-dasharray="4 3"/><text x="370" y="217" text-anchor="middle" font-size="10.5" fill="#52514e">D(겹침·제외)</text>
  <text x="290" y="265" text-anchor="middle" font-size="12.5" fill="#0b0b0b">그리디 경로  =  최적 경로</text>
  <text x="290" y="290" text-anchor="middle" font-size="11.5" fill="#52514e">탐욕 선택 속성 + 최적 부분 구조가</text>
  <text x="290" y="307" text-anchor="middle" font-size="11.5" fill="#52514e">모두 성립 → 되돌릴 필요가 없음</text>
  <rect x="120" y="335" width="340" height="50" rx="8" fill="#ffffff" stroke="#1baf7a" stroke-width="1.5"/>
  <text x="290" y="357" text-anchor="middle" font-size="12" font-weight="700" fill="#1baf7a">결과: 최대 3개 회의 배정 (최적과 일치)</text>
  <text x="290" y="375" text-anchor="middle" font-size="11" fill="#52514e">매 선택이 항상 최적 경로 위에 있음</text>

  <!-- RIGHT: failure -->
  <rect x="580" y="80" width="500" height="330" rx="12" fill="#dc2626" fill-opacity="0.07" stroke="#dc2626" stroke-width="2"/>
  <text x="830" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">거스름돈 (동전 1,3,4) — 그리디 ≠ 최적 ✘</text>
  <text x="830" y="130" text-anchor="middle" font-size="12" fill="#52514e">6원 만들기: "가장 큰 동전부터 고르기"</text>
  <!-- greedy path -->
  <text x="640" y="168" font-size="12.5" font-weight="700" fill="#dc2626">그리디:</text>
  <g font-size="12.5" fill="#0b0b0b">
    <rect x="710" y="153" width="60" height="24" rx="6" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626"/><text x="740" y="170" text-anchor="middle">4원</text>
    <text x="785" y="170" fill="#dc2626">→</text>
    <rect x="800" y="153" width="60" height="24" rx="6" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626"/><text x="830" y="170" text-anchor="middle">1원</text>
    <text x="875" y="170" fill="#dc2626">→</text>
    <rect x="890" y="153" width="60" height="24" rx="6" fill="#dc2626" fill-opacity="0.15" stroke="#dc2626"/><text x="920" y="170" text-anchor="middle">1원</text>
  </g>
  <text x="965" y="170" font-size="12.5" font-weight="700" fill="#dc2626">= 3개</text>
  <!-- optimal path -->
  <text x="640" y="220" font-size="12.5" font-weight="700" fill="#1baf7a">최적:</text>
  <g font-size="12.5" fill="#0b0b0b">
    <rect x="710" y="205" width="60" height="24" rx="6" fill="#1baf7a" fill-opacity="0.15" stroke="#1baf7a"/><text x="740" y="222" text-anchor="middle">3원</text>
    <text x="785" y="222" fill="#1baf7a">→</text>
    <rect x="800" y="205" width="60" height="24" rx="6" fill="#1baf7a" fill-opacity="0.15" stroke="#1baf7a"/><text x="830" y="222" text-anchor="middle">3원</text>
  </g>
  <text x="885" y="222" font-size="12.5" font-weight="700" fill="#1baf7a">= 2개</text>

  <text x="830" y="280" text-anchor="middle" font-size="12" fill="#0b0b0b">첫 선택(4원)에서 최적 경로와 갈라진 뒤</text>
  <text x="830" y="298" text-anchor="middle" font-size="12" fill="#0b0b0b">다시는 돌아오지 못함</text>
  <rect x="660" y="330" width="340" height="55" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
  <text x="830" y="352" text-anchor="middle" font-size="11.5" fill="#52514e">되돌릴 수 있게 만들면 → 백트래킹</text>
  <text x="830" y="372" text-anchor="middle" font-size="11.5" fill="#52514e">모든 선택지를 기억하면 → 동적 계획법(DP)</text>
</svg>
