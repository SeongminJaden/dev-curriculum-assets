<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="500" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">퀵 정렬 — 피벗 선택이 Θ(n log n)과 Θ(n²)을 가른다</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 알고리즘이라도 분할이 균형을 이루는지에 따라 재귀 깊이가 log n과 n으로 갈립니다</text>

  <text x="285" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#1baf7a">이상적 — 피벗이 중앙값 근처</text>
  <text x="835" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#dc2626">최악 — 정렬된 배열 + 첫 원소 피벗</text>

  <line x1="560" y1="80" x2="560" y2="430" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="6 4"/>

  <g stroke="#1baf7a" stroke-width="2.5" fill="#1baf7a" fill-opacity="0.10">
    <rect x="105" y="110" width="360" height="30" rx="8"/>
    <rect x="105" y="160" width="172" height="30" rx="8"/>
    <rect x="293" y="160" width="172" height="30" rx="8"/>
    <rect x="105" y="210" width="78" height="30" rx="8"/>
    <rect x="199" y="210" width="78" height="30" rx="8"/>
    <rect x="293" y="210" width="78" height="30" rx="8"/>
    <rect x="387" y="210" width="78" height="30" rx="8"/>
  </g>
  <g font-size="12.5" fill="#0b0b0b" text-anchor="middle">
    <text x="285" y="130" font-weight="700">n</text>
    <text x="191" y="180">n/2</text>
    <text x="379" y="180">n/2</text>
    <text x="144" y="230" font-size="11.5">n/4</text>
    <text x="238" y="230" font-size="11.5">n/4</text>
    <text x="332" y="230" font-size="11.5">n/4</text>
    <text x="426" y="230" font-size="11.5">n/4</text>
  </g>
  <text x="285" y="264" text-anchor="middle" font-size="12.5" fill="#52514e">… 층마다 총 비용 Θ(n), 층수 log₂n …</text>
  <text x="285" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#1baf7a">전체 Θ(n log n), 재귀 깊이 log n</text>

  <g stroke="#dc2626" stroke-width="2.5" fill="#dc2626" fill-opacity="0.10">
    <rect x="655" y="110" width="360" height="30" rx="8"/>
    <rect x="655" y="160" width="16" height="30" rx="6"/>
    <rect x="687" y="160" width="328" height="30" rx="8"/>
    <rect x="687" y="210" width="16" height="30" rx="6"/>
    <rect x="719" y="210" width="296" height="30" rx="8"/>
    <rect x="719" y="260" width="16" height="30" rx="6"/>
    <rect x="751" y="260" width="264" height="30" rx="8"/>
  </g>
  <g font-size="12.5" fill="#0b0b0b" text-anchor="middle">
    <text x="835" y="130" font-weight="700">n</text>
    <text x="851" y="180">n−1</text>
    <text x="867" y="230">n−2</text>
    <text x="883" y="280">n−3</text>
  </g>
  <text x="663" y="152" text-anchor="middle" font-size="10.5" fill="#dc2626">∅</text>
  <text x="835" y="314" text-anchor="middle" font-size="12.5" fill="#52514e">피벗이 항상 최솟값이라 한쪽이 비어버립니다</text>
  <text x="835" y="340" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">n+(n−1)+…+1 = Θ(n²), 재귀 깊이 n</text>

  <rect x="40" y="368" width="1040" height="112" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="60" y="394" font-size="14" font-weight="700" fill="#0b0b0b">최악을 막는 세 가지 실무 기법</text>
  <text x="60" y="420" font-size="12.5" fill="#0b0b0b">① 무작위 피벗 — 특정 입력이 최악을 유발할 수 없게 만듭니다. 확률적 보장이며 최악 자체는 남습니다.</text>
  <text x="60" y="442" font-size="12.5" fill="#0b0b0b">② 중앙값 3 선택 — 첫·중간·끝 세 값의 중앙값을 피벗으로. 정렬된 입력에 특히 효과적입니다.</text>
  <text x="60" y="464" font-size="12.5" fill="#0b0b0b">③ 깊이 제한 후 전환 — 깊이가 2·log₂n을 넘으면 힙 정렬로 갈아탑니다. 이것이 C++ std::sort의 introsort입니다.</text>
</svg>
