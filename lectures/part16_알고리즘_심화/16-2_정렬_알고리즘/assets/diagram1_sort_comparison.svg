<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="520" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">정렬 알고리즘 7종 — 복잡도 · 안정성 · 제자리 여부</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">우월한 정렬은 없습니다. 각자 다른 제약을 대가로 다른 성능을 삽니다</text>

  <g font-size="12.5" font-weight="700" fill="#52514e">
    <text x="130" y="98" text-anchor="middle">알고리즘</text>
    <text x="330" y="98" text-anchor="middle">평균 시간</text>
    <text x="490" y="98" text-anchor="middle">최악 시간</text>
    <text x="640" y="98" text-anchor="middle">보조 공간</text>
    <text x="760" y="98" text-anchor="middle">안정</text>
    <text x="860" y="98" text-anchor="middle">제자리</text>
    <text x="990" y="98" text-anchor="middle">핵심 성질</text>
  </g>
  <line x1="40" y1="108" x2="1080" y2="108" stroke="#c3c2b7" stroke-width="1.5"/>

  <rect x="40" y="118" width="1040" height="102" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
  <g font-size="12.5" fill="#0b0b0b">
    <text x="130" y="146" text-anchor="middle" font-weight="700">버블 정렬</text>
    <text x="330" y="146" text-anchor="middle">Θ(n²)</text>
    <text x="490" y="146" text-anchor="middle">Θ(n²)</text>
    <text x="640" y="146" text-anchor="middle">Θ(1)</text>
    <text x="760" y="146" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="860" y="146" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="990" y="146" text-anchor="middle" font-size="11.5" fill="#52514e">조기 종료 시 최선 Θ(n)</text>

    <text x="130" y="176" text-anchor="middle" font-weight="700">선택 정렬</text>
    <text x="330" y="176" text-anchor="middle">Θ(n²)</text>
    <text x="490" y="176" text-anchor="middle">Θ(n²)</text>
    <text x="640" y="176" text-anchor="middle">Θ(1)</text>
    <text x="760" y="176" text-anchor="middle" fill="#dc2626" font-weight="700">X</text>
    <text x="860" y="176" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="990" y="176" text-anchor="middle" font-size="11.5" fill="#52514e">교환은 정확히 n−1번뿐</text>

    <text x="130" y="206" text-anchor="middle" font-weight="700">삽입 정렬</text>
    <text x="330" y="206" text-anchor="middle">Θ(n²)</text>
    <text x="490" y="206" text-anchor="middle">Θ(n²)</text>
    <text x="640" y="206" text-anchor="middle">Θ(1)</text>
    <text x="760" y="206" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="860" y="206" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="990" y="206" text-anchor="middle" font-size="11.5" fill="#52514e">적응적. 작은 입력에 최강</text>
  </g>

  <rect x="40" y="232" width="1040" height="102" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <g font-size="12.5" fill="#0b0b0b">
    <text x="130" y="260" text-anchor="middle" font-weight="700">병합 정렬</text>
    <text x="330" y="260" text-anchor="middle">Θ(n log n)</text>
    <text x="490" y="260" text-anchor="middle">Θ(n log n)</text>
    <text x="640" y="260" text-anchor="middle">Θ(n)</text>
    <text x="760" y="260" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="860" y="260" text-anchor="middle" fill="#dc2626" font-weight="700">X</text>
    <text x="990" y="260" text-anchor="middle" font-size="11.5" fill="#52514e">최악 보장 + 외부 정렬</text>

    <text x="130" y="290" text-anchor="middle" font-weight="700">퀵 정렬</text>
    <text x="330" y="290" text-anchor="middle">Θ(n log n)</text>
    <text x="490" y="290" text-anchor="middle" fill="#dc2626" font-weight="700">Θ(n²)</text>
    <text x="640" y="290" text-anchor="middle">Θ(log n)</text>
    <text x="760" y="290" text-anchor="middle" fill="#dc2626" font-weight="700">X</text>
    <text x="860" y="290" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="990" y="290" text-anchor="middle" font-size="11.5" fill="#52514e">상수 계수가 가장 작음</text>

    <text x="130" y="320" text-anchor="middle" font-weight="700">힙 정렬</text>
    <text x="330" y="320" text-anchor="middle">Θ(n log n)</text>
    <text x="490" y="320" text-anchor="middle">Θ(n log n)</text>
    <text x="640" y="320" text-anchor="middle">Θ(1)</text>
    <text x="760" y="320" text-anchor="middle" fill="#dc2626" font-weight="700">X</text>
    <text x="860" y="320" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="990" y="320" text-anchor="middle" font-size="11.5" fill="#52514e">캐시 지역성이 나쁨</text>
  </g>

  <rect x="40" y="346" width="1040" height="46" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <g font-size="12.5" fill="#0b0b0b">
    <text x="130" y="374" text-anchor="middle" font-weight="700">계수 정렬</text>
    <text x="330" y="374" text-anchor="middle">Θ(n + k)</text>
    <text x="490" y="374" text-anchor="middle">Θ(n + k)</text>
    <text x="640" y="374" text-anchor="middle">Θ(n + k)</text>
    <text x="760" y="374" text-anchor="middle" fill="#1baf7a" font-weight="700">O</text>
    <text x="860" y="374" text-anchor="middle" fill="#dc2626" font-weight="700">X</text>
    <text x="990" y="374" text-anchor="middle" font-size="11.5" fill="#52514e">비교를 하지 않음. k 제약</text>
  </g>

  <rect x="40" y="410" width="500" height="94" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="60" y="436" font-size="13.5" font-weight="700" fill="#0b0b0b">안정 정렬이란?</text>
  <text x="60" y="458" font-size="11.5" fill="#52514e">키가 같은 원소들의 원래 상대 순서가 보존되는 정렬.</text>
  <text x="60" y="476" font-size="11.5" fill="#52514e">우선순위가 낮은 키부터 차례로 정렬하면</text>
  <text x="60" y="494" font-size="11.5" fill="#52514e">다중 키 정렬이 자동으로 완성됩니다.</text>

  <rect x="580" y="410" width="500" height="94" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <text x="600" y="436" font-size="13.5" font-weight="700" fill="#0b0b0b">제자리 정렬이란?</text>
  <text x="600" y="458" font-size="11.5" fill="#52514e">입력 배열 외에 O(1) 보조 공간만 쓰는 정렬.</text>
  <text x="600" y="476" font-size="11.5" fill="#52514e">메모리가 빠듯한 환경에서는 병합 정렬의</text>
  <text x="600" y="494" font-size="11.5" fill="#52514e">Θ(n) 보조 배열이 그대로 제약이 됩니다.</text>
</svg>
