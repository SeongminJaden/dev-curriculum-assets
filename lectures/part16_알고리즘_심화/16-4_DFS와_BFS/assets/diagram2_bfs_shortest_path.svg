<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="470" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">BFS가 최단 경로를 보장하는 이유 — 층을 소진하고 넘어간다</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">큐 안의 거리 값은 항상 d와 d+1 두 종류뿐이며 앞쪽이 d인 비내림차순입니다</text>

  <defs>
    <marker id="ar4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
  </defs>

  <rect x="60" y="86" width="150" height="200" rx="10" fill="#2a78d6" fill-opacity="0.08" stroke="#2a78d6" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="240" y="86" width="230" height="200" rx="10" fill="#1baf7a" fill-opacity="0.08" stroke="#1baf7a" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="500" y="86" width="270" height="200" rx="10" fill="#d97706" fill-opacity="0.08" stroke="#d97706" stroke-width="2" stroke-dasharray="6 4"/>
  <rect x="800" y="86" width="260" height="200" rx="10" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 4"/>

  <text x="135" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#2a78d6">거리 0</text>
  <text x="355" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#1baf7a">거리 1</text>
  <text x="635" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">거리 2</text>
  <text x="930" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#8b5cf6">거리 3</text>

  <g stroke="#898781" stroke-width="2" marker-end="url(#ar4)">
    <line x1="158" y1="186" x2="292" y2="160"/>
    <line x1="158" y1="186" x2="292" y2="230"/>
    <line x1="378" y1="160" x2="552" y2="145"/>
    <line x1="378" y1="160" x2="552" y2="205"/>
    <line x1="378" y1="230" x2="552" y2="255"/>
    <line x1="418" y1="230" x2="552" y2="205"/>
    <line x1="678" y1="145" x2="852" y2="160"/>
    <line x1="678" y1="255" x2="852" y2="230"/>
  </g>

  <g stroke-width="2.5">
    <circle cx="135" cy="186" r="23" fill="#2a78d6" fill-opacity="0.20" stroke="#2a78d6"/>
    <circle cx="355" cy="160" r="23" fill="#1baf7a" fill-opacity="0.20" stroke="#1baf7a"/>
    <circle cx="355" cy="230" r="23" fill="#1baf7a" fill-opacity="0.20" stroke="#1baf7a"/>
    <circle cx="575" cy="140" r="23" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
    <circle cx="575" cy="205" r="23" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
    <circle cx="575" cy="262" r="23" fill="#d97706" fill-opacity="0.20" stroke="#d97706"/>
    <circle cx="875" cy="160" r="23" fill="#8b5cf6" fill-opacity="0.20" stroke="#8b5cf6"/>
    <circle cx="875" cy="228" r="23" fill="#8b5cf6" fill-opacity="0.20" stroke="#8b5cf6"/>
  </g>
  <g font-size="13" font-weight="700" fill="#0b0b0b" text-anchor="middle">
    <text x="135" y="191">S</text>
    <text x="355" y="165">A</text><text x="355" y="235">B</text>
    <text x="575" y="145">C</text><text x="575" y="210">D</text><text x="575" y="267">E</text>
    <text x="875" y="165">F</text><text x="875" y="233">G</text>
  </g>

  <rect x="60" y="306" width="1000" height="52" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="80" y="330" font-size="13" font-weight="700" fill="#0b0b0b">큐의 변화 —  [S] → [A B] → [B C D] → [C D E] → [D E] → [E F] → [F G] → [G] → []</text>
  <text x="80" y="350" font-size="11.5" fill="#52514e">어느 시점에도 큐 안에는 거리가 최대 두 종류뿐이고, 앞쪽이 항상 작습니다. 이것이 BFS 큐 불변식입니다.</text>

  <rect x="60" y="376" width="1000" height="76" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
  <text x="80" y="402" font-size="13.5" font-weight="700" fill="#0b0b0b">증명의 요지 (그리고 깨지는 조건)</text>
  <text x="80" y="424" font-size="12.5" fill="#0b0b0b">정점 u가 처음 발견되어 dist[u]=d로 기록될 때, 거리 d 미만인 정점은 이미 전부 처리가 끝났습니다.</text>
  <text x="80" y="444" font-size="12.5" fill="#0b0b0b">더 짧은 경로가 있었다면 그 경로의 직전 정점을 처리할 때 u를 이미 발견했어야 하므로 모순입니다. — 단, 간선 가중치가 모두 같을 때만.</text>
</svg>
