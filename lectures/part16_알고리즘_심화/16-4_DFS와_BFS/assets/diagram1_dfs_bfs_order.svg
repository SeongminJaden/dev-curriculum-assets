<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="500" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">DFS와 BFS — 같은 그래프, 같은 시작점, 다른 순서</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">코드 차이는 후보 통에서 무엇을 먼저 꺼내느냐(스택 vs 큐) 한 줄뿐입니다</text>

  <text x="285" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#8b5cf6">DFS — 스택(LIFO), 세로로 파고듦</text>
  <text x="835" y="94" text-anchor="middle" font-size="15" font-weight="700" fill="#2a78d6">BFS — 큐(FIFO), 가로로 층층이</text>
  <line x1="560" y1="80" x2="560" y2="400" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="6 4"/>

  <g stroke="#898781" stroke-width="2">
    <line x1="285" y1="140" x2="185" y2="205"/>
    <line x1="285" y1="140" x2="385" y2="205"/>
    <line x1="185" y1="205" x2="125" y2="270"/>
    <line x1="185" y1="205" x2="245" y2="270"/>
    <line x1="385" y1="205" x2="325" y2="270"/>
    <line x1="385" y1="205" x2="445" y2="270"/>
    <line x1="125" y1="270" x2="125" y2="335"/>
  </g>
  <g stroke="#898781" stroke-width="2">
    <line x1="835" y1="140" x2="735" y2="205"/>
    <line x1="835" y1="140" x2="935" y2="205"/>
    <line x1="735" y1="205" x2="675" y2="270"/>
    <line x1="735" y1="205" x2="795" y2="270"/>
    <line x1="935" y1="205" x2="875" y2="270"/>
    <line x1="935" y1="205" x2="995" y2="270"/>
    <line x1="675" y1="270" x2="675" y2="335"/>
  </g>

  <g fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="2.5">
    <circle cx="285" cy="140" r="21"/><circle cx="185" cy="205" r="21"/><circle cx="385" cy="205" r="21"/>
    <circle cx="125" cy="270" r="21"/><circle cx="245" cy="270" r="21"/>
    <circle cx="325" cy="270" r="21"/><circle cx="445" cy="270" r="21"/><circle cx="125" cy="335" r="21"/>
  </g>
  <g font-size="13" font-weight="700" fill="#0b0b0b" text-anchor="middle">
    <text x="285" y="145">1</text><text x="185" y="210">2</text><text x="385" y="210">6</text>
    <text x="125" y="275">3</text><text x="245" y="275">5</text>
    <text x="325" y="275">7</text><text x="445" y="275">8</text><text x="125" y="340">4</text>
  </g>

  <g fill="#2a78d6" fill-opacity="0.15" stroke="#2a78d6" stroke-width="2.5">
    <circle cx="835" cy="140" r="21"/><circle cx="735" cy="205" r="21"/><circle cx="935" cy="205" r="21"/>
    <circle cx="675" cy="270" r="21"/><circle cx="795" cy="270" r="21"/>
    <circle cx="875" cy="270" r="21"/><circle cx="995" cy="270" r="21"/><circle cx="675" cy="335" r="21"/>
  </g>
  <g font-size="13" font-weight="700" fill="#0b0b0b" text-anchor="middle">
    <text x="835" y="145">1</text><text x="735" y="210">2</text><text x="935" y="210">3</text>
    <text x="675" y="275">4</text><text x="795" y="275">5</text>
    <text x="875" y="275">6</text><text x="995" y="275">7</text><text x="675" y="340">8</text>
  </g>

  <g stroke="#2a78d6" stroke-width="1.5" stroke-dasharray="5 4" fill="none">
    <rect x="620" y="182" width="430" height="46" rx="10"/>
    <rect x="620" y="247" width="430" height="46" rx="10"/>
  </g>
  <text x="1062" y="210" text-anchor="end" font-size="11" fill="#2a78d6" font-weight="700">거리 1</text>
  <text x="1062" y="275" text-anchor="end" font-size="11" fill="#2a78d6" font-weight="700">거리 2</text>

  <text x="285" y="376" text-anchor="middle" font-size="12.5" fill="#52514e">방문 순서가 세로로 이어집니다</text>
  <text x="835" y="376" text-anchor="middle" font-size="12.5" fill="#52514e">방문 순서가 가로로 층을 이룹니다</text>

  <rect x="40" y="400" width="500" height="82" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="60" y="426" font-size="13.5" font-weight="700" fill="#0b0b0b">DFS가 잘하는 일</text>
  <text x="60" y="448" font-size="12" fill="#52514e">모든 경로 열거, 백트래킹, 방향 그래프 사이클 탐지,</text>
  <text x="60" y="468" font-size="12" fill="#52514e">위상 정렬(후위 처리). 메모리는 깊이만큼만 씁니다.</text>

  <rect x="580" y="400" width="500" height="82" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="600" y="426" font-size="13.5" font-weight="700" fill="#0b0b0b">BFS가 잘하는 일</text>
  <text x="600" y="448" font-size="12" fill="#52514e">무가중치 최단 경로, 최소 이동 횟수, 층별 거리 계산.</text>
  <text x="600" y="468" font-size="12" fill="#52514e">대신 한 층 전체를 큐에 담아야 합니다.</text>
</svg>
