<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="470" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">중복 부분 문제 — 피보나치 재귀 트리와 메모이제이션</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 부분 문제를 반복해 푸는 것이 지수 시간의 원인, 저장이 곧 해법입니다</text>

  <!-- LEFT: recursion tree of F(5) -->
  <rect x="30" y="80" width="620" height="370" rx="12" fill="#dc2626" fill-opacity="0.06" stroke="#dc2626" stroke-width="2"/>
  <text x="340" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">순수 재귀 — F(3)이 2번, F(2)가 3번 중복 계산 → O(2ⁿ)</text>

  <g stroke="#b8b7b3" stroke-width="2">
    <line x1="340" y1="140" x2="200" y2="200"/>
    <line x1="340" y1="140" x2="480" y2="200"/>
    <line x1="200" y1="200" x2="120" y2="270"/>
    <line x1="200" y1="200" x2="280" y2="270"/>
    <line x1="480" y1="200" x2="410" y2="270"/>
    <line x1="480" y1="200" x2="560" y2="270"/>
    <line x1="120" y1="270" x2="80" y2="340"/>
    <line x1="120" y1="270" x2="160" y2="340"/>
    <line x1="410" y1="270" x2="370" y2="340"/>
    <line x1="410" y1="270" x2="450" y2="340"/>
  </g>
  <g font-size="13" font-weight="700">
    <circle cx="340" cy="140" r="22" fill="#2a78d6"/><text x="340" y="145" text-anchor="middle" fill="#ffffff">F(5)</text>
    <circle cx="200" cy="200" r="20" fill="#d97706"/><text x="200" y="205" text-anchor="middle" fill="#ffffff">F(4)</text>
    <circle cx="480" cy="200" r="20" fill="#dc2626"/><text x="480" y="205" text-anchor="middle" fill="#ffffff">F(3)</text>
    <circle cx="120" cy="270" r="20" fill="#dc2626"/><text x="120" y="275" text-anchor="middle" fill="#ffffff">F(3)</text>
    <circle cx="280" cy="270" r="18" fill="#8b5cf6"/><text x="280" y="275" text-anchor="middle" fill="#ffffff">F(2)</text>
    <circle cx="410" cy="270" r="18" fill="#8b5cf6"/><text x="410" y="275" text-anchor="middle" fill="#ffffff">F(2)</text>
    <circle cx="560" cy="270" r="16" fill="#9a9893"/><text x="560" y="275" text-anchor="middle" font-size="11" fill="#ffffff">F(1)</text>
    <circle cx="80" cy="340" r="18" fill="#8b5cf6"/><text x="80" y="345" text-anchor="middle" fill="#ffffff">F(2)</text>
    <circle cx="160" cy="340" r="16" fill="#9a9893"/><text x="160" y="345" text-anchor="middle" font-size="11" fill="#ffffff">F(1)</text>
    <circle cx="370" cy="340" r="16" fill="#9a9893"/><text x="370" y="345" text-anchor="middle" font-size="11" fill="#ffffff">F(1)</text>
    <circle cx="450" cy="340" r="16" fill="#9a9893"/><text x="450" y="345" text-anchor="middle" font-size="11" fill="#ffffff">F(0)</text>
  </g>
  <text x="340" y="400" text-anchor="middle" font-size="12" fill="#0b0b0b">빨강 F(3)·보라 F(2)가 서로 다른 가지에서 반복 등장</text>
  <text x="340" y="422" text-anchor="middle" font-size="11.5" fill="#52514e">n이 커지면 이 중복이 지수적으로 폭발</text>

  <!-- RIGHT: memoized table -->
  <rect x="680" y="80" width="410" height="370" rx="12" fill="#1baf7a" fill-opacity="0.07" stroke="#1baf7a" stroke-width="2"/>
  <text x="885" y="106" text-anchor="middle" font-size="14" font-weight="700" fill="#1baf7a">메모이제이션 — 각 값을 한 번만 계산 → O(n)</text>

  <g font-size="14" font-weight="700">
    <rect x="730" y="140" width="70" height="46" rx="6" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="765" y="169" text-anchor="middle" fill="#0b0b0b">0</text>
    <rect x="810" y="140" width="70" height="46" rx="6" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="845" y="169" text-anchor="middle" fill="#0b0b0b">1</text>
    <rect x="890" y="140" width="70" height="46" rx="6" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="925" y="169" text-anchor="middle" fill="#0b0b0b">1</text>
    <rect x="970" y="140" width="70" height="46" rx="6" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="1005" y="169" text-anchor="middle" fill="#0b0b0b">2</text>
    <rect x="770" y="210" width="70" height="46" rx="6" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="805" y="239" text-anchor="middle" fill="#0b0b0b">3</text>
    <rect x="850" y="210" width="70" height="46" rx="6" fill="#1baf7a" fill-opacity="0.2" stroke="#1baf7a" stroke-width="2.5"/><text x="885" y="239" text-anchor="middle" fill="#0b0b0b">5</text>
  </g>
  <g font-size="11.5" fill="#52514e">
    <text x="765" y="203" text-anchor="middle">F(0)</text>
    <text x="845" y="203" text-anchor="middle">F(1)</text>
    <text x="925" y="203" text-anchor="middle">F(2)</text>
    <text x="1005" y="203" text-anchor="middle">F(3)</text>
    <text x="805" y="273" text-anchor="middle">F(4)</text>
    <text x="885" y="273" text-anchor="middle">F(5) ✔</text>
  </g>
  <text x="885" y="320" text-anchor="middle" font-size="12.5" fill="#0b0b0b">dp[i] = dp[i-1] + dp[i-2]</text>
  <text x="885" y="348" text-anchor="middle" font-size="12" fill="#52514e">작은 값부터 표를 채우면</text>
  <text x="885" y="366" text-anchor="middle" font-size="12" fill="#52514e">각 F(k)를 정확히 한 번만 계산</text>
  <rect x="740" y="390" width="290" height="42" rx="8" fill="#ffffff" stroke="#1baf7a" stroke-width="1.5"/>
  <text x="885" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#1baf7a">저장(memo)이 곧 속도 — 중복 제거가 핵심</text>
</svg>
