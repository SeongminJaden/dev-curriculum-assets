<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="500" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">이진 탐색 — 16개 원소에서 값 23을 찾는 4단계</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">파란색은 살아 있는 탐색 구간, 주황색은 이번에 검사하는 mid, 회색은 버려진 구간입니다</text>

  <g font-size="11.5" fill="#0b0b0b" text-anchor="middle">
    <text x="72" y="100">2</text><text x="132" y="100">5</text><text x="192" y="100">8</text><text x="252" y="100">12</text>
    <text x="312" y="100">16</text><text x="372" y="100">23</text><text x="432" y="100">38</text><text x="492" y="100">56</text>
    <text x="552" y="100">72</text><text x="612" y="100">91</text><text x="672" y="100">99</text><text x="732" y="100">104</text>
    <text x="792" y="100">120</text><text x="852" y="100">137</text><text x="912" y="100">150</text><text x="972" y="100">168</text>
  </g>
  <g font-size="10.5" fill="#898781" text-anchor="middle">
    <text x="72" y="116">0</text><text x="132" y="116">1</text><text x="192" y="116">2</text><text x="252" y="116">3</text>
    <text x="312" y="116">4</text><text x="372" y="116">5</text><text x="432" y="116">6</text><text x="492" y="116">7</text>
    <text x="552" y="116">8</text><text x="612" y="116">9</text><text x="672" y="116">10</text><text x="732" y="116">11</text>
    <text x="792" y="116">12</text><text x="852" y="116">13</text><text x="912" y="116">14</text><text x="972" y="116">15</text>
  </g>

  <g stroke-width="2.5">
    <rect x="42" y="136" width="960" height="30" rx="8" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6"/>
    <rect x="462" y="136" width="60" height="30" rx="8" fill="#d97706" fill-opacity="0.35" stroke="#d97706"/>
  </g>
  <text x="492" y="156" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">56</text>
  <text x="1014" y="156" font-size="11.5" fill="#52514e">1단계</text>
  <text x="42" y="182" font-size="11.5" fill="#52514e">lo=0, hi=15 → mid=7, a[7]=56 &gt; 23 → hi = mid − 1 = 6 (오른쪽 절반 전체를 버림)</text>

  <g stroke-width="2.5">
    <rect x="42" y="200" width="420" height="30" rx="8" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6"/>
    <rect x="462" y="200" width="540" height="30" rx="8" fill="#898781" fill-opacity="0.10" stroke="#c3c2b7" stroke-dasharray="4 3"/>
    <rect x="222" y="200" width="60" height="30" rx="8" fill="#d97706" fill-opacity="0.35" stroke="#d97706"/>
  </g>
  <text x="252" y="220" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">12</text>
  <text x="1014" y="220" font-size="11.5" fill="#52514e">2단계</text>
  <text x="42" y="246" font-size="11.5" fill="#52514e">lo=0, hi=6 → mid=3, a[3]=12 &lt; 23 → lo = mid + 1 = 4</text>

  <g stroke-width="2.5">
    <rect x="282" y="264" width="180" height="30" rx="8" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6"/>
    <rect x="42" y="264" width="240" height="30" rx="8" fill="#898781" fill-opacity="0.10" stroke="#c3c2b7" stroke-dasharray="4 3"/>
    <rect x="462" y="264" width="540" height="30" rx="8" fill="#898781" fill-opacity="0.10" stroke="#c3c2b7" stroke-dasharray="4 3"/>
    <rect x="342" y="264" width="60" height="30" rx="8" fill="#d97706" fill-opacity="0.35" stroke="#d97706"/>
  </g>
  <text x="372" y="284" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">23</text>
  <text x="1014" y="284" font-size="11.5" fill="#52514e">3단계</text>
  <text x="42" y="310" font-size="11.5" fill="#1baf7a" font-weight="700">lo=4, hi=6 → mid=5, a[5]=23 = target → 인덱스 5 반환. 총 3회 비교로 종료</text>

  <rect x="40" y="336" width="510" height="140" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
  <text x="60" y="362" font-size="14" font-weight="700" fill="#0b0b0b">왜 mid ± 1이 반드시 필요한가</text>
  <text x="60" y="386" font-size="12.5" fill="#0b0b0b">mid는 이미 검사해서 정답이 아님이 확인된 자리입니다.</text>
  <text x="60" y="406" font-size="12.5" fill="#0b0b0b">다음 구간에서 제외하지 않으면 lo와 hi가 인접했을 때</text>
  <text x="60" y="426" font-size="12.5" fill="#0b0b0b">mid == lo가 되어 구간이 줄지 않고 무한 루프에 빠집니다.</text>
  <text x="60" y="452" font-size="12.5" font-weight="700" fill="#dc2626">mid 제외 = 매 반복 구간 축소 = 종료 보장</text>

  <rect x="570" y="336" width="510" height="140" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="590" y="362" font-size="14" font-weight="700" fill="#0b0b0b">루프 불변식을 먼저 적으세요</text>
  <text x="590" y="386" font-size="12.5" fill="#0b0b0b">"정답이 존재한다면 반드시 [lo, hi] 안에 있다."</text>
  <text x="590" y="410" font-size="12.5" fill="#52514e">이 문장이 모든 갱신식 뒤에도 여전히 참인지</text>
  <text x="590" y="430" font-size="12.5" fill="#52514e">확인하면 경계 버그가 거의 사라집니다.</text>
  <text x="590" y="456" font-size="12.5" font-weight="700" fill="#1baf7a">필요 비교 횟수 = ⌊log₂n⌋ + 1 (n=16이면 최대 5회)</text>
</svg>
