<svg xmlns="http://www.w3.org/2000/svg" width="820" height="480" viewBox="0 0 820 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="820" height="480" fill="#fcfcfb"/>
  <text x="410" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">"간편 결제" 수단을 새로 추가할 때</text>

  <!-- Left panel: violation -->
  <text x="205" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">OCP 위반 — 기존 함수를 수정</text>

  <rect x="70" y="90" width="270" height="150" rx="10" fill="#e34948" fill-opacity="0.10" stroke="#e34948" stroke-width="2.5"/>
  <text x="205" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">PaymentProcessor.process()</text>
  <text x="205" y="140" text-anchor="middle" font-size="12" fill="#52514e">if method == "card": ...</text>
  <text x="205" y="160" text-anchor="middle" font-size="12" fill="#52514e">elif method == "bank_transfer": ...</text>
  <rect x="90" y="172" width="230" height="26" rx="6" fill="#e34948" fill-opacity="0.25" stroke="#e34948" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="205" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">elif method == "simple_pay": ...</text>
  <text x="205" y="218" text-anchor="middle" font-size="11" fill="#52514e">(새 분기를 추가하려면 이 함수를 열어야 함)</text>

  <rect x="70" y="265" width="270" height="90" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="205" y="290" text-anchor="middle" font-size="12.5" fill="#0b0b0b">이미 검증된 카드·계좌이체</text>
  <text x="205" y="308" text-anchor="middle" font-size="12.5" fill="#0b0b0b">분기까지 포함된 함수 전체가</text>
  <text x="205" y="326" text-anchor="middle" font-size="12.5" fill="#0b0b0b">다시 수정 대상이 됩니다</text>
  <text x="205" y="344" text-anchor="middle" font-size="12.5" fill="#0b0b0b">(재검토 범위: 함수 전체)</text>

  <!-- Divider -->
  <line x1="410" y1="70" x2="410" y2="420" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Right panel: compliant -->
  <text x="615" y="70" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">OCP 준수 — 클래스만 추가</text>

  <rect x="460" y="90" width="150" height="45" rx="8" fill="#898781" fill-opacity="0.10" stroke="#898781" stroke-width="2"/>
  <text x="535" y="117" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">PaymentMethod</text>

  <line x1="500" y1="135" x2="500" y2="165" stroke="#898781" stroke-width="1.5"/>
  <line x1="535" y1="135" x2="535" y2="165" stroke="#898781" stroke-width="1.5"/>
  <line x1="605" y1="135" x2="700" y2="165" stroke="#898781" stroke-width="1.5"/>

  <rect x="450" y="170" width="120" height="42" rx="8" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="510" y="196" text-anchor="middle" font-size="11.5" fill="#0b0b0b">CardPayment</text>

  <rect x="480" y="225" width="150" height="42" rx="8" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="555" y="251" text-anchor="middle" font-size="11.5" fill="#0b0b0b">BankTransferPayment</text>

  <rect x="640" y="170" width="150" height="45" rx="8" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2.5"/>
  <text x="715" y="192" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0b0b0b">SimplePayPayment</text>
  <text x="715" y="208" text-anchor="middle" font-size="10.5" fill="#0b0b0b">(새로 추가된 클래스)</text>

  <rect x="450" y="290" width="340" height="110" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="620" y="315" text-anchor="middle" font-size="12.5" fill="#0b0b0b">CardPayment, BankTransferPayment는</text>
  <text x="620" y="333" text-anchor="middle" font-size="12.5" fill="#0b0b0b">단 한 줄도 수정하지 않습니다.</text>
  <text x="620" y="351" text-anchor="middle" font-size="12.5" fill="#0b0b0b">새 클래스 SimplePayPayment를</text>
  <text x="620" y="369" text-anchor="middle" font-size="12.5" fill="#0b0b0b">추가하는 것만으로 확장이 끝납니다</text>
  <text x="620" y="389" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">(재검토 범위: 새 클래스 하나)</text>

  <text x="410" y="445" text-anchor="middle" font-size="12.5" fill="#52514e">같은 요구사항 변경이라도 구조에 따라 다시 검토해야 할 범위가 달라집니다</text>
</svg>
