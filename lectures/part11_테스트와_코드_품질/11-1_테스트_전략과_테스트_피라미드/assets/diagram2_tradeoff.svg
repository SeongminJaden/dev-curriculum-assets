<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="760" height="440" fill="#fcfcfb"/>
  <text x="380" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">테스트 레벨별 트레이드오프</text>
  <text x="380" y="56" text-anchor="middle" font-size="13" fill="#52514e">레벨이 올라갈수록 실제 의존성이 늘어나며 세 지표가 함께 커집니다</text>

  <!-- legend -->
  <rect x="470" y="74" width="14" height="14" fill="#cde2fb" stroke="#3987e5" stroke-width="1"/>
  <text x="490" y="86" font-size="12" fill="#52514e">단위</text>
  <rect x="540" y="74" width="14" height="14" fill="#3987e5"/>
  <text x="560" y="86" font-size="12" fill="#52514e">통합</text>
  <rect x="610" y="74" width="14" height="14" fill="#0d366b"/>
  <text x="630" y="86" font-size="12" fill="#52514e">E2E</text>

  <!-- Row 1: 실행 시간 -->
  <text x="60" y="130" font-size="14" font-weight="700" fill="#0b0b0b">실행 시간</text>
  <rect x="220" y="112" width="80" height="20" rx="4" fill="#cde2fb"/>
  <text x="308" y="127" font-size="11.5" fill="#52514e">밀리초</text>
  <rect x="220" y="138" width="180" height="20" rx="4" fill="#3987e5"/>
  <text x="408" y="153" font-size="11.5" fill="#52514e">초 단위</text>
  <rect x="220" y="164" width="340" height="20" rx="4" fill="#0d366b"/>
  <text x="568" y="179" font-size="11.5" fill="#ffffff">초 ~ 분 단위</text>

  <!-- Row 2: 유지 비용 -->
  <text x="60" y="238" font-size="14" font-weight="700" fill="#0b0b0b">유지 비용</text>
  <rect x="220" y="220" width="90" height="20" rx="4" fill="#cde2fb"/>
  <text x="318" y="235" font-size="11.5" fill="#52514e">낮음</text>
  <rect x="220" y="246" width="200" height="20" rx="4" fill="#3987e5"/>
  <text x="428" y="261" font-size="11.5" fill="#52514e">중간 (환경 구성 필요)</text>
  <rect x="220" y="272" width="340" height="20" rx="4" fill="#0d366b"/>
  <text x="568" y="287" font-size="11.5" fill="#ffffff">높음 (환경·데이터 관리)</text>

  <!-- Row 3: 확신의 강도 -->
  <text x="60" y="346" font-size="14" font-weight="700" fill="#0b0b0b">확신의 강도</text>
  <rect x="220" y="328" width="110" height="20" rx="4" fill="#cde2fb"/>
  <text x="338" y="343" font-size="11.5" fill="#52514e">부품 단위만 보장</text>
  <rect x="220" y="354" width="230" height="20" rx="4" fill="#3987e5"/>
  <text x="458" y="369" font-size="11.5" fill="#52514e">연동까지 보장</text>
  <rect x="220" y="380" width="340" height="20" rx="4" fill="#0d366b"/>
  <text x="568" y="395" font-size="11.5" fill="#ffffff">실사용 흐름까지 보장</text>

  <line x1="220" y1="104" x2="220" y2="404" stroke="#c3c2b7" stroke-width="1.5"/>
</svg>
