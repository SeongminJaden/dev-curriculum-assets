<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="260" viewBox="0 0 1120 260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="260" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">시스템 설계 문제를 푸는 다섯 단계</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <line x1="212" y1="160" x2="234" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="424" y1="160" x2="446" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="636" y1="160" x2="658" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="848" y1="160" x2="870" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 1: 요구사항 파악 (blue) -->
  <g>
    <rect x="30" y="100" width="182" height="120" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="52" cy="120" r="12" fill="#2a78d6"/>
    <text x="52" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="121" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">요구사항 파악</text>
    <text x="121" y="173" text-anchor="middle" font-size="12" fill="#52514e">기능·비기능</text>
    <text x="121" y="189" text-anchor="middle" font-size="12" fill="#52514e">요구사항을</text>
    <text x="121" y="205" text-anchor="middle" font-size="12" fill="#52514e">범위로 고정</text>
  </g>

  <!-- Step 2: 용량 추정 (aqua) -->
  <g>
    <rect x="242" y="100" width="182" height="120" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="264" cy="120" r="12" fill="#1baf7a"/>
    <text x="264" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="333" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">용량 추정</text>
    <text x="333" y="173" text-anchor="middle" font-size="12" fill="#52514e">DAU·QPS·</text>
    <text x="333" y="189" text-anchor="middle" font-size="12" fill="#52514e">저장 용량을</text>
    <text x="333" y="205" text-anchor="middle" font-size="12" fill="#52514e">숫자로 계산</text>
  </g>

  <!-- Step 3: 고수준 설계 (yellow) -->
  <g>
    <rect x="454" y="100" width="182" height="120" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <circle cx="476" cy="120" r="12" fill="#eda100"/>
    <text x="476" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="545" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">고수준 설계</text>
    <text x="545" y="173" text-anchor="middle" font-size="12" fill="#52514e">클라이언트·</text>
    <text x="545" y="189" text-anchor="middle" font-size="12" fill="#52514e">서버·DB 등</text>
    <text x="545" y="205" text-anchor="middle" font-size="12" fill="#52514e">큰 박스만 배치</text>
  </g>

  <!-- Step 4: 상세 설계 (green) -->
  <g>
    <rect x="666" y="100" width="182" height="120" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <circle cx="688" cy="120" r="12" fill="#008300"/>
    <text x="688" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="757" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">상세 설계</text>
    <text x="757" y="173" text-anchor="middle" font-size="12" fill="#52514e">병목이 되는</text>
    <text x="757" y="189" text-anchor="middle" font-size="12" fill="#52514e">구성요소를</text>
    <text x="757" y="205" text-anchor="middle" font-size="12" fill="#52514e">깊이 파고듦</text>
  </g>

  <!-- Step 5: 트레이드오프 논의 (violet) -->
  <g>
    <rect x="878" y="100" width="212" height="120" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <circle cx="900" cy="120" r="12" fill="#4a3aa7"/>
    <text x="900" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
    <text x="984" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">트레이드오프 논의</text>
    <text x="984" y="173" text-anchor="middle" font-size="12" fill="#52514e">무엇을 얻고</text>
    <text x="984" y="189" text-anchor="middle" font-size="12" fill="#52514e">무엇을 포기했는지</text>
    <text x="984" y="205" text-anchor="middle" font-size="12" fill="#52514e">근거로 설명</text>
  </g>

  <text x="560" y="248" text-anchor="middle" font-size="12" fill="#52514e">앞 단계에서 정한 범위와 숫자가 뒤 단계의 판단 근거가 되므로, 순서를 건너뛰면 논의가 감(感)에 의존하게 됩니다</text>
</svg>
