<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="440" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">60초 동안의 통신 패턴 비교 — 폴링 · 롱폴링 · 웹소켓</text>

  <line x1="380" y1="66" x2="380" y2="400" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="750" y1="66" x2="750" y2="400" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- COLUMN 1: 폴링 (blue) -->
  <g>
    <rect x="40" y="70" width="300" height="52" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="190" y="102" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">폴링 (5초 간격)</text>
  </g>
  <circle cx="70" cy="180" r="11" fill="#2a78d6" fill-opacity="0.35" stroke="#2a78d6" stroke-width="2"/>
  <circle cx="110" cy="180" r="11" fill="#2a78d6" fill-opacity="0.35" stroke="#2a78d6" stroke-width="2"/>
  <circle cx="150" cy="180" r="11" fill="#2a78d6" fill-opacity="0.35" stroke="#2a78d6" stroke-width="2"/>
  <circle cx="190" cy="180" r="11" fill="#2a78d6" fill-opacity="0.9" stroke="#2a78d6" stroke-width="2"/>
  <circle cx="230" cy="180" r="11" fill="#2a78d6" fill-opacity="0.35" stroke="#2a78d6" stroke-width="2"/>
  <circle cx="270" cy="180" r="11" fill="#2a78d6" fill-opacity="0.35" stroke="#2a78d6" stroke-width="2"/>
  <circle cx="310" cy="180" r="11" fill="#2a78d6" fill-opacity="0.35" stroke="#2a78d6" stroke-width="2"/>
  <text x="190" y="206" text-anchor="middle" font-size="11" fill="#52514e">진한 원 = 새 메시지 있음 / 옅은 원 = 빈 응답</text>
  <text x="190" y="224" text-anchor="middle" font-size="11" fill="#52514e">12회 요청 중 대부분이 빈 응답</text>

  <g>
    <rect x="60" y="248" width="260" height="130" rx="10" fill="#2a78d6" fill-opacity="0.08" stroke="#2a78d6" stroke-width="2"/>
    <text x="190" y="272" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">60초당 요청 약 12회</text>
    <text x="190" y="294" text-anchor="middle" font-size="11.5" fill="#52514e">새 메시지가 있어도</text>
    <text x="190" y="310" text-anchor="middle" font-size="11.5" fill="#52514e">최대 5초까지 지연될 수 있음</text>
    <text x="190" y="332" text-anchor="middle" font-size="11.5" fill="#52514e">구현은 가장 단순하지만</text>
    <text x="190" y="348" text-anchor="middle" font-size="11.5" fill="#52514e">대부분의 요청이 낭비됨</text>
    <text x="190" y="366" text-anchor="middle" font-size="11.5" fill="#52514e">(서버 자원 소모 큼)</text>
  </g>

  <!-- COLUMN 2: 롱폴링 (aqua) -->
  <g>
    <rect x="410" y="70" width="300" height="52" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="560" y="102" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">롱폴링 (최대 30초 대기)</text>
  </g>
  <rect x="450" y="170" width="80" height="22" rx="4" fill="#1baf7a" fill-opacity="0.9"/>
  <rect x="560" y="170" width="130" height="22" rx="4" fill="#1baf7a" fill-opacity="0.35"/>
  <text x="560" y="212" text-anchor="middle" font-size="11" fill="#52514e">막대 길이 = 서버가 연결을 붙잡고 있는 시간</text>
  <text x="560" y="228" text-anchor="middle" font-size="11" fill="#52514e">2회 요청으로 60초를 대부분 커버</text>

  <g>
    <rect x="430" y="248" width="260" height="130" rx="10" fill="#1baf7a" fill-opacity="0.08" stroke="#1baf7a" stroke-width="2"/>
    <text x="560" y="272" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">60초당 요청 약 2회</text>
    <text x="560" y="294" text-anchor="middle" font-size="11.5" fill="#52514e">메시지가 오면 즉시 응답,</text>
    <text x="560" y="310" text-anchor="middle" font-size="11.5" fill="#52514e">없으면 타임아웃 후 재연결</text>
    <text x="560" y="332" text-anchor="middle" font-size="11.5" fill="#52514e">폴링보다 지연은 줄지만</text>
    <text x="560" y="348" text-anchor="middle" font-size="11.5" fill="#52514e">서버가 연결을 오래 붙잡아야 해</text>
    <text x="560" y="366" text-anchor="middle" font-size="11.5" fill="#52514e">동시 접속자 수만큼 자원 필요</text>
  </g>

  <!-- COLUMN 3: 웹소켓 (yellow) -->
  <g>
    <rect x="780" y="70" width="300" height="52" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="930" y="102" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">웹소켓 (지속 연결)</text>
  </g>
  <line x1="810" y1="180" x2="1050" y2="180" stroke="#eda100" stroke-width="4"/>
  <circle cx="830" cy="180" r="10" fill="#eda100"/>
  <circle cx="900" cy="180" r="8" fill="#eda100" fill-opacity="0.85"/>
  <circle cx="960" cy="180" r="8" fill="#eda100" fill-opacity="0.85"/>
  <circle cx="1020" cy="180" r="8" fill="#eda100" fill-opacity="0.85"/>
  <text x="830" y="200" text-anchor="middle" font-size="10.5" fill="#52514e">핸드셰이크</text>
  <text x="960" y="220" text-anchor="middle" font-size="11" fill="#52514e">연결 1회 후, 서버가 메시지가 생길 때마다 즉시 push</text>

  <g>
    <rect x="800" y="248" width="260" height="130" rx="10" fill="#eda100" fill-opacity="0.10" stroke="#eda100" stroke-width="2"/>
    <text x="930" y="272" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">연결 1회, 이후 요청 없음</text>
    <text x="930" y="294" text-anchor="middle" font-size="11.5" fill="#52514e">지연이 가장 적음</text>
    <text x="930" y="310" text-anchor="middle" font-size="11.5" fill="#52514e">(밀리초 단위 전달)</text>
    <text x="930" y="332" text-anchor="middle" font-size="11.5" fill="#52514e">대신 서버가 접속자 수만큼</text>
    <text x="930" y="348" text-anchor="middle" font-size="11.5" fill="#52514e">연결 상태를 계속 유지해야 해</text>
    <text x="930" y="366" text-anchor="middle" font-size="11.5" fill="#52514e">메모리·인프라 비용이 늘어남</text>
  </g>

  <text x="560" y="424" text-anchor="middle" font-size="12" fill="#52514e">오른쪽으로 갈수록 지연은 줄지만, 서버가 연결 상태를 유지하는 비용은 늘어납니다</text>
</svg>
