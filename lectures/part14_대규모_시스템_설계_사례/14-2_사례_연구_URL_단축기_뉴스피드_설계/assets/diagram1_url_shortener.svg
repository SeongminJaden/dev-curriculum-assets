<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="360" viewBox="0 0 1120 360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="360" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">URL 단축기 — 쓰기 경로와 읽기 경로</text>

  <defs>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <text x="60" y="76" font-size="13.5" font-weight="700" fill="#52514e">쓰기 경로 — 단축 URL 생성</text>

  <line x1="222" y1="120" x2="244" y2="120" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="464" y1="120" x2="486" y2="120" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="706" y1="120" x2="728" y2="120" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>

  <!-- Write 1: 사용자 요청 (blue) -->
  <g>
    <rect x="40" y="88" width="182" height="64" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="131" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">원본 URL 제출</text>
    <text x="131" y="134" text-anchor="middle" font-size="11.5" fill="#52514e">사용자가 긴 URL을 입력</text>
  </g>

  <!-- Write 2: ID 생성기 (aqua) -->
  <g>
    <rect x="252" y="88" width="212" height="64" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="358" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">고유 ID 생성기</text>
    <text x="358" y="134" text-anchor="middle" font-size="11.5" fill="#52514e">DB 시퀀스 또는 Snowflake 방식</text>
  </g>

  <!-- Write 3: Base62 인코딩 (yellow) -->
  <g>
    <rect x="494" y="88" width="212" height="64" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="600" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">Base62 인코딩</text>
    <text x="600" y="134" text-anchor="middle" font-size="11.5" fill="#52514e">숫자 ID → 짧은 문자열(예: 125→"b9")</text>
  </g>

  <!-- Write 4: DB 저장 (green) -->
  <g>
    <rect x="736" y="88" width="212" height="64" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="842" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">매핑 저장</text>
    <text x="842" y="134" text-anchor="middle" font-size="11.5" fill="#52514e">short_code ↔ original_url을 DB에 기록</text>
  </g>

  <line x1="310" y1="152" x2="310" y2="216" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>

  <text x="60" y="238" font-size="13.5" font-weight="700" fill="#52514e">읽기 경로 — 단축 URL 접속(리디렉션)</text>

  <line x1="222" y1="282" x2="244" y2="282" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>

  <!-- Read 1: 사용자 요청 (violet) -->
  <g>
    <rect x="40" y="250" width="182" height="64" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <text x="131" y="276" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">단축 URL 접속</text>
    <text x="131" y="296" text-anchor="middle" font-size="11.5" fill="#52514e">사용자가 짧은 링크를 클릭</text>
  </g>

  <!-- Read 2: 캐시 조회 (red) -->
  <g>
    <rect x="252" y="250" width="182" height="64" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <text x="343" y="276" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">캐시 조회</text>
    <text x="343" y="296" text-anchor="middle" font-size="11.5" fill="#52514e">Redis 등에서 매핑 확인</text>
  </g>

  <line x1="444" y1="270" x2="486" y2="240" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="444" y1="294" x2="486" y2="324" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>

  <!-- Read 3a: 캐시 히트 (magenta) -->
  <g>
    <rect x="494" y="208" width="290" height="60" rx="10" fill="#e87ba4" fill-opacity="0.14" stroke="#e87ba4" stroke-width="2.5"/>
    <text x="639" y="232" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">캐시 히트</text>
    <text x="639" y="252" text-anchor="middle" font-size="11.5" fill="#52514e">즉시 302 리디렉션 응답</text>
  </g>

  <!-- Read 3b: 캐시 미스 (orange) -->
  <g>
    <rect x="494" y="294" width="290" height="60" rx="10" fill="#eb6834" fill-opacity="0.12" stroke="#eb6834" stroke-width="2.5"/>
    <text x="639" y="318" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">캐시 미스</text>
    <text x="639" y="338" text-anchor="middle" font-size="11.5" fill="#52514e">DB 조회 후 캐시에 채우고 리디렉션</text>
  </g>

  <text x="960" y="272" font-size="12" fill="#52514e" text-anchor="middle">읽기는 압도적으로</text>
  <text x="960" y="290" font-size="12" fill="#52514e" text-anchor="middle">많으므로 캐시 히트율이</text>
  <text x="960" y="308" font-size="12" fill="#52514e" text-anchor="middle">설계의 성패를 좌우</text>
</svg>
