<svg xmlns="http://www.w3.org/2000/svg" width="620" height="600" viewBox="0 0 620 600" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="620" height="600" fill="#fcfcfb"/>
  <text x="310" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">3계층 백엔드 아키텍처</text>
  <text x="310" y="56" text-anchor="middle" font-size="13" fill="#52514e">각 계층은 오직 바로 아래 계층에만 의존합니다 (단방향 의존성)</text>

  <defs>
    <marker id="arrowL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- arrows between layers (bidirectional: request down / response up) -->
  <line x1="310" y1="132" x2="310" y2="156" stroke="#898781" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowL)"/>
  <text x="335" y="149" font-size="11" fill="#52514e">호출 / 반환</text>

  <line x1="310" y1="222" x2="310" y2="246" stroke="#898781" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowL)"/>
  <text x="335" y="239" font-size="11" fill="#52514e">호출 / 반환</text>

  <line x1="310" y1="312" x2="310" y2="336" stroke="#898781" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowL)"/>
  <text x="335" y="329" font-size="11" fill="#52514e">쿼리 / 결과</text>

  <!-- Layer 1: 프레젠테이션 (blue) -->
  <g>
    <rect x="60" y="72" width="500" height="60" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="90" y="99" font-size="15" font-weight="700" fill="#0b0b0b">1. 프레젠테이션 계층</text>
    <text x="90" y="119" font-size="12" fill="#52514e">HTTP 요청·응답 형식 변환, 입력 검증 — "무엇을 원하는가"만 해석</text>
  </g>

  <!-- Layer 2: 비즈니스 로직 (aqua) -->
  <g>
    <rect x="60" y="162" width="500" height="60" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="90" y="189" font-size="15" font-weight="700" fill="#0b0b0b">2. 비즈니스 로직 계층</text>
    <text x="90" y="209" font-size="12" fill="#52514e">할인 정책, 재고 검증, 결제 승인 조건 등 도메인 규칙을 처리</text>
  </g>

  <!-- Layer 3: 데이터 접근 (yellow) -->
  <g>
    <rect x="60" y="252" width="500" height="60" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="90" y="279" font-size="15" font-weight="700" fill="#0b0b0b">3. 데이터 접근 계층</text>
    <text x="90" y="299" font-size="12" fill="#52514e">SQL 쿼리 작성, ORM 매핑 — 저장 방식이 바뀌어도 여기만 수정</text>
  </g>

  <!-- Layer 4: DB (green, external, dashed) -->
  <g>
    <rect x="60" y="342" width="500" height="60" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="90" y="369" font-size="15" font-weight="700" fill="#0b0b0b">데이터베이스 (애플리케이션 외부)</text>
    <text x="90" y="389" font-size="12" fill="#52514e">실제 데이터가 저장되는 물리적 저장소 — 애플리케이션 경계 밖</text>
  </g>

  <rect x="60" y="425" width="500" height="140" rx="10" fill="#898781" fill-opacity="0.07" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="310" y="452" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">화면 디자인이 바뀌면 1번 계층만,</text>
  <text x="310" y="472" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">할인 정책이 바뀌면 2번 계층만,</text>
  <text x="310" y="492" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">DB 종류가 바뀌면 3번 계층만 수정합니다.</text>
  <text x="310" y="516" text-anchor="middle" font-size="12" fill="#52514e">변경 이유가 다르면, 변경되는 코드의 위치도 달라야 합니다</text>

</svg>
