<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="460" viewBox="0 0 1120 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="460" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">"간편결제 수단 추가" 요청이 일으키는 변경 범위</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 요청이라도 계층 유무에 따라 수정 범위가 완전히 달라집니다</text>

  <!-- Left panel: 계층 없음 -->
  <text x="290" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">계층 분리가 없는 경우</text>
  <rect x="60" y="105" width="460" height="300" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
  <text x="290" y="145" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">한 파일 안에 뒤섞인 코드</text>
  <text x="90" y="180" font-size="12.5" fill="#0b0b0b">- 화면 출력 로직</text>
  <text x="90" y="205" font-size="12.5" fill="#0b0b0b">- 결제 수단별 분기 로직</text>
  <text x="90" y="230" font-size="12.5" fill="#0b0b0b">- 결제 정책(한도, 수수료) 계산</text>
  <text x="90" y="255" font-size="12.5" fill="#0b0b0b">- 결제 내역 DB 저장 쿼리</text>
  <line x1="80" y1="270" x2="500" y2="270" stroke="#e34948" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="290" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#e34948">수정 범위: 파일 전체</text>
  <text x="290" y="322" text-anchor="middle" font-size="12" fill="#52514e">화면 코드까지 다시 읽고</text>
  <text x="290" y="340" text-anchor="middle" font-size="12" fill="#52514e">전체를 재검증해야 합니다</text>
  <text x="290" y="385" text-anchor="middle" font-size="12" fill="#52514e">(회귀 테스트 범위 = 시스템 전체)</text>

  <!-- Right panel: 계층 분리 -->
  <text x="830" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">계층 분리가 있는 경우</text>

  <rect x="600" y="105" width="460" height="60" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="830" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">프레젠테이션 계층</text>
  <text x="830" y="150" text-anchor="middle" font-size="11.5" fill="#52514e">변경 없음 — 화면은 그대로</text>

  <rect x="600" y="175" width="460" height="70" rx="10" fill="#e34948" fill-opacity="0.14" stroke="#e34948" stroke-width="3"/>
  <text x="830" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">비즈니스 로직 계층 — 수정 지점</text>
  <text x="830" y="223" text-anchor="middle" font-size="11.5" fill="#52514e">새 결제 수단의 정책·한도 로직만 추가</text>

  <rect x="600" y="255" width="460" height="60" rx="10" fill="#eda100" fill-opacity="0.12" stroke="#eda100" stroke-width="2.5"/>
  <text x="830" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">데이터 접근 계층</text>
  <text x="830" y="300" text-anchor="middle" font-size="11.5" fill="#52514e">변경 없음 — 저장 방식은 그대로</text>

  <line x1="830" y1="325" x2="830" y2="345" stroke="#898781" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="830" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">수정 범위: 비즈니스 로직 계층 1곳</text>
  <text x="830" y="392" text-anchor="middle" font-size="12" fill="#52514e">회귀 테스트 범위 = 해당 계층 + 그 계층의 인터페이스</text>

</svg>
