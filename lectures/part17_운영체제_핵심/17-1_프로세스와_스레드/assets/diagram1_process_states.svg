<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="480" viewBox="0 0 1120 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="480" fill="#fcfcfb"/>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52514e"/>
    </marker>
  </defs>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">프로세스 상태 전이도</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">준비는 &quot;CPU만 주면 실행 가능&quot;, 대기는 &quot;CPU를 줘도 할 일이 없음&quot;을 뜻합니다</text>

  <!-- 생성 -->
  <rect x="40" y="170" width="150" height="72" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="115" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">생성 New</text>
  <text x="115" y="224" text-anchor="middle" font-size="11.5" fill="#52514e">PCB 할당</text>

  <!-- 준비 -->
  <rect x="285" y="170" width="170" height="72" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="370" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">준비 Ready</text>
  <text x="370" y="224" text-anchor="middle" font-size="11.5" fill="#52514e">준비 큐에서 대기</text>

  <!-- 실행 -->
  <rect x="565" y="170" width="170" height="72" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="650" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">실행 Running</text>
  <text x="650" y="224" text-anchor="middle" font-size="11.5" fill="#52514e">CPU 코어 점유 중</text>

  <!-- 종료 -->
  <rect x="850" y="170" width="160" height="72" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
  <text x="930" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">종료 Terminated</text>
  <text x="930" y="224" text-anchor="middle" font-size="11.5" fill="#52514e">자원 회수</text>

  <!-- 대기 -->
  <rect x="430" y="345" width="230" height="72" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <text x="545" y="378" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">대기 Waiting / Blocked</text>
  <text x="545" y="399" text-anchor="middle" font-size="11.5" fill="#52514e">입출력 완료를 기다리는 중</text>

  <!-- arrows -->
  <line x1="192" y1="206" x2="278" y2="206" stroke="#52514e" stroke-width="2" marker-end="url(#ar)"/>
  <text x="235" y="196" text-anchor="middle" font-size="11.5" fill="#52514e">적재</text>

  <line x1="458" y1="190" x2="558" y2="190" stroke="#52514e" stroke-width="2" marker-end="url(#ar)"/>
  <text x="508" y="180" text-anchor="middle" font-size="11.5" fill="#52514e">디스패치</text>

  <line x1="558" y1="224" x2="458" y2="224" stroke="#52514e" stroke-width="2" marker-end="url(#ar)"/>
  <text x="508" y="243" text-anchor="middle" font-size="11.5" fill="#52514e">시간 할당량 소진(선점)</text>

  <line x1="738" y1="206" x2="843" y2="206" stroke="#52514e" stroke-width="2" marker-end="url(#ar)"/>
  <text x="790" y="196" text-anchor="middle" font-size="11.5" fill="#52514e">exit()</text>

  <line x1="640" y1="246" x2="600" y2="340" stroke="#52514e" stroke-width="2" marker-end="url(#ar)"/>
  <text x="700" y="296" text-anchor="middle" font-size="11.5" fill="#52514e">입출력 요청(자발적 양보)</text>

  <line x1="452" y1="342" x2="372" y2="248" stroke="#52514e" stroke-width="2" marker-end="url(#ar)"/>
  <text x="298" y="300" text-anchor="middle" font-size="11.5" fill="#52514e">완료 인터럽트 도착</text>

  <!-- legend -->
  <rect x="40" y="440" width="1040" height="1" fill="#dcdcd8"/>
  <text x="40" y="466" font-size="11.5" fill="#52514e">실행 → 준비는 스케줄러가 강제로 빼앗는 전이이고, 실행 → 대기는 프로세스가 스스로 CPU를 내려놓는 전이입니다. 되돌아올 때는 반드시 준비 상태를 거칩니다.</text>
</svg>
