<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="500" fill="#fcfcfb"/>
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52514e"/>
    </marker>
  </defs>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">프로세스 주소 공간과 스레드의 공유 범위</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">스레드는 스택과 레지스터만 독립으로 갖고, 나머지 영역은 모두 공유합니다</text>

  <!-- Left: address space -->
  <text x="240" y="88" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">프로세스 가상 주소 공간</text>
  <text x="95" y="112" font-size="11.5" fill="#52514e">높은 주소</text>

  <rect x="90" y="120" width="300" height="64" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="110" y="146" font-size="13.5" font-weight="700" fill="#0b0b0b">스택 Stack</text>
  <text x="110" y="167" font-size="11.5" fill="#52514e">지역 변수 · 복귀 주소 · 함수 인자</text>

  <line x1="240" y1="192" x2="240" y2="228" stroke="#52514e" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="256" y="215" font-size="11.5" fill="#52514e">아래로 성장</text>

  <rect x="90" y="234" width="300" height="34" rx="8" fill="#ffffff" stroke="#dcdcd8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="240" y="256" text-anchor="middle" font-size="11.5" fill="#52514e">빈 공간 — 양쪽이 필요에 따라 나눠 씀</text>

  <line x1="240" y1="310" x2="240" y2="274" stroke="#52514e" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="256" y="298" font-size="11.5" fill="#52514e">위로 성장</text>

  <rect x="90" y="316" width="300" height="60" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <text x="110" y="341" font-size="13.5" font-weight="700" fill="#0b0b0b">힙 Heap</text>
  <text x="110" y="362" font-size="11.5" fill="#52514e">실행 중 동적으로 할당되는 영역</text>

  <rect x="90" y="384" width="300" height="52" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="110" y="406" font-size="13.5" font-weight="700" fill="#0b0b0b">데이터 Data</text>
  <text x="110" y="425" font-size="11.5" fill="#52514e">전역 변수 · 정적 변수</text>

  <rect x="90" y="444" width="300" height="42" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="110" y="463" font-size="13.5" font-weight="700" fill="#0b0b0b">코드 Text</text>
  <text x="216" y="463" font-size="11.5" fill="#52514e">기계어 명령어 · 읽기 전용</text>
  <text x="110" y="480" font-size="11.5" fill="#52514e">낮은 주소</text>

  <!-- Right: thread sharing -->
  <text x="750" y="88" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">스레드 3개를 가진 프로세스</text>

  <rect x="430" y="100" width="640" height="386" rx="12" fill="#52514e" fill-opacity="0.05" stroke="#52514e" stroke-width="2"/>

  <rect x="452" y="126" width="596" height="118" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="472" y="152" font-size="14" font-weight="700" fill="#0b0b0b">공유 영역 — 모든 스레드가 함께 봅니다</text>
  <text x="472" y="177" font-size="12.5" fill="#0b0b0b">코드 영역 · 데이터 영역(전역/정적 변수) · 힙</text>
  <text x="472" y="197" font-size="12.5" fill="#0b0b0b">열린 파일 디스크립터 테이블 · 시그널 핸들러</text>
  <text x="472" y="222" font-size="11.5" fill="#52514e">데이터를 넘기는 비용이 거의 0이지만, 바로 이 공유 때문에 경쟁 상태가 생깁니다</text>

  <rect x="452" y="268" width="188" height="196" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="546" y="296" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">스레드 1</text>
  <text x="472" y="324" font-size="12.5" fill="#0b0b0b">전용 스택</text>
  <text x="472" y="348" font-size="12.5" fill="#0b0b0b">프로그램 카운터</text>
  <text x="472" y="372" font-size="12.5" fill="#0b0b0b">레지스터 세트</text>
  <text x="472" y="396" font-size="12.5" fill="#0b0b0b">스레드 ID</text>
  <text x="472" y="428" font-size="11.5" fill="#52514e">자기만의 함수 호출</text>
  <text x="472" y="444" font-size="11.5" fill="#52514e">이력을 갖습니다</text>

  <rect x="656" y="268" width="188" height="196" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="750" y="296" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">스레드 2</text>
  <text x="676" y="324" font-size="12.5" fill="#0b0b0b">전용 스택</text>
  <text x="676" y="348" font-size="12.5" fill="#0b0b0b">프로그램 카운터</text>
  <text x="676" y="372" font-size="12.5" fill="#0b0b0b">레지스터 세트</text>
  <text x="676" y="396" font-size="12.5" fill="#0b0b0b">스레드 ID</text>
  <text x="676" y="428" font-size="11.5" fill="#52514e">다른 스레드와 다른</text>
  <text x="676" y="444" font-size="11.5" fill="#52514e">명령어를 실행합니다</text>

  <rect x="860" y="268" width="188" height="196" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <text x="954" y="296" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0b0b0b">스레드 3</text>
  <text x="880" y="324" font-size="12.5" fill="#0b0b0b">전용 스택</text>
  <text x="880" y="348" font-size="12.5" fill="#0b0b0b">프로그램 카운터</text>
  <text x="880" y="372" font-size="12.5" fill="#0b0b0b">레지스터 세트</text>
  <text x="880" y="396" font-size="12.5" fill="#0b0b0b">스레드 ID</text>
  <text x="880" y="428" font-size="11.5" fill="#52514e">CPU 할당의 단위는</text>
  <text x="880" y="444" font-size="11.5" fill="#52514e">스레드입니다</text>
</svg>
