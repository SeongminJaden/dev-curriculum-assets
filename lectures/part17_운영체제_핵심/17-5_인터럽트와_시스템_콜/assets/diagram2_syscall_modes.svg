<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="460" viewBox="0 0 1120 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="460" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">시스템 콜과 모드 전환</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">사용자 프로그램은 정해진 진입점(syscall)을 통해서만 커널 기능을 요청할 수 있습니다</text>

  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#52514e"/>
    </marker>
  </defs>

  <!-- User mode lane -->
  <rect x="40" y="90" width="1040" height="150" rx="12" fill="#2a78d6" fill-opacity="0.07" stroke="#2a78d6" stroke-width="2"/>
  <text x="70" y="118" font-size="14" font-weight="700" fill="#2a78d6">사용자 모드 (User Mode) — 권한 낮음</text>

  <!-- Kernel mode lane -->
  <rect x="40" y="300" width="1040" height="140" rx="12" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="2"/>
  <text x="70" y="328" font-size="14" font-weight="700" fill="#8b5cf6">커널 모드 (Kernel Mode) — 권한 높음</text>

  <!-- boundary line -->
  <line x1="40" y1="270" x2="1080" y2="270" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="560" y="288" text-anchor="middle" font-size="11.5" font-weight="700" fill="#dc2626">권한 경계 — 이 선은 오직 특수 명령(syscall)으로만 넘을 수 있음</text>

  <!-- step 1 -->
  <rect x="70" y="140" width="200" height="80" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
  <text x="170" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">① 번호를 레지스터에</text>
  <text x="170" y="190" text-anchor="middle" font-size="11.5" fill="#52514e">시스템 콜 번호 → rax</text>
  <text x="170" y="207" text-anchor="middle" font-size="11.5" fill="#52514e">인자 → rdi, rsi ...</text>

  <!-- step 2 -->
  <rect x="320" y="140" width="200" height="80" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
  <text x="420" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">② syscall 명령 실행</text>
  <text x="420" y="190" text-anchor="middle" font-size="11.5" fill="#52514e">일반 함수 호출과 달리</text>
  <text x="420" y="207" text-anchor="middle" font-size="11.5" fill="#52514e">권한 수준을 바꾸는 명령</text>
  <line x1="270" y1="180" x2="314" y2="180" stroke="#52514e" stroke-width="2" marker-end="url(#a2)"/>

  <!-- transition down -->
  <line x1="420" y1="220" x2="420" y2="345" stroke="#52514e" stroke-width="2" marker-end="url(#a2)"/>
  <text x="500" y="262" font-size="11.5" font-weight="700" fill="#dc2626">③ 커널 모드로 전환 + 진입점으로 점프</text>

  <!-- step 4 kernel -->
  <rect x="320" y="350" width="240" height="75" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="440" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">④ 시스템 콜 테이블 조회</text>
  <text x="440" y="400" text-anchor="middle" font-size="11.5" fill="#52514e">rax의 번호로 처리 함수를</text>
  <text x="440" y="416" text-anchor="middle" font-size="11.5" fill="#52514e">찾아 실행 (예: read, write)</text>

  <!-- step 5 return -->
  <rect x="610" y="350" width="240" height="75" rx="8" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="730" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">⑤ 결과를 레지스터에</text>
  <text x="730" y="400" text-anchor="middle" font-size="11.5" fill="#52514e">반환값 → rax</text>
  <text x="730" y="416" text-anchor="middle" font-size="11.5" fill="#52514e">그 뒤 사용자 모드로 복귀</text>
  <line x1="560" y1="387" x2="604" y2="387" stroke="#52514e" stroke-width="2" marker-end="url(#a2)"/>

  <!-- return up arrow -->
  <line x1="730" y1="350" x2="730" y2="222" stroke="#52514e" stroke-width="2" marker-end="url(#a2)"/>
  <rect x="630" y="140" width="200" height="80" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
  <text x="730" y="168" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">⑥ 사용자 코드 재개</text>
  <text x="730" y="190" text-anchor="middle" font-size="11.5" fill="#52514e">rax에서 결과를 읽어</text>
  <text x="730" y="207" text-anchor="middle" font-size="11.5" fill="#52514e">다음 로직 계속 진행</text>

  <text x="950" y="180" text-anchor="middle" font-size="11.5" fill="#52514e">임의의 커널 주소로</text>
  <text x="950" y="197" text-anchor="middle" font-size="11.5" fill="#52514e">뛰어들 수 없다는 것이</text>
  <text x="950" y="214" text-anchor="middle" font-size="11.5" fill="#52514e">이 설계의 안전성 근거</text>
</svg>
