<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="470" fill="#fcfcfb"/>
  <defs>
    <marker id="ar7" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52514e"/>
    </marker>
  </defs>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">교착상태 대응 전략 — 언제 개입할 것인가</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">왼쪽으로 갈수록 안전하지만 비싸고, 오른쪽으로 갈수록 값싸지만 위험합니다</text>

  <line x1="60" y1="86" x2="1060" y2="86" stroke="#52514e" stroke-width="2" marker-end="url(#ar7)"/>
  <text x="60" y="78" font-size="11.5" fill="#52514e">설계 시점</text>
  <text x="1060" y="78" text-anchor="end" font-size="11.5" fill="#52514e">사후 · 방치</text>

  <!-- 1 예방 -->
  <rect x="40" y="104" width="245" height="290" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="162" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">예방 Prevention</text>
  <text x="162" y="152" text-anchor="middle" font-size="11.5" fill="#52514e">조건 자체를 봉쇄</text>
  <line x1="60" y1="164" x2="265" y2="164" stroke="#2a78d6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="60" y="188" font-size="12" font-weight="700" fill="#0b0b0b">방법</text>
  <text x="60" y="208" font-size="11.5" fill="#52514e">4대 조건 중 하나를</text>
  <text x="60" y="224" font-size="11.5" fill="#52514e">구조적으로 성립 불가로</text>
  <text x="60" y="252" font-size="12" font-weight="700" fill="#0b0b0b">대표 사례</text>
  <text x="60" y="272" font-size="11.5" fill="#52514e">전역 락 순서 규약으로</text>
  <text x="60" y="288" font-size="11.5" fill="#52514e">순환 대기 차단</text>
  <text x="60" y="304" font-size="11.5" fill="#52514e">(ID 작은 계좌부터 잠금)</text>
  <text x="60" y="332" font-size="12" font-weight="700" fill="#0b0b0b">한계</text>
  <text x="60" y="352" font-size="11.5" fill="#52514e">자원 이용률 저하,</text>
  <text x="60" y="368" font-size="11.5" fill="#52514e">모든 코드 경로가</text>
  <text x="60" y="384" font-size="11.5" fill="#52514e">규약을 지켜야 함</text>

  <!-- 2 회피 -->
  <rect x="300" y="104" width="245" height="290" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="422" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">회피 Avoidance</text>
  <text x="422" y="152" text-anchor="middle" font-size="11.5" fill="#52514e">매 요청마다 안전성 검사</text>
  <line x1="320" y1="164" x2="525" y2="164" stroke="#1baf7a" stroke-opacity="0.3" stroke-width="1"/>
  <text x="320" y="188" font-size="12" font-weight="700" fill="#0b0b0b">방법</text>
  <text x="320" y="208" font-size="11.5" fill="#52514e">할당해도 안전 상태가</text>
  <text x="320" y="224" font-size="11.5" fill="#52514e">유지될 때만 승인</text>
  <text x="320" y="252" font-size="12" font-weight="700" fill="#0b0b0b">대표 사례</text>
  <text x="320" y="272" font-size="11.5" fill="#52514e">은행원 알고리즘</text>
  <text x="320" y="288" font-size="11.5" fill="#52514e">(다익스트라, 1965)</text>
  <text x="320" y="304" font-size="11.5" fill="#52514e">Need = Max − Allocation</text>
  <text x="320" y="332" font-size="12" font-weight="700" fill="#0b0b0b">한계</text>
  <text x="320" y="352" font-size="11.5" fill="#52514e">최대 요구량을 미리</text>
  <text x="320" y="368" font-size="11.5" fill="#52514e">선언해야 하고 검사</text>
  <text x="320" y="384" font-size="11.5" fill="#52514e">비용이 큼 — 범용 OS 미사용</text>

  <!-- 3 탐지와 회복 -->
  <rect x="560" y="104" width="245" height="290" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <text x="682" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">탐지와 회복</text>
  <text x="682" y="152" text-anchor="middle" font-size="11.5" fill="#52514e">일단 두고 사후 처리</text>
  <line x1="580" y1="164" x2="785" y2="164" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>
  <text x="580" y="188" font-size="12" font-weight="700" fill="#0b0b0b">방법</text>
  <text x="580" y="208" font-size="11.5" fill="#52514e">주기적으로 대기 그래프를</text>
  <text x="580" y="224" font-size="11.5" fill="#52514e">만들어 순환을 탐색</text>
  <text x="580" y="252" font-size="12" font-weight="700" fill="#0b0b0b">대표 사례</text>
  <text x="580" y="272" font-size="11.5" fill="#52514e">PostgreSQL deadlock_timeout</text>
  <text x="580" y="288" font-size="11.5" fill="#52514e">희생자 트랜잭션 강제 종료</text>
  <text x="580" y="304" font-size="11.5" fill="#52514e">오류 코드 40P01 반환</text>
  <text x="580" y="332" font-size="12" font-weight="700" fill="#0b0b0b">한계</text>
  <text x="580" y="352" font-size="11.5" fill="#52514e">작업 손실이 발생하므로</text>
  <text x="580" y="368" font-size="11.5" fill="#52514e">애플리케이션이 재시도</text>
  <text x="580" y="384" font-size="11.5" fill="#52514e">로직을 갖춰야 함</text>

  <!-- 4 무시 -->
  <rect x="820" y="104" width="245" height="290" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
  <text x="942" y="132" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">무시 — 타조 알고리즘</text>
  <text x="942" y="152" text-anchor="middle" font-size="11.5" fill="#52514e">아무 조치도 하지 않음</text>
  <line x1="840" y1="164" x2="1045" y2="164" stroke="#dc2626" stroke-opacity="0.3" stroke-width="1"/>
  <text x="840" y="188" font-size="12" font-weight="700" fill="#0b0b0b">방법</text>
  <text x="840" y="208" font-size="11.5" fill="#52514e">교착이 나면 사용자가</text>
  <text x="840" y="224" font-size="11.5" fill="#52514e">프로세스를 강제 종료</text>
  <text x="840" y="252" font-size="12" font-weight="700" fill="#0b0b0b">대표 사례</text>
  <text x="840" y="272" font-size="11.5" fill="#52514e">리눅스 · 윈도우 커널의</text>
  <text x="840" y="288" font-size="11.5" fill="#52514e">일반 자원 관리 정책</text>
  <text x="840" y="316" font-size="12" font-weight="700" fill="#0b0b0b">근거</text>
  <text x="840" y="336" font-size="11.5" fill="#52514e">예방·회피의 상시 비용이</text>
  <text x="840" y="352" font-size="11.5" fill="#52514e">교착의 기대 손실보다</text>
  <text x="840" y="368" font-size="11.5" fill="#52514e">크다는 공학적 판단</text>
  <text x="840" y="386" font-size="11.5" fill="#dc2626">치명적 시스템에는 부적합</text>

  <text x="40" y="428" font-size="11.5" fill="#52514e">네 전략은 우열이 아니라 도메인의 선택입니다. 항공 제어나 원자로 제어처럼 한 번의 정지가 치명적인 시스템에서는 예방에 큰 비용을 들이는 것이 옳고,</text>
  <text x="40" y="448" font-size="11.5" fill="#52514e">데스크톱 운영체제에서는 무시가 합리적입니다. 데이터베이스는 탐지와 회복이라는 중간 지점을 택했습니다.</text>
</svg>
