<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="760" height="520" fill="#fcfcfb"/>
  <text x="380" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">단방향 데이터 흐름</text>
  <text x="380" y="56" text-anchor="middle" font-size="13" fill="#52514e">데이터는 아래로, 요청(콜백 호출)은 위로</text>

  <defs>
    <marker id="arrowdf" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Parent (blue) -->
  <g>
    <rect x="180" y="80" width="400" height="110" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="380" y="115" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">부모 컴포넌트 (상태 소유자)</text>
    <text x="380" y="138" text-anchor="middle" font-size="12" fill="#52514e">cartItems 상태를 갖고 있음</text>
    <text x="380" y="156" text-anchor="middle" font-size="12" fill="#52514e">handleAddToCart() 함수를 정의</text>
    <text x="380" y="174" text-anchor="middle" font-size="12" fill="#52514e">상태 변경은 오직 여기서만 일어남</text>
  </g>

  <!-- down arrow: props -->
  <line x1="290" y1="190" x2="290" y2="330" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowdf)"/>
  <text x="230" y="260" font-size="12.5" font-weight="700" fill="#0b0b0b">props</text>
  <text x="195" y="278" font-size="11" fill="#52514e">(읽기 전용 데이터)</text>

  <!-- up arrow: callback -->
  <path d="M 490 330 C 560 260, 560 190, 490 190" stroke="#898781" stroke-width="2.5" fill="none" marker-end="url(#arrowdf)"/>
  <text x="575" y="255" font-size="12.5" font-weight="700" fill="#0b0b0b">이벤트 콜백 호출</text>
  <text x="575" y="273" font-size="11" fill="#52514e">onAddToCart()</text>

  <!-- Child (aqua) -->
  <g>
    <rect x="180" y="330" width="400" height="110" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="380" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">자식 컴포넌트 (ProductCard)</text>
    <text x="380" y="388" text-anchor="middle" font-size="12" fill="#52514e">props로 받은 상품 정보를 화면에 표시</text>
    <text x="380" y="406" text-anchor="middle" font-size="12" fill="#52514e">"담기" 버튼 클릭 시</text>
    <text x="380" y="424" text-anchor="middle" font-size="12" fill="#52514e">부모의 콜백만 호출, 상태는 직접 수정하지 않음</text>
  </g>

  <rect x="120" y="465" width="520" height="40" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="380" y="490" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">자식은 부모의 상태를 직접 바꾸지 않고, "바꿔달라"고 요청만 합니다</text>
</svg>
