<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="430" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">브라우저 렌더링 파이프라인</text>

  <defs>
    <marker id="arrowp1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Row 1: DOM (blue), CSSOM (aqua) -->
  <g>
    <rect x="60" y="90" width="300" height="90" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="82" cy="110" r="12" fill="#2a78d6"/>
    <text x="82" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="210" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">HTML 파싱 → DOM</text>
    <text x="210" y="152" text-anchor="middle" font-size="12" fill="#52514e">바이트 → 문자 → 토큰 → 노드</text>
    <text x="210" y="168" text-anchor="middle" font-size="12" fill="#52514e">동기 script가 실행되면 일시 정지</text>
  </g>

  <g>
    <rect x="760" y="90" width="300" height="90" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="782" cy="110" r="12" fill="#1baf7a"/>
    <text x="782" y="114" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="910" y="130" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">CSS 파싱 → CSSOM</text>
    <text x="910" y="152" text-anchor="middle" font-size="12" fill="#52514e">캐스케이딩 계산이 끝나야 완성</text>
    <text x="910" y="168" text-anchor="middle" font-size="12" fill="#52514e">렌더 차단(render-blocking) 리소스</text>
  </g>

  <!-- converging arrows -->
  <line x1="210" y1="180" x2="175" y2="248" stroke="#898781" stroke-width="2" marker-end="url(#arrowp1)"/>
  <line x1="910" y1="180" x2="175" y2="248" stroke="#898781" stroke-width="2" marker-end="url(#arrowp1)"/>

  <!-- Row 2: Render Tree (yellow), Layout (green), Paint (violet), Composite (red) -->
  <g>
    <rect x="60" y="250" width="230" height="90" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <circle cx="82" cy="270" r="12" fill="#eda100"/>
    <text x="82" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="175" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">렌더 트리</text>
    <text x="175" y="313" text-anchor="middle" font-size="12" fill="#52514e">화면에 그릴 노드만</text>
    <text x="175" y="328" text-anchor="middle" font-size="12" fill="#52514e">DOM+CSSOM 결합</text>
  </g>

  <line x1="290" y1="295" x2="320" y2="295" stroke="#898781" stroke-width="2" marker-end="url(#arrowp1)"/>

  <g>
    <rect x="320" y="250" width="230" height="90" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <circle cx="342" cy="270" r="12" fill="#008300"/>
    <text x="342" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="435" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">레이아웃</text>
    <text x="435" y="313" text-anchor="middle" font-size="12" fill="#52514e">위치·크기(px) 계산</text>
    <text x="435" y="328" text-anchor="middle" font-size="12" fill="#52514e">= 리플로우(reflow)</text>
  </g>

  <line x1="550" y1="295" x2="580" y2="295" stroke="#898781" stroke-width="2" marker-end="url(#arrowp1)"/>

  <g>
    <rect x="580" y="250" width="230" height="90" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <circle cx="602" cy="270" r="12" fill="#4a3aa7"/>
    <text x="602" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
    <text x="695" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">페인트</text>
    <text x="695" y="313" text-anchor="middle" font-size="12" fill="#52514e">색·테두리·그림자</text>
    <text x="695" y="328" text-anchor="middle" font-size="12" fill="#52514e">픽셀 값을 채움</text>
  </g>

  <line x1="810" y1="295" x2="840" y2="295" stroke="#898781" stroke-width="2" marker-end="url(#arrowp1)"/>

  <g>
    <rect x="840" y="250" width="230" height="90" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <circle cx="862" cy="270" r="12" fill="#e34948"/>
    <text x="862" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
    <text x="955" y="292" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">컴포지트</text>
    <text x="955" y="313" text-anchor="middle" font-size="12" fill="#52514e">레이어를 합성해</text>
    <text x="955" y="328" text-anchor="middle" font-size="12" fill="#52514e">최종 화면 완성</text>
  </g>

  <rect x="60" y="365" width="1010" height="50" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="565" y="386" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">동기 &lt;script&gt;는 DOM 생성을 일시 정지시키며, async/defer는 이 차단을 없앱니다</text>
  <text x="565" y="404" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">이 6단계의 순서는 W3C·WHATWG 표준과 렌더링 엔진 구현이 공통으로 따르는 구조입니다</text>
</svg>
