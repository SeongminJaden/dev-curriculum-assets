<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="420" fill="#fcfcfb"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">CSS 변경 종류별 재실행 비용 비교</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#52514e">막대 길이와 색의 짙기 = 다시 실행해야 하는 파이프라인 범위(비용)</text>

  <!-- Bar 1: Layout (reflow) - darkest, longest -->
  <g>
    <text x="60" y="118" font-size="15" font-weight="700" fill="#0b0b0b">레이아웃 변경 (리플로우)</text>
    <text x="60" y="138" font-size="12" fill="#52514e">예: width, height, top, left, font-size, display</text>
    <rect x="60" y="150" width="860" height="40" rx="8" fill="#0d366b"/>
    <text x="490" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">레이아웃 → 페인트 → 컴포지트 전체 재실행 (비용 최대)</text>
  </g>

  <!-- Bar 2: Paint (repaint) - medium -->
  <g>
    <text x="60" y="238" font-size="15" font-weight="700" fill="#0b0b0b">페인트 속성 변경 (리페인트)</text>
    <text x="60" y="258" font-size="12" fill="#52514e">예: background-color, color, box-shadow, visibility</text>
    <rect x="60" y="270" width="520" height="40" rx="8" fill="#3987e5"/>
    <text x="320" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">페인트 → 컴포지트만 재실행 (비용 보통)</text>
  </g>

  <!-- Bar 3: Composite only - lightest, shortest -->
  <g>
    <text x="60" y="358" font-size="15" font-weight="700" fill="#0b0b0b">컴포지터 속성 변경</text>
    <text x="60" y="378" font-size="12" fill="#52514e">예: transform, opacity</text>
    <rect x="60" y="390" width="220" height="24" rx="8" fill="#cde2fb"/>
    <text x="170" y="407" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">컴포지트만 재실행 (비용 최소)</text>
  </g>
</svg>
