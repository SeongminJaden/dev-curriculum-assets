<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="440" viewBox="0 0 1000 440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="440" fill="#fcfcfb"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">코드 스플리팅 전후 비교</text>

  <!-- Before: single bundle -->
  <text x="60" y="78" font-size="15" font-weight="700" fill="#0b0b0b">이전 — 하나의 번들</text>
  <g>
    <rect x="60" y="90" width="880" height="70" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="500" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">app.bundle.js</text>
    <text x="500" y="140" text-anchor="middle" font-size="11.5" fill="#52514e">상품 목록 + 결제 + 관리자 + 리뷰 작성 코드가 모두 한 파일에 포함</text>
  </g>
  <text x="945" y="130" text-anchor="middle" font-size="11" fill="#52514e" transform="rotate(90 945 130)"></text>
  <line x1="60" y1="175" x2="940" y2="175" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="500" y="192" text-anchor="middle" font-size="12" fill="#52514e">상품 목록만 보려는 사용자도 결제·관리자·리뷰 코드까지 전부 내려받아야 화면이 뜬다</text>

  <!-- Down arrow -->
  <defs>
    <marker id="arrowcs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>
  <line x1="500" y1="205" x2="500" y2="235" stroke="#898781" stroke-width="2.5" marker-end="url(#arrowcs)"/>
  <text x="520" y="225" font-size="12" font-weight="700" fill="#0b0b0b">동적 import()로 분리</text>

  <!-- After: split bundles -->
  <text x="60" y="270" font-size="15" font-weight="700" fill="#0b0b0b">이후 — 라우트별로 분리된 번들</text>

  <g>
    <rect x="60" y="285" width="200" height="90" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="160" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">product-list.js</text>
    <text x="160" y="335" text-anchor="middle" font-size="11" fill="#52514e">상품 목록 페이지</text>
    <text x="160" y="352" text-anchor="middle" font-size="11" fill="#008300" font-weight="700">즉시 로드</text>
  </g>

  <g>
    <rect x="290" y="285" width="200" height="90" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="390" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">checkout.js</text>
    <text x="390" y="335" text-anchor="middle" font-size="11" fill="#52514e">결제 페이지</text>
    <text x="390" y="352" text-anchor="middle" font-size="11" fill="#52514e">결제 진입 시 로드</text>
  </g>

  <g>
    <rect x="520" y="285" width="200" height="90" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <text x="620" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">admin.js</text>
    <text x="620" y="335" text-anchor="middle" font-size="11" fill="#52514e">관리자 페이지</text>
    <text x="620" y="352" text-anchor="middle" font-size="11" fill="#52514e">관리자 진입 시 로드</text>
  </g>

  <g>
    <rect x="750" y="285" width="200" height="90" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <text x="850" y="315" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">review-write.js</text>
    <text x="850" y="335" text-anchor="middle" font-size="11" fill="#52514e">리뷰 작성 페이지</text>
    <text x="850" y="352" text-anchor="middle" font-size="11" fill="#52514e">리뷰 작성 진입 시 로드</text>
  </g>

  <rect x="60" y="395" width="890" height="30" rx="8" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="505" y="415" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">상품 목록 페이지 사용자는 product-list.js 하나만 먼저 내려받는다</text>
</svg>
