<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="900" height="480" fill="#fcfcfb"/>
  <text x="450" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">병목의 실체 — 명령어와 데이터가 같은 통로를 다툰다</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#52514e">CPU와 기억장치 사이에 버스가 하나뿐이라, 같은 시각에 둘 중 하나만 오갈 수 있습니다</text>

  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- CPU box -->
  <rect x="40" y="90" width="160" height="80" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="120" y="135" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">CPU</text>

  <!-- single bus -->
  <line x1="200" y1="130" x2="330" y2="130" stroke="#e34948" stroke-width="4"/>
  <text x="265" y="115" text-anchor="middle" font-size="11.5" font-weight="700" fill="#e34948">단일 버스(하나뿐)</text>

  <!-- Memory box with instruction/data region -->
  <rect x="330" y="90" width="260" height="80" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
  <text x="460" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">기억장치</text>
  <rect x="345" y="122" width="110" height="36" rx="6" fill="#eda100" fill-opacity="0.22" stroke="#eda100" stroke-width="1.5"/>
  <text x="400" y="144" text-anchor="middle" font-size="10.5" fill="#0b0b0b">명령어 영역</text>
  <rect x="465" y="122" width="110" height="36" rx="6" fill="#eda100" fill-opacity="0.22" stroke="#eda100" stroke-width="1.5"/>
  <text x="520" y="144" text-anchor="middle" font-size="10.5" fill="#0b0b0b">데이터 영역</text>

  <!-- timeline of bus usage -->
  <text x="450" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">같은 버스를 시간 순으로 나누어 써야 한다</text>

  <g>
    <rect x="60" y="250" width="150" height="60" rx="8" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2"/>
    <text x="135" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">t1</text>
    <text x="135" y="295" text-anchor="middle" font-size="11.5" fill="#52514e">명령어 인출</text>
  </g>
  <line x1="210" y1="280" x2="240" y2="280" stroke="#898781" stroke-width="2" marker-end="url(#arrowB)"/>
  <g>
    <rect x="245" y="250" width="150" height="60" rx="8" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2"/>
    <text x="320" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">t2</text>
    <text x="320" y="295" text-anchor="middle" font-size="11.5" fill="#52514e">데이터 접근</text>
  </g>
  <line x1="395" y1="280" x2="425" y2="280" stroke="#898781" stroke-width="2" marker-end="url(#arrowB)"/>
  <g>
    <rect x="430" y="250" width="150" height="60" rx="8" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2"/>
    <text x="505" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">t3</text>
    <text x="505" y="295" text-anchor="middle" font-size="11.5" fill="#52514e">명령어 인출</text>
  </g>
  <line x1="580" y1="280" x2="610" y2="280" stroke="#898781" stroke-width="2" marker-end="url(#arrowB)"/>
  <g>
    <rect x="615" y="250" width="150" height="60" rx="8" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2"/>
    <text x="690" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">t4</text>
    <text x="690" y="295" text-anchor="middle" font-size="11.5" fill="#52514e">데이터 접근</text>
  </g>

  <rect x="60" y="350" width="705" height="90" rx="10" fill="#898781" fill-opacity="0.06" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="90" y="378" font-size="12.5" fill="#0b0b0b" font-weight="700">CPU 연산 속도가 기억장치 접근 속도보다 훨씬 빠르게 발전하면서,</text>
  <text x="90" y="400" font-size="12.5" fill="#0b0b0b" font-weight="700">CPU는 이 버스가 비워지기를 기다리는 시간이 점점 길어진다 — 이것이 폰노이만 병목이다.</text>
  <text x="90" y="422" font-size="12" fill="#52514e">(하버드 구조는 명령어 버스와 데이터 버스를 분리해 이 문제를 완화한다 — Part 4에서 다룹니다)</text>
</svg>
