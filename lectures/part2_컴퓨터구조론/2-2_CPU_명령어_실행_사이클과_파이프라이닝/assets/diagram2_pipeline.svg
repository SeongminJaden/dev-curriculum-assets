<svg xmlns="http://www.w3.org/2000/svg" width="810" height="660" viewBox="0 0 810 660" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="810" height="660" fill="#fcfcfb"/>
  <text x="405" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">5단계 파이프라인 — 명령어들이 단계를 겹쳐 흐른다</text>
  <text x="405" y="53" text-anchor="middle" font-size="13" fill="#52514e">클럭 사이클 1~9 동안 5개 명령어가 동시에 서로 다른 단계를 지나갑니다</text>

  <!-- cycle header -->
  <text x="90" y="94" text-anchor="middle" font-size="12" font-weight="700" fill="#52514e">명령어</text>
  <g font-size="12" font-weight="700" fill="#52514e" text-anchor="middle">
    <text x="175" y="94">1</text>
    <text x="245" y="94">2</text>
    <text x="315" y="94">3</text>
    <text x="385" y="94">4</text>
    <text x="455" y="94">5</text>
    <text x="525" y="94">6</text>
    <text x="595" y="94">7</text>
    <text x="665" y="94">8</text>
    <text x="735" y="94">9</text>
  </g>
  <line x1="140" y1="102" x2="770" y2="102" stroke="#c3c2b7" stroke-width="1"/>

  <!-- row labels -->
  <g font-size="13" font-weight="700" fill="#0b0b0b">
    <text x="90" y="165">I1</text>
    <text x="90" y="215">I2</text>
    <text x="90" y="265">I3</text>
    <text x="90" y="315">I4</text>
    <text x="90" y="365">I5</text>
  </g>

  <!-- stage cell helper colors: IF blue, ID aqua, EX yellow, MEM green, WB violet -->
  <!-- I1 row y=140 -->
  <g>
    <rect x="140" y="140" width="66" height="40" rx="6" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/><text x="173" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">IF</text>
    <rect x="210" y="140" width="66" height="40" rx="6" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="2"/><text x="243" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">ID</text>
    <rect x="280" y="140" width="66" height="40" rx="6" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="2"/><text x="313" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">EX</text>
    <rect x="350" y="140" width="66" height="40" rx="6" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2"/><text x="383" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">MEM</text>
    <rect x="420" y="140" width="66" height="40" rx="6" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="2"/><text x="453" y="165" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">WB</text>
  </g>
  <!-- I2 row y=190 -->
  <g>
    <rect x="210" y="190" width="66" height="40" rx="6" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/><text x="243" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">IF</text>
    <rect x="280" y="190" width="66" height="40" rx="6" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="2"/><text x="313" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">ID</text>
    <rect x="350" y="190" width="66" height="40" rx="6" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="2"/><text x="383" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">EX</text>
    <rect x="420" y="190" width="66" height="40" rx="6" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2"/><text x="453" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">MEM</text>
    <rect x="490" y="190" width="66" height="40" rx="6" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="2"/><text x="523" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">WB</text>
  </g>
  <!-- I3 row y=240 -->
  <g>
    <rect x="280" y="240" width="66" height="40" rx="6" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/><text x="313" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">IF</text>
    <rect x="350" y="240" width="66" height="40" rx="6" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="2"/><text x="383" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">ID</text>
    <rect x="420" y="240" width="66" height="40" rx="6" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="2"/><text x="453" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">EX</text>
    <rect x="490" y="240" width="66" height="40" rx="6" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2"/><text x="523" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">MEM</text>
    <rect x="560" y="240" width="66" height="40" rx="6" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="2"/><text x="593" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">WB</text>
  </g>
  <!-- I4 row y=290 -->
  <g>
    <rect x="350" y="290" width="66" height="40" rx="6" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/><text x="383" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">IF</text>
    <rect x="420" y="290" width="66" height="40" rx="6" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="2"/><text x="453" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">ID</text>
    <rect x="490" y="290" width="66" height="40" rx="6" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="2"/><text x="523" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">EX</text>
    <rect x="560" y="290" width="66" height="40" rx="6" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2"/><text x="593" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">MEM</text>
    <rect x="630" y="290" width="66" height="40" rx="6" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="2"/><text x="663" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">WB</text>
  </g>
  <!-- I5 row y=340 -->
  <g>
    <rect x="420" y="340" width="66" height="40" rx="6" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/><text x="453" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">IF</text>
    <rect x="490" y="340" width="66" height="40" rx="6" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="2"/><text x="523" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">ID</text>
    <rect x="560" y="340" width="66" height="40" rx="6" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="2"/><text x="593" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">EX</text>
    <rect x="630" y="340" width="66" height="40" rx="6" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2"/><text x="663" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">MEM</text>
    <rect x="700" y="340" width="66" height="40" rx="6" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="2"/><text x="733" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">WB</text>
  </g>

  <!-- legend -->
  <g font-size="11.5" fill="#52514e">
    <rect x="140" y="405" width="16" height="16" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="1.5"/><text x="162" y="418">IF 인출</text>
    <rect x="230" y="405" width="16" height="16" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="1.5"/><text x="252" y="418">ID 해독</text>
    <rect x="320" y="405" width="16" height="16" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="1.5"/><text x="342" y="418">EX 실행</text>
    <rect x="410" y="405" width="16" height="16" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="1.5"/><text x="432" y="418">MEM 메모리 접근</text>
    <rect x="560" y="405" width="16" height="16" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="1.5"/><text x="582" y="418">WB 결과 저장</text>
  </g>

  <line x1="90" y1="440" x2="770" y2="440" stroke="#c3c2b7" stroke-width="1"/>

  <!-- hazard example -->
  <text x="90" y="465" font-size="13" font-weight="700" fill="#0b0b0b">데이터 해저드가 있을 때 — 뒤 명령어가 결과를 기다린다</text>

  <g>
    <text x="90" y="510" font-size="13" font-weight="700" fill="#0b0b0b">Ia</text>
    <rect x="140" y="490" width="66" height="40" rx="6" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/><text x="173" y="515" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">IF</text>
    <rect x="210" y="490" width="66" height="40" rx="6" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="2"/><text x="243" y="515" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">ID</text>
    <rect x="280" y="490" width="66" height="40" rx="6" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="2"/><text x="313" y="515" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">EX</text>
    <rect x="350" y="490" width="66" height="40" rx="6" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2"/><text x="383" y="515" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">MEM</text>
    <rect x="420" y="490" width="66" height="40" rx="6" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="2"/><text x="453" y="515" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">WB</text>
  </g>
  <g>
    <text x="90" y="560" font-size="13" font-weight="700" fill="#0b0b0b">Ib</text>
    <rect x="210" y="540" width="66" height="40" rx="6" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2"/><text x="243" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">IF</text>
    <rect x="280" y="540" width="66" height="40" rx="6" fill="#1baf7a" fill-opacity="0.16" stroke="#1baf7a" stroke-width="2"/><text x="313" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">ID</text>
    <rect x="350" y="540" width="66" height="40" rx="6" fill="#898781" fill-opacity="0.18" stroke="#898781" stroke-width="2" stroke-dasharray="4 3"/><text x="383" y="565" text-anchor="middle" font-size="10.5" font-weight="700" fill="#52514e">버블</text>
    <rect x="420" y="540" width="66" height="40" rx="6" fill="#eda100" fill-opacity="0.20" stroke="#eda100" stroke-width="2"/><text x="453" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">EX</text>
    <rect x="490" y="540" width="66" height="40" rx="6" fill="#008300" fill-opacity="0.14" stroke="#008300" stroke-width="2"/><text x="523" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">MEM</text>
    <rect x="560" y="540" width="66" height="40" rx="6" fill="#4a3aa7" fill-opacity="0.16" stroke="#4a3aa7" stroke-width="2"/><text x="593" y="565" text-anchor="middle" font-size="11" font-weight="700" fill="#0b0b0b">WB</text>
  </g>

  <rect x="90" y="600" width="680" height="46" rx="10" fill="#898781" fill-opacity="0.06" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="430" y="628" text-anchor="middle" font-size="12" fill="#0b0b0b" font-weight="700">Ib의 EX 단계가 Ia의 결과값이 필요해 대기하며 파이프라인에 "버블"이 하나 삽입됩니다</text>
</svg>
