<svg xmlns="http://www.w3.org/2000/svg" width="820" height="640" viewBox="0 0 820 640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="820" height="640" fill="#fcfcfb"/>
  <text x="410" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">암달의 법칙 — 코어를 늘려도 속도 향상은 한계에 수렴한다</text>
  <text x="410" y="56" text-anchor="middle" font-size="13" fill="#52514e">병렬화 가능 비율(P)이 높을수록 곡선이 더 높은 값에서 수렴합니다</text>

  <!-- gridlines -->
  <g stroke="#e5e4de" stroke-width="1">
    <line x1="100" y1="500" x2="760" y2="500"/>
    <line x1="100" y1="397.5" x2="760" y2="397.5"/>
    <line x1="100" y1="295" x2="760" y2="295"/>
    <line x1="100" y1="192.5" x2="760" y2="192.5"/>
    <line x1="100" y1="90" x2="760" y2="90"/>
  </g>
  <g font-size="11.5" fill="#52514e" text-anchor="end">
    <text x="92" y="504">0</text>
    <text x="92" y="401.5">4</text>
    <text x="92" y="299">8</text>
    <text x="92" y="196.5">12</text>
    <text x="92" y="94">16</text>
  </g>
  <text x="40" y="300" text-anchor="middle" font-size="12.5" font-weight="700" fill="#52514e" transform="rotate(-90 40 300)">속도 향상(Speedup)</text>

  <!-- axes -->
  <line x1="100" y1="500" x2="760" y2="500" stroke="#898781" stroke-width="1.5"/>
  <line x1="100" y1="90" x2="100" y2="500" stroke="#898781" stroke-width="1.5"/>

  <!-- x labels -->
  <g font-size="12" fill="#52514e" text-anchor="middle">
    <text x="100" y="522">1</text>
    <text x="210" y="522">2</text>
    <text x="320" y="522">4</text>
    <text x="430" y="522">8</text>
    <text x="540" y="522">16</text>
    <text x="650" y="522">32</text>
    <text x="760" y="522">64</text>
  </g>
  <text x="430" y="548" text-anchor="middle" font-size="12.5" font-weight="700" fill="#52514e">프로세서(코어) 수 N</text>

  <!-- P=0.5 curve -->
  <polyline points="100,474.4 210,465.8 320,459 430,454.4 540,451.7 650,450.3 760,449.5" fill="none" stroke="#cde2fb" stroke-width="3.5"/>
  <!-- P=0.75 curve -->
  <polyline points="100,474.4 210,459 320,441.4 430,425.4 540,413.6 650,406.2 760,401.8" fill="none" stroke="#7fb2ea" stroke-width="3.5"/>
  <!-- P=0.9 curve -->
  <polyline points="100,474.4 210,453.4 320,421.1 430,379.4 540,336 650,300.1 760,275.3" fill="none" stroke="#3987e5" stroke-width="3.5"/>
  <!-- P=0.95 curve -->
  <polyline points="100,474.4 210,451.2 320,410.9 430,348.1 540,265.7 650,178.3 760,104.7" fill="none" stroke="#0d366b" stroke-width="3.5"/>

  <!-- legend -->
  <g font-size="12.5" font-weight="700">
    <line x1="500" y1="565" x2="530" y2="565" stroke="#cde2fb" stroke-width="4"/>
    <text x="538" y="569" fill="#0b0b0b">P = 0.5</text>
    <line x1="500" y1="588" x2="530" y2="588" stroke="#7fb2ea" stroke-width="4"/>
    <text x="538" y="592" fill="#0b0b0b">P = 0.75</text>
    <line x1="640" y1="565" x2="670" y2="565" stroke="#3987e5" stroke-width="4"/>
    <text x="678" y="569" fill="#0b0b0b">P = 0.9</text>
    <line x1="640" y1="588" x2="670" y2="588" stroke="#0d366b" stroke-width="4"/>
    <text x="678" y="592" fill="#0b0b0b">P = 0.95</text>
  </g>

  <rect x="100" y="610" width="660" height="22" fill="none"/>
  <text x="100" y="625" font-size="11.5" fill="#52514e">P = 프로그램 중 병렬화 가능한 부분의 비율 (직렬 구간은 1 − P)</text>
</svg>
