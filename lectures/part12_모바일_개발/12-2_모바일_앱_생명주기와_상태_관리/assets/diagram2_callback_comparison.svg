<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="700" viewBox="0 0 1040 700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1040" height="700" fill="#fcfcfb"/>
  <text x="520" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">iOS / Android 생명주기 콜백 비교</text>
  <text x="520" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 높이의 행은 같은 단계에 대응하는 콜백입니다</text>

  <text x="270" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">iOS (UIApplicationDelegate)</text>
  <text x="770" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">Android (Activity)</text>

  <defs>
    <marker id="cc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Row 1 blue: launch/create -->
  <g>
    <rect x="40" y="112" width="440" height="78" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="70" y="140" font-size="14" font-weight="700" fill="#0b0b0b">application(_:didFinishLaunchingWithOptions:)</text>
    <text x="70" y="160" font-size="11.5" fill="#52514e">최초 실행 시 한 번 호출, 초기 설정 담당</text>

    <rect x="560" y="112" width="440" height="78" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="590" y="140" font-size="14" font-weight="700" fill="#0b0b0b">onCreate()</text>
    <text x="590" y="160" font-size="11.5" fill="#52514e">액티비티 최초 생성, 뷰 초기화</text>
  </g>
  <line x1="270" y1="190" x2="270" y2="208" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>
  <line x1="770" y1="190" x2="770" y2="208" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>

  <!-- Row 2 aqua: foreground transition -->
  <g>
    <rect x="40" y="210" width="440" height="78" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="70" y="238" font-size="14" font-weight="700" fill="#0b0b0b">applicationWillEnterForeground(_:)</text>
    <text x="70" y="258" font-size="11.5" fill="#52514e">Background에서 돌아오기 직전 (Inactive)</text>

    <rect x="560" y="210" width="440" height="78" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="590" y="238" font-size="14" font-weight="700" fill="#0b0b0b">onStart()</text>
    <text x="590" y="258" font-size="11.5" fill="#52514e">화면이 보이기 시작 (아직 입력 불가)</text>
  </g>
  <line x1="270" y1="288" x2="270" y2="306" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>
  <line x1="770" y1="288" x2="770" y2="306" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>

  <!-- Row 3 yellow: active/resume -->
  <g>
    <rect x="40" y="308" width="440" height="78" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="70" y="336" font-size="14" font-weight="700" fill="#0b0b0b">applicationDidBecomeActive(_:)</text>
    <text x="70" y="356" font-size="11.5" fill="#52514e">Active 상태 진입, 입력 수신 시작</text>

    <rect x="560" y="308" width="440" height="78" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="590" y="336" font-size="14" font-weight="700" fill="#0b0b0b">onResume()</text>
    <text x="590" y="356" font-size="11.5" fill="#52514e">Resumed 상태 진입, 입력 수신 시작</text>
  </g>
  <line x1="270" y1="386" x2="270" y2="404" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>
  <line x1="770" y1="386" x2="770" y2="404" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>

  <!-- Row 4 green: leaving foreground -->
  <g>
    <rect x="40" y="406" width="440" height="78" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="70" y="434" font-size="14" font-weight="700" fill="#0b0b0b">applicationDidEnterBackground(_:)</text>
    <text x="70" y="454" font-size="11.5" fill="#52514e">여기서 미리 상태를 저장해야 함</text>

    <rect x="560" y="406" width="440" height="78" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="590" y="434" font-size="14" font-weight="700" fill="#0b0b0b">onPause() → onStop()</text>
    <text x="590" y="454" font-size="11.5" fill="#52514e">onSaveInstanceState(Bundle)로 상태 저장</text>
  </g>
  <line x1="270" y1="484" x2="270" y2="502" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>
  <line x1="770" y1="484" x2="770" y2="502" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>

  <!-- Row 5 violet: suspended/stopped, held in memory -->
  <g>
    <rect x="40" y="504" width="440" height="78" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <text x="70" y="532" font-size="14" font-weight="700" fill="#0b0b0b">(Suspended — 콜백 없음)</text>
    <text x="70" y="552" font-size="11.5" fill="#52514e">코드 실행은 멈추고 메모리에만 남아 있음</text>

    <rect x="560" y="504" width="440" height="78" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <text x="590" y="532" font-size="14" font-weight="700" fill="#0b0b0b">(Stopped — 콜백 없음)</text>
    <text x="590" y="552" font-size="11.5" fill="#52514e">프로세스 유지 시도, 실행은 정지</text>
  </g>
  <line x1="270" y1="582" x2="270" y2="600" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>
  <line x1="770" y1="582" x2="770" y2="600" stroke="#898781" stroke-width="2" marker-end="url(#cc)"/>

  <!-- Row 6 red: termination, not guaranteed -->
  <g>
    <rect x="40" y="602" width="440" height="78" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <text x="70" y="630" font-size="14" font-weight="700" fill="#0b0b0b">applicationWillTerminate(_:)</text>
    <text x="70" y="650" font-size="11.5" fill="#52514e">Suspended 중 강제 종료 시 호출 보장 안 됨</text>

    <rect x="560" y="602" width="440" height="78" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <text x="590" y="630" font-size="14" font-weight="700" fill="#0b0b0b">onDestroy()</text>
    <text x="590" y="650" font-size="11.5" fill="#52514e">프로세스 강제 종료 시 호출 보장 안 됨</text>
  </g>
</svg>
