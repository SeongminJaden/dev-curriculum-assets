<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="300" viewBox="0 0 1000 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1000" height="300" fill="#fcfcfb"/>
  <text x="500" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">셀룰러 라디오의 전력 상태 전이</text>
  <text x="500" y="56" text-anchor="middle" font-size="13" fill="#52514e">요청이 끝나도 라디오는 곧바로 잠들지 않고, 테일 타임만큼 고전력 상태를 유지합니다</text>

  <defs>
    <marker id="rs" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <line x1="220" y1="160" x2="260" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#rs)"/>
  <line x1="440" y1="160" x2="480" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#rs)"/>
  <line x1="660" y1="160" x2="700" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#rs)"/>
  <path d="M 880 210 C 880 250, 130 250, 130 210" stroke="#898781" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#rs)"/>
  <text x="500" y="284" text-anchor="middle" font-size="12" fill="#52514e">테일 타임이 끝나면 다시 Idle로 내려가고, 새 요청이 오면 이 순환이 반복됩니다</text>

  <!-- 1. Idle (blue) -->
  <g>
    <rect x="40" y="110" width="180" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="60" cy="128" r="12" fill="#2a78d6"/>
    <text x="60" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="130" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Idle</text>
    <text x="130" y="178" text-anchor="middle" font-size="11.5" fill="#52514e">데이터를 주고받지</text>
    <text x="130" y="194" text-anchor="middle" font-size="11.5" fill="#52514e">않아 전력 거의 없음</text>
  </g>

  <!-- 2. Promotion (aqua) -->
  <g>
    <rect x="260" y="110" width="180" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="280" cy="128" r="12" fill="#1baf7a"/>
    <text x="280" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="350" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Promotion</text>
    <text x="350" y="178" text-anchor="middle" font-size="11.5" fill="#52514e">요청 시작, 고전력</text>
    <text x="350" y="194" text-anchor="middle" font-size="11.5" fill="#52514e">상태로 전환 중</text>
  </g>

  <!-- 3. Full Power (yellow) -->
  <g>
    <rect x="480" y="110" width="180" height="100" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <circle cx="500" cy="128" r="12" fill="#eda100"/>
    <text x="500" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="570" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Full Power</text>
    <text x="570" y="178" text-anchor="middle" font-size="11.5" fill="#52514e">실제 데이터 송수신,</text>
    <text x="570" y="194" text-anchor="middle" font-size="11.5" fill="#52514e">전력 사용 최대</text>
  </g>

  <!-- 4. Tail Time (red) -->
  <g>
    <rect x="700" y="110" width="180" height="100" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <circle cx="720" cy="128" r="12" fill="#e34948"/>
    <text x="720" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="790" y="155" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Tail Time</text>
    <text x="790" y="178" text-anchor="middle" font-size="11.5" fill="#52514e">전송 종료 후에도</text>
    <text x="790" y="194" text-anchor="middle" font-size="11.5" fill="#52514e">고전력 상태 유지</text>
  </g>
</svg>
