<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="620" viewBox="0 0 1160 620" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1160" height="620" fill="#fcfcfb"/>
  <text x="580" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">네이티브 · React Native · Flutter 렌더링 아키텍처 비교</text>
  <text x="580" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 높이의 행은 같은 역할의 레이어입니다 — 코드 → 화면 구성 → 합성/렌더링 → GPU</text>

  <!-- column headers -->
  <text x="210" y="102" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">네이티브</text>
  <text x="580" y="102" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">React Native</text>
  <text x="950" y="102" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">Flutter</text>

  <!-- Row 1 (blue) -->
  <g>
    <rect x="40" y="120" width="340" height="80" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="210" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Swift / Kotlin 코드</text>
    <text x="210" y="172" text-anchor="middle" font-size="11.5" fill="#52514e">ARM 네이티브 코드로 컴파일</text>

    <rect x="410" y="120" width="340" height="80" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="580" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">JavaScript 코드</text>
    <text x="580" y="172" text-anchor="middle" font-size="11.5" fill="#52514e">Hermes / JSC 엔진에서 실행</text>

    <rect x="780" y="120" width="340" height="80" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="950" y="152" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Dart 코드</text>
    <text x="950" y="172" text-anchor="middle" font-size="11.5" fill="#52514e">AOT로 네이티브 머신 코드 컴파일</text>
  </g>

  <!-- arrows row1->row2 -->
  <line x1="210" y1="200" x2="210" y2="220" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="580" y1="200" x2="580" y2="220" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="950" y1="200" x2="950" y2="220" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Row 2 (aqua) -->
  <g>
    <rect x="40" y="220" width="340" height="80" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="210" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">UIKit / View 시스템</text>
    <text x="210" y="272" text-anchor="middle" font-size="11.5" fill="#52514e">실제 네이티브 위젯으로 화면 구성</text>

    <rect x="410" y="220" width="340" height="80" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="580" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">브리지 / JSI</text>
    <text x="580" y="272" text-anchor="middle" font-size="11.5" fill="#52514e">레이아웃 값·이벤트를 네이티브로 전달</text>

    <rect x="780" y="220" width="340" height="80" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="950" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Flutter 프레임워크</text>
    <text x="950" y="272" text-anchor="middle" font-size="11.5" fill="#52514e">위젯 트리를 구성 (Material/Cupertino)</text>
  </g>

  <line x1="210" y1="300" x2="210" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="580" y1="300" x2="580" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="950" y1="300" x2="950" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Row 3 (yellow) -->
  <g>
    <rect x="40" y="320" width="340" height="80" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="210" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Core Animation / 컴포지터</text>
    <text x="210" y="372" text-anchor="middle" font-size="11.5" fill="#52514e">OS가 레이어를 합성</text>

    <rect x="410" y="320" width="340" height="80" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="580" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">네이티브 UIView / View</text>
    <text x="580" y="372" text-anchor="middle" font-size="11.5" fill="#52514e">진짜 네이티브 컴포넌트가 그려짐</text>

    <rect x="780" y="320" width="340" height="80" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="950" y="352" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Skia / Impeller 엔진</text>
    <text x="950" y="372" text-anchor="middle" font-size="11.5" fill="#52514e">버튼·텍스트를 픽셀 단위로 직접 그림</text>
  </g>

  <line x1="210" y1="400" x2="210" y2="420" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="580" y1="400" x2="580" y2="420" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>
  <line x1="950" y1="400" x2="950" y2="420" stroke="#898781" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Row 4 (green) -->
  <g>
    <rect x="40" y="420" width="340" height="80" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="210" y="452" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">GPU → 화면</text>
    <text x="210" y="472" text-anchor="middle" font-size="11.5" fill="#52514e">플랫폼 고유 위젯 그대로 출력</text>

    <rect x="410" y="420" width="340" height="80" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="580" y="452" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">GPU → 화면</text>
    <text x="580" y="472" text-anchor="middle" font-size="11.5" fill="#52514e">네이티브 위젯 그대로 출력</text>

    <rect x="780" y="420" width="340" height="80" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="950" y="452" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">GPU → 화면</text>
    <text x="950" y="472" text-anchor="middle" font-size="11.5" fill="#52514e">엔진이 그린 캔버스 그대로 출력</text>
  </g>

  <defs>
    <marker id="a1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <rect x="40" y="530" width="1080" height="70" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="580" y="558" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">네이티브·React Native는 3행에서 "진짜 네이티브 위젯"을 사용하지만,</text>
  <text x="580" y="578" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">Flutter는 3행에서 위젯을 흉내 낸 그림을 직접 그립니다</text>
</svg>
