<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="440" viewBox="0 0 1120 440" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="440" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">사이클과 연결 요소</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">정점 8개, 간선 8개 — 하지만 하나의 덩어리가 아니라 3개의 섬으로 나뉩니다</text>

  <!-- Component 1 (blue) : cycle A-B-C-D-A -->
  <g>
    <rect x="40" y="90" width="360" height="310" rx="12" fill="#2a78d6" fill-opacity="0.08" stroke="#2a78d6" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="220" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#2a78d6">연결 요소 1 — 사이클 있음</text>
    <!-- edges -->
    <line x1="130" y1="180" x2="300" y2="180" stroke="#2a78d6" stroke-width="2.5"/>
    <line x1="300" y1="180" x2="300" y2="320" stroke="#2a78d6" stroke-width="2.5"/>
    <line x1="300" y1="320" x2="130" y2="320" stroke="#2a78d6" stroke-width="2.5"/>
    <line x1="130" y1="320" x2="130" y2="180" stroke="#2a78d6" stroke-width="2.5"/>
    <!-- nodes -->
    <circle cx="130" cy="180" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/><text x="130" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">A</text>
    <circle cx="300" cy="180" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/><text x="300" y="185" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">B</text>
    <circle cx="300" cy="320" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/><text x="300" y="325" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">C</text>
    <circle cx="130" cy="320" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/><text x="130" y="325" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">D</text>
    <text x="220" y="370" text-anchor="middle" font-size="11.5" fill="#52514e">A→B→C→D→A 로 되돌아옴 = 사이클</text>
  </g>

  <!-- Component 2 (green) : tree, no cycle -->
  <g>
    <rect x="420" y="90" width="300" height="310" rx="12" fill="#1baf7a" fill-opacity="0.08" stroke="#1baf7a" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="570" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1baf7a">연결 요소 2 — 사이클 없음</text>
    <line x1="570" y1="175" x2="500" y2="270" stroke="#1baf7a" stroke-width="2.5"/>
    <line x1="570" y1="175" x2="640" y2="270" stroke="#1baf7a" stroke-width="2.5"/>
    <line x1="500" y1="270" x2="500" y2="345" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="570" cy="175" r="22" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/><text x="570" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">E</text>
    <circle cx="500" cy="270" r="22" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/><text x="500" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">F</text>
    <circle cx="640" cy="270" r="22" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/><text x="640" y="275" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">G</text>
    <circle cx="500" cy="345" r="22" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/><text x="500" y="350" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">H</text>
    <text x="570" y="385" text-anchor="middle" font-size="11.5" fill="#52514e">간선 3개 = 정점 4개 − 1 → 트리</text>
  </g>

  <!-- Component 3 (orange) : single isolated vertex -->
  <g>
    <rect x="740" y="90" width="340" height="310" rx="12" fill="#d97706" fill-opacity="0.08" stroke="#d97706" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="910" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">연결 요소 3 — 고립 정점</text>
    <circle cx="910" cy="240" r="22" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/><text x="910" y="245" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">I</text>
    <text x="910" y="300" text-anchor="middle" font-size="11.5" fill="#52514e">간선이 하나도 없어도</text>
    <text x="910" y="317" text-anchor="middle" font-size="11.5" fill="#52514e">그 자체로 하나의 연결 요소</text>
  </g>

  <text x="560" y="425" text-anchor="middle" font-size="12" fill="#0b0b0b">A에서 시작한 탐색은 연결 요소 1을 벗어나지 못합니다 → 모든 정점 방문을 보장하려면 남은 정점마다 새 탐색을 시작해야 합니다</text>
</svg>
