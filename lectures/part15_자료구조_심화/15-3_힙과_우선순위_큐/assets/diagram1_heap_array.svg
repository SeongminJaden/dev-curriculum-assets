<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="480" viewBox="0 0 1120 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="480" fill="#fcfcfb"/>
  <defs>
    <marker id="arrBlue3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a78d6"/>
    </marker>
  </defs>

  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">최소 힙 — 완전 이진 트리와 배열의 일대일 대응</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">빈칸이 없기 때문에 레벨 순서 번호가 배열 인덱스와 정확히 일치합니다</text>

  <!-- 트리 영역 -->
  <rect x="40" y="82" width="700" height="250" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="66" y="108" font-size="14" font-weight="700" fill="#0b0b0b">개념상의 완전 이진 트리 (노드 아래 숫자 = 배열 인덱스)</text>

  <line x1="390" y1="152" x2="270" y2="206" stroke="#2a78d6" stroke-width="2"/>
  <line x1="390" y1="152" x2="510" y2="206" stroke="#2a78d6" stroke-width="2"/>
  <line x1="258" y1="244" x2="188" y2="284" stroke="#2a78d6" stroke-width="2"/>
  <line x1="258" y1="244" x2="328" y2="284" stroke="#2a78d6" stroke-width="2"/>
  <line x1="522" y1="244" x2="452" y2="284" stroke="#2a78d6" stroke-width="2"/>
  <line x1="522" y1="244" x2="592" y2="284" stroke="#2a78d6" stroke-width="2"/>

  <circle cx="390" cy="140" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="390" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">3</text>
  <text x="390" y="178" text-anchor="middle" font-size="11.5" fill="#52514e">[0]</text>

  <circle cx="258" cy="222" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="258" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">8</text>
  <text x="258" y="260" text-anchor="middle" font-size="11.5" fill="#52514e">[1]</text>

  <circle cx="522" cy="222" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="522" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">5</text>
  <text x="522" y="260" text-anchor="middle" font-size="11.5" fill="#52514e">[2]</text>

  <circle cx="176" cy="296" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="176" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">15</text>
  <text x="176" y="326" text-anchor="middle" font-size="11.5" fill="#52514e">[3]</text>

  <circle cx="340" cy="296" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="340" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">12</text>
  <text x="340" y="326" text-anchor="middle" font-size="11.5" fill="#52514e">[4]</text>

  <circle cx="440" cy="296" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="440" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">9</text>
  <text x="440" y="326" text-anchor="middle" font-size="11.5" fill="#52514e">[5]</text>

  <circle cx="604" cy="296" r="22" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
  <text x="604" y="302" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">7</text>
  <text x="604" y="326" text-anchor="middle" font-size="11.5" fill="#52514e">[6]</text>

  <!-- 공식 카드 -->
  <rect x="760" y="82" width="320" height="250" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="786" y="108" font-size="14" font-weight="700" fill="#0b0b0b">인덱스 산술 (0-기반)</text>
  <line x1="786" y1="120" x2="1054" y2="120" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>

  <text x="786" y="150" font-size="13" font-weight="700" fill="#8b5cf6">왼쪽 자식</text>
  <text x="1054" y="150" text-anchor="end" font-size="13" fill="#0b0b0b">2i + 1</text>
  <text x="786" y="178" font-size="13" font-weight="700" fill="#8b5cf6">오른쪽 자식</text>
  <text x="1054" y="178" text-anchor="end" font-size="13" fill="#0b0b0b">2i + 2</text>
  <text x="786" y="206" font-size="13" font-weight="700" fill="#8b5cf6">부모</text>
  <text x="1054" y="206" text-anchor="end" font-size="13" fill="#0b0b0b">(i - 1) / 2 내림</text>

  <line x1="786" y1="222" x2="1054" y2="222" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
  <text x="786" y="248" font-size="11.5" fill="#52514e">검산: 인덱스 1의 자식은 3, 4</text>
  <text x="786" y="266" font-size="11.5" fill="#52514e">인덱스 4의 부모는 (4-1)/2 = 1</text>
  <text x="786" y="292" font-size="11.5" fill="#52514e">곱셈·나눗셈이 2의 배수라 비트 시프트로</text>
  <text x="786" y="310" font-size="11.5" fill="#52514e">처리되어 사실상 비용이 없습니다</text>

  <!-- 배열 표현 -->
  <rect x="40" y="348" width="1040" height="110" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <text x="66" y="374" font-size="14" font-weight="700" fill="#0b0b0b">실제 메모리 — 포인터 없이 배열 하나</text>

  <g>
    <rect x="120" y="388" width="110" height="42" rx="4" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/>
    <text x="175" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">3</text>
    <text x="175" y="448" text-anchor="middle" font-size="11.5" fill="#52514e">[0]</text>

    <rect x="230" y="388" width="110" height="42" rx="4" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/>
    <text x="285" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">8</text>
    <text x="285" y="448" text-anchor="middle" font-size="11.5" fill="#52514e">[1]</text>

    <rect x="340" y="388" width="110" height="42" rx="4" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/>
    <text x="395" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">5</text>
    <text x="395" y="448" text-anchor="middle" font-size="11.5" fill="#52514e">[2]</text>

    <rect x="450" y="388" width="110" height="42" rx="4" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/>
    <text x="505" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">15</text>
    <text x="505" y="448" text-anchor="middle" font-size="11.5" fill="#52514e">[3]</text>

    <rect x="560" y="388" width="110" height="42" rx="4" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/>
    <text x="615" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">12</text>
    <text x="615" y="448" text-anchor="middle" font-size="11.5" fill="#52514e">[4]</text>

    <rect x="670" y="388" width="110" height="42" rx="4" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/>
    <text x="725" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">9</text>
    <text x="725" y="448" text-anchor="middle" font-size="11.5" fill="#52514e">[5]</text>

    <rect x="780" y="388" width="110" height="42" rx="4" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/>
    <text x="835" y="414" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">7</text>
    <text x="835" y="448" text-anchor="middle" font-size="11.5" fill="#52514e">[6]</text>
  </g>

  <text x="920" y="404" font-size="11.5" fill="#52514e">루트 = 배열 [0] = 최솟값</text>
  <text x="920" y="422" font-size="11.5" fill="#52514e">조회는 언제나 O(1)입니다</text>
</svg>
