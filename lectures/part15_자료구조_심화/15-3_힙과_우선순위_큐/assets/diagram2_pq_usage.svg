<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="450" viewBox="0 0 1120 450" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="450" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">우선순위 큐가 필요한 문제의 공통 구조</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">"아직 처리하지 않은 것 중 가장 우선순위가 높은 하나를 꺼낸다"가 반복되는 곳</text>

  <!-- 1. 다익스트라 -->
  <rect x="40" y="82" width="250" height="270" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
  <circle cx="66" cy="108" r="12" fill="#2a78d6"/>
  <text x="66" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
  <text x="165" y="113" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">다익스트라 최단 경로</text>

  <text x="66" y="146" font-size="12.5" fill="#0b0b0b">꺼내는 기준</text>
  <text x="66" y="166" font-size="11.5" fill="#52514e">아직 확정 안 된 정점 중</text>
  <text x="66" y="182" font-size="11.5" fill="#52514e">출발점에서 가장 가까운 것</text>

  <line x1="66" y1="198" x2="264" y2="198" stroke="#2a78d6" stroke-opacity="0.3" stroke-width="1"/>

  <text x="66" y="224" font-size="12.5" fill="#0b0b0b">배열 선형 탐색</text>
  <text x="264" y="224" text-anchor="end" font-size="13" font-weight="700" fill="#2a78d6">O(V²)</text>
  <text x="66" y="252" font-size="12.5" fill="#0b0b0b">힙 사용</text>
  <text x="264" y="252" text-anchor="end" font-size="12.5" font-weight="700" fill="#2a78d6">O((V+E)log V)</text>

  <text x="66" y="288" font-size="11.5" fill="#52514e">희소 그래프에서 격차가</text>
  <text x="66" y="304" font-size="11.5" fill="#52514e">결정적으로 벌어집니다.</text>
  <text x="66" y="330" font-size="11.5" fill="#52514e">알고리즘 자체는 Part 16</text>

  <!-- 2. OS 스케줄러 -->
  <rect x="310" y="82" width="250" height="270" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
  <circle cx="336" cy="108" r="12" fill="#1baf7a"/>
  <text x="336" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
  <text x="435" y="113" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">OS 프로세스 스케줄러</text>

  <text x="336" y="146" font-size="12.5" fill="#0b0b0b">꺼내는 기준</text>
  <text x="336" y="166" font-size="11.5" fill="#52514e">실행 대기 중인 작업 중</text>
  <text x="336" y="182" font-size="11.5" fill="#52514e">우선순위가 가장 높은 것</text>

  <line x1="336" y1="198" x2="534" y2="198" stroke="#1baf7a" stroke-opacity="0.3" stroke-width="1"/>

  <text x="336" y="224" font-size="12.5" fill="#0b0b0b">다음 작업 선택</text>
  <text x="534" y="224" text-anchor="end" font-size="13" font-weight="700" fill="#1baf7a">O(log n)</text>
  <text x="336" y="252" font-size="12.5" fill="#0b0b0b">새 작업 등록</text>
  <text x="534" y="252" text-anchor="end" font-size="13" font-weight="700" fill="#1baf7a">O(log n)</text>

  <text x="336" y="288" font-size="11.5" fill="#52514e">작업 큐가 수시로 바뀌어도</text>
  <text x="336" y="304" font-size="11.5" fill="#52514e">전체 재정렬 없이 다음 하나만</text>
  <text x="336" y="320" font-size="11.5" fill="#52514e">고르면 되는 것이 핵심입니다.</text>

  <!-- 3. 이벤트 시뮬레이션 -->
  <rect x="580" y="82" width="250" height="270" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
  <circle cx="606" cy="108" r="12" fill="#d97706"/>
  <text x="606" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
  <text x="705" y="113" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">이벤트 시뮬레이션</text>

  <text x="606" y="146" font-size="12.5" fill="#0b0b0b">꺼내는 기준</text>
  <text x="606" y="166" font-size="11.5" fill="#52514e">앞으로 일어날 이벤트 중</text>
  <text x="606" y="182" font-size="11.5" fill="#52514e">발생 시각이 가장 이른 것</text>

  <line x1="606" y1="198" x2="804" y2="198" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>

  <text x="606" y="224" font-size="12.5" fill="#0b0b0b">다음 이벤트 조회</text>
  <text x="804" y="224" text-anchor="end" font-size="13" font-weight="700" fill="#d97706">O(1)</text>
  <text x="606" y="252" font-size="12.5" fill="#0b0b0b">이벤트 추가·소비</text>
  <text x="804" y="252" text-anchor="end" font-size="13" font-weight="700" fill="#d97706">O(log n)</text>

  <text x="606" y="288" font-size="11.5" fill="#52514e">처리 도중 새 이벤트가 계속</text>
  <text x="606" y="304" font-size="11.5" fill="#52514e">끼어들어도 시간 순서가</text>
  <text x="606" y="320" font-size="11.5" fill="#52514e">자동으로 유지됩니다.</text>

  <!-- 4. 상위 k개 -->
  <rect x="850" y="82" width="230" height="270" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
  <circle cx="876" cy="108" r="12" fill="#8b5cf6"/>
  <text x="876" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
  <text x="975" y="113" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">상위 k개 추출</text>

  <text x="876" y="146" font-size="12.5" fill="#0b0b0b">꺼내는 기준</text>
  <text x="876" y="166" font-size="11.5" fill="#52514e">크기 k 힙을 유지하며</text>
  <text x="876" y="182" font-size="11.5" fill="#52514e">최솟값을 밀어냄</text>

  <line x1="876" y1="198" x2="1054" y2="198" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>

  <text x="876" y="224" font-size="12.5" fill="#0b0b0b">전체 정렬 후 자르기</text>
  <text x="1054" y="224" text-anchor="end" font-size="12.5" font-weight="700" fill="#8b5cf6">O(n log n)</text>
  <text x="876" y="252" font-size="12.5" fill="#0b0b0b">크기 k 힙 순회</text>
  <text x="1054" y="252" text-anchor="end" font-size="12.5" font-weight="700" fill="#8b5cf6">O(n log k)</text>

  <text x="876" y="288" font-size="11.5" fill="#52514e">k가 n보다 훨씬 작을 때</text>
  <text x="876" y="304" font-size="11.5" fill="#52514e">메모리도 n이 아니라 k만</text>
  <text x="876" y="320" font-size="11.5" fill="#52514e">쓰는 것이 더 큰 이점입니다.</text>

  <text x="560" y="386" text-anchor="middle" font-size="12.5" fill="#0b0b0b">네 사례 모두 "전체를 정렬할 필요는 없고, 매번 극값 하나만 정확히 알면 되는" 문제입니다</text>
  <text x="560" y="410" text-anchor="middle" font-size="11.5" fill="#52514e">Python heapq(최소 힙만 제공) · Java PriorityQueue(기본 최소 힙) 모두 내부는 배열 기반 이진 힙입니다</text>
  <text x="560" y="432" text-anchor="middle" font-size="11.5" fill="#52514e">단, 임의 원소의 우선순위 변경은 위치 탐색에 O(n)이 들어 lazy deletion 기법으로 우회합니다</text>
</svg>
