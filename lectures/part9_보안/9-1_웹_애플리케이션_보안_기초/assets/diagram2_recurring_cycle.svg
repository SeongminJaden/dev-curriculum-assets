<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="300" viewBox="0 0 1120 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="300" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">취약점이 매년 반복되는 구조적 순환</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">언어와 프레임워크는 바뀌어도, 이 순환 고리는 그대로 이어집니다</text>

  <defs>
    <marker id="arrowRC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <line x1="280" y1="160" x2="310" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowRC)"/>
  <line x1="550" y1="160" x2="580" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowRC)"/>
  <line x1="820" y1="160" x2="850" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowRC)"/>
  <path d="M 1010 210 C 1010 250, 110 250, 110 210" stroke="#898781" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrowRC)"/>
  <text x="560" y="288" text-anchor="middle" font-size="12" fill="#52514e">새 프레임워크·언어로 바뀌어도 "신뢰 경계"라는 사고방식은 자동으로 따라오지 않습니다</text>

  <!-- Step 1 (blue) -->
  <g>
    <rect x="40" y="110" width="240" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="60" cy="128" r="12" fill="#2a78d6"/>
    <text x="60" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="160" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">신뢰 경계 설정 누락</text>
    <text x="160" y="175" text-anchor="middle" font-size="12" fill="#52514e">"이 입력은 괜찮겠지"라는</text>
    <text x="160" y="192" text-anchor="middle" font-size="12" fill="#52514e">검증 없는 가정</text>
  </g>

  <!-- Step 2 (aqua) -->
  <g>
    <rect x="310" y="110" width="240" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="330" cy="128" r="12" fill="#1baf7a"/>
    <text x="330" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="430" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">입력이 구조로 해석됨</text>
    <text x="430" y="175" text-anchor="middle" font-size="12" fill="#52514e">데이터가 쿼리·HTML·명령</text>
    <text x="430" y="192" text-anchor="middle" font-size="12" fill="#52514e">문법의 일부로 승격</text>
  </g>

  <!-- Step 3 (yellow) -->
  <g>
    <rect x="580" y="110" width="240" height="100" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <circle cx="600" cy="128" r="12" fill="#eda100"/>
    <text x="600" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="700" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">취약점으로 드러남</text>
    <text x="700" y="175" text-anchor="middle" font-size="12" fill="#52514e">사고 발생 후에야</text>
    <text x="700" y="192" text-anchor="middle" font-size="12" fill="#52514e">문제로 인지됨</text>
  </g>

  <!-- Step 4 (green) -->
  <g>
    <rect x="850" y="110" width="230" height="100" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <circle cx="870" cy="128" r="12" fill="#008300"/>
    <text x="870" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="965" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">새 기술로 전환</text>
    <text x="965" y="175" text-anchor="middle" font-size="12" fill="#52514e">새 언어·프레임워크·</text>
    <text x="965" y="192" text-anchor="middle" font-size="12" fill="#52514e">개발자로 교체</text>
  </g>
</svg>
