<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="420" viewBox="0 0 1150 420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1150" height="420" fill="#fcfcfb"/>
  <text x="575" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">타입을 언제 검사하는가 — 정적 타입 vs 동적 타입</text>
  <text x="575" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 오류라도 "실행 전에 잡는가"와 "실행 중에 터지는가"로 갈립니다</text>

  <defs>
    <marker id="arrowC" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Row 1 header -->
  <text x="30" y="98" font-size="15" font-weight="700" fill="#2a78d6">정적 타입 — 예: Java, TypeScript</text>

  <line x1="270" y1="160" x2="315" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowC)"/>
  <line x1="555" y1="160" x2="600" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowC)"/>
  <line x1="840" y1="160" x2="885" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowC)"/>

  <g>
    <rect x="30" y="110" width="240" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="50" cy="128" r="12" fill="#2a78d6"/>
    <text x="50" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="150" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">코드 작성</text>
    <text x="150" y="178" text-anchor="middle" font-size="12" fill="#52514e">변수·함수마다 타입을</text>
    <text x="150" y="194" text-anchor="middle" font-size="12" fill="#52514e">명시하거나 추론시킨다</text>
  </g>

  <g>
    <rect x="315" y="110" width="240" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="335" cy="128" r="12" fill="#2a78d6"/>
    <text x="335" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="435" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">컴파일러가 검사</text>
    <text x="435" y="178" text-anchor="middle" font-size="12" fill="#52514e">모든 표현식의 타입을</text>
    <text x="435" y="194" text-anchor="middle" font-size="12" fill="#52514e">실행 전에 확인한다</text>
  </g>

  <g>
    <rect x="600" y="110" width="240" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="620" cy="128" r="12" fill="#2a78d6"/>
    <text x="620" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="720" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">불일치 시 컴파일 실패</text>
    <text x="720" y="178" text-anchor="middle" font-size="12" fill="#52514e">오류 위치를 정확히</text>
    <text x="720" y="194" text-anchor="middle" font-size="12" fill="#52514e">알려주며 멈춘다</text>
  </g>

  <g>
    <rect x="885" y="110" width="235" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="905" cy="128" r="12" fill="#2a78d6"/>
    <text x="905" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="1002" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">실행 파일</text>
    <text x="1002" y="178" text-anchor="middle" font-size="12" fill="#52514e">타입 오류가 없음이</text>
    <text x="1002" y="194" text-anchor="middle" font-size="12" fill="#52514e">보장된 상태로 실행</text>
  </g>

  <!-- Row 2 header -->
  <text x="30" y="258" font-size="15" font-weight="700" fill="#1baf7a">동적 타입 — 예: Python, JavaScript</text>

  <line x1="270" y1="320" x2="315" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#arrowC)"/>
  <line x1="555" y1="320" x2="600" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#arrowC)"/>
  <line x1="840" y1="320" x2="885" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#arrowC)"/>

  <g>
    <rect x="30" y="270" width="240" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="50" cy="288" r="12" fill="#1baf7a"/>
    <text x="50" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="150" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">코드 작성</text>
    <text x="150" y="338" text-anchor="middle" font-size="12" fill="#52514e">변수에 타입을</text>
    <text x="150" y="354" text-anchor="middle" font-size="12" fill="#52514e">명시하지 않는다</text>
  </g>

  <g>
    <rect x="315" y="270" width="240" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="335" cy="288" r="12" fill="#1baf7a"/>
    <text x="335" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="435" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">검사 없이 실행 시작</text>
    <text x="435" y="338" text-anchor="middle" font-size="12" fill="#52514e">타입 검사 단계 자체가</text>
    <text x="435" y="354" text-anchor="middle" font-size="12" fill="#52514e">존재하지 않는다</text>
  </g>

  <g>
    <rect x="600" y="270" width="240" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="620" cy="288" r="12" fill="#1baf7a"/>
    <text x="620" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="720" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">연산 시점에 값 확인</text>
    <text x="720" y="338" text-anchor="middle" font-size="12" fill="#52514e">각 값이 자신의 타입</text>
    <text x="720" y="354" text-anchor="middle" font-size="12" fill="#52514e">태그를 들고 있다</text>
  </g>

  <g>
    <rect x="885" y="270" width="235" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="905" cy="288" r="12" fill="#1baf7a"/>
    <text x="905" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="1002" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">불일치 시 런타임 예외</text>
    <text x="1002" y="338" text-anchor="middle" font-size="12" fill="#52514e">그 연산이 실제로</text>
    <text x="1002" y="354" text-anchor="middle" font-size="12" fill="#52514e">실행될 때 비로소 발견</text>
  </g>

  <text x="575" y="404" text-anchor="middle" font-size="12" fill="#52514e">정적 타입은 "실행되지 않은 코드 경로"의 오류도 미리 잡아내지만, 동적 타입은 그 경로가 실행되어야만 오류를 압니다</text>
</svg>
