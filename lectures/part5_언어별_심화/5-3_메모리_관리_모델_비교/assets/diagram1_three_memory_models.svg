<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="480" viewBox="0 0 1180 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1180" height="480" fill="#fcfcfb"/>
  <text x="590" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">"언제 메모리를 해제할 것인가"에 대한 세 가지 답</text>
  <text x="590" y="56" text-anchor="middle" font-size="13" fill="#52514e">누가 결정하고, 언제 결정하는지가 다릅니다</text>

  <!-- Column 1: C (manual, blue) -->
  <g>
    <rect x="30" y="80" width="350" height="60" rx="10" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="205" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">수동 관리 — C</text>
    <text x="205" y="130" text-anchor="middle" font-size="12" fill="#52514e">해제 시점 = 개발자가 코드로 직접 결정</text>
  </g>
  <g>
    <rect x="30" y="155" width="350" height="290" rx="10" fill="#2a78d6" fill-opacity="0.06" stroke="#2a78d6" stroke-width="2"/>
    <text x="55" y="190" font-size="13" fill="#0b0b0b">malloc()으로 힙에 할당하고</text>
    <text x="55" y="212" font-size="13" fill="#0b0b0b">free()로 명시적으로 해제한다</text>
    <text x="55" y="248" font-size="13" font-weight="700" fill="#0b0b0b">런타임 개입: 없음</text>
    <text x="55" y="270" font-size="12" fill="#52514e">추가 검사·오버헤드가 없어 가장 빠르다</text>
    <text x="55" y="306" font-size="13" font-weight="700" fill="#0b0b0b">대표 오류</text>
    <text x="55" y="328" font-size="12" fill="#52514e">- 이미 해제한 메모리에 접근(use-after-free)</text>
    <text x="55" y="348" font-size="12" fill="#52514e">- 같은 메모리를 두 번 해제(double free)</text>
    <text x="55" y="368" font-size="12" fill="#52514e">- 해제를 잊어 계속 쌓이는 누수(memory leak)</text>
    <text x="55" y="404" font-size="12" fill="#52514e">오류를 막을 사람은 오직 개발자 자신뿐이다</text>
  </g>

  <!-- Column 2: GC (aqua) -->
  <g>
    <rect x="415" y="80" width="350" height="60" rx="10" fill="#1baf7a" fill-opacity="0.14" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="590" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">자동 관리 — Python, Java</text>
    <text x="590" y="130" text-anchor="middle" font-size="12" fill="#52514e">해제 시점 = 런타임(GC)이 실행 중에 결정</text>
  </g>
  <g>
    <rect x="415" y="155" width="350" height="290" rx="10" fill="#1baf7a" fill-opacity="0.06" stroke="#1baf7a" stroke-width="2"/>
    <text x="440" y="190" font-size="13" fill="#0b0b0b">참조 카운팅 + 추적 GC가</text>
    <text x="440" y="212" font-size="13" fill="#0b0b0b">더 이상 쓰이지 않는 객체를 찾아 회수한다</text>
    <text x="440" y="248" font-size="13" font-weight="700" fill="#0b0b0b">런타임 개입: 있음</text>
    <text x="440" y="270" font-size="12" fill="#52514e">주기적으로 도달 가능성을 검사해야 한다</text>
    <text x="440" y="306" font-size="13" font-weight="700" fill="#0b0b0b">대표 오류·비용</text>
    <text x="440" y="328" font-size="12" fill="#52514e">- 순환 참조는 즉시 회수되지 않을 수 있다</text>
    <text x="440" y="348" font-size="12" fill="#52514e">- GC 동작 중 프로그램이 멈추는 pause</text>
    <text x="440" y="368" font-size="12" fill="#52514e">- 해제 시점을 개발자가 정확히 예측 못함</text>
    <text x="440" y="404" font-size="12" fill="#52514e">개발자는 해제를 신경 쓸 필요가 없어진다</text>
  </g>

  <!-- Column 3: Rust (yellow) -->
  <g>
    <rect x="800" y="80" width="350" height="60" rx="10" fill="#eda100" fill-opacity="0.16" stroke="#eda100" stroke-width="2.5"/>
    <text x="975" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">소유권·빌림 — Rust</text>
    <text x="975" y="130" text-anchor="middle" font-size="12" fill="#52514e">해제 시점 = 컴파일러가 컴파일 시점에 결정</text>
  </g>
  <g>
    <rect x="800" y="155" width="350" height="290" rx="10" fill="#eda100" fill-opacity="0.07" stroke="#eda100" stroke-width="2"/>
    <text x="825" y="190" font-size="13" fill="#0b0b0b">소유권 규칙을 정적으로 검사해</text>
    <text x="825" y="212" font-size="13" fill="#0b0b0b">스코프가 끝나는 지점에 drop()을 자동 삽입한다</text>
    <text x="825" y="248" font-size="13" font-weight="700" fill="#0b0b0b">런타임 개입: 없음 (GC 없음)</text>
    <text x="825" y="270" font-size="12" fill="#52514e">검사는 전부 컴파일 시점에 끝난다</text>
    <text x="825" y="306" font-size="13" font-weight="700" fill="#0b0b0b">대표 오류의 운명</text>
    <text x="825" y="328" font-size="12" fill="#52514e">- use-after-free에 해당하는 코드는</text>
    <text x="825" y="348" font-size="12" fill="#52514e">  컴파일 자체가 거부된다</text>
    <text x="825" y="368" font-size="12" fill="#52514e">- 규칙을 지키는 대신 학습 곡선이 있다</text>
    <text x="825" y="404" font-size="12" fill="#52514e">런타임 오류가 컴파일 타임 오류로 옮겨간다</text>
  </g>

  <text x="590" y="465" text-anchor="middle" font-size="12" fill="#52514e">세 모델의 차이는 "안전한가"가 아니라, "언제·누가 그 안전성 검사 비용을 치르는가"입니다</text>
</svg>
