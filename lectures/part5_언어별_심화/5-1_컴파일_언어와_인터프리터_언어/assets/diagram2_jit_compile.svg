<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="640" height="640" fill="#fcfcfb"/>
  <text x="320" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">JIT 컴파일 — 두 세계의 절충</text>
  <text x="320" y="58" text-anchor="middle" font-size="13" fill="#52514e">V8(JS), HotSpot(Java), PyPy가 공통으로 쓰는 전략</text>

  <defs>
    <marker id="arrowB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- arrows between layers -->
  <line x1="320" y1="140" x2="320" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="320" y1="230" x2="320" y2="250" stroke="#898781" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="320" y1="320" x2="320" y2="340" stroke="#898781" stroke-width="2" marker-end="url(#arrowB)"/>
  <line x1="320" y1="410" x2="320" y2="430" stroke="#898781" stroke-width="2" marker-end="url(#arrowB)"/>

  <!-- Step1: 인터프리터로 시작 (blue) -->
  <g>
    <rect x="60" y="80" width="520" height="60" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="90" y="107" font-size="15" font-weight="700" fill="#0b0b0b">1. 인터프리터로 실행을 시작한다</text>
    <text x="90" y="127" font-size="12" fill="#52514e">모든 코드는 처음엔 바이트코드 인터프리터로 돈다</text>
  </g>

  <!-- Step2: 프로파일링 (aqua) -->
  <g>
    <rect x="60" y="170" width="520" height="60" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="90" y="197" font-size="15" font-weight="700" fill="#0b0b0b">2. 실행 횟수를 프로파일링한다</text>
    <text x="90" y="217" font-size="12" fill="#52514e">같은 함수·루프가 몇 번 호출되는지 카운트한다</text>
  </g>

  <!-- Step3: hot path 감지 (yellow) -->
  <g>
    <rect x="60" y="260" width="520" height="60" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="90" y="287" font-size="15" font-weight="700" fill="#0b0b0b">3. 임계치를 넘으면 hot path로 표시한다</text>
    <text x="90" y="307" font-size="12" fill="#52514e">자주 실행되는 코드만 골라낸다 (전체를 컴파일하지 않는다)</text>
  </g>

  <!-- Step4: 네이티브 컴파일 (green) -->
  <g>
    <rect x="60" y="350" width="520" height="60" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="90" y="377" font-size="15" font-weight="700" fill="#0b0b0b">4. 해당 부분만 네이티브 기계어로 컴파일한다</text>
    <text x="90" y="397" font-size="12" fill="#52514e">실행 중(Just-In-Time)에 최적화된 기계어를 생성한다</text>
  </g>

  <!-- Step5: 캐시 재사용 (violet) -->
  <g>
    <rect x="60" y="440" width="520" height="60" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <text x="90" y="467" font-size="15" font-weight="700" fill="#0b0b0b">5. 컴파일된 기계어를 캐시해 재사용한다</text>
    <text x="90" y="487" font-size="12" fill="#52514e">이후 같은 코드가 호출되면 인터프리터를 건너뛴다</text>
  </g>

  <!-- feedback: cold path continues interpreting -->
  <path d="M 580 110 C 620 110, 620 470, 580 470" stroke="#898781" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrowB)"/>
  <text x="605" y="290" text-anchor="middle" font-size="11.5" fill="#52514e" transform="rotate(90 605 290)">한 번만 실행되는 cold 코드는</text>

  <rect x="60" y="525" width="520" height="80" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="320" y="552" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">AOT처럼 빠르지도, 순수 인터프리터처럼 느리지도 않은</text>
  <text x="320" y="572" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">절충안이지만, 초반 실행(워밍업)은 여전히 느립니다</text>
  <text x="320" y="592" text-anchor="middle" font-size="12" fill="#52514e">cold 코드는 계속 인터프리터로 실행됩니다 — 컴파일 비용을 아끼기 위해서입니다</text>
</svg>
