<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="420" viewBox="0 0 1150 420" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1150" height="420" fill="#fcfcfb"/>
  <text x="575" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">소스코드가 기계어가 되는 두 가지 경로</text>
  <text x="575" y="56" text-anchor="middle" font-size="13" fill="#52514e">같은 논리를 실행 전에 전부 번역해두는가, 실행하면서 그때그때 번역하는가로 갈립니다</text>

  <defs>
    <marker id="arrowA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Row 1 header -->
  <text x="30" y="98" font-size="15" font-weight="700" fill="#2a78d6">AOT 컴파일 언어 — 예: C, Go, Rust</text>

  <!-- Row1 arrows -->
  <line x1="270" y1="160" x2="315" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="555" y1="160" x2="600" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="840" y1="160" x2="885" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>

  <!-- Row1 Box1 -->
  <g>
    <rect x="30" y="110" width="240" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="50" cy="128" r="12" fill="#2a78d6"/>
    <text x="50" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="150" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">소스코드 (.c)</text>
    <text x="150" y="178" text-anchor="middle" font-size="12" fill="#52514e">사람이 작성한 텍스트</text>
    <text x="150" y="194" text-anchor="middle" font-size="12" fill="#52514e">파일</text>
  </g>

  <!-- Row1 Box2 -->
  <g>
    <rect x="315" y="110" width="240" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="335" cy="128" r="12" fill="#2a78d6"/>
    <text x="335" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="435" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">컴파일러</text>
    <text x="435" y="178" text-anchor="middle" font-size="12" fill="#52514e">구문분석 → 최적화</text>
    <text x="435" y="194" text-anchor="middle" font-size="12" fill="#52514e">→ 코드 생성</text>
  </g>

  <!-- Row1 Box3 -->
  <g>
    <rect x="600" y="110" width="240" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="620" cy="128" r="12" fill="#2a78d6"/>
    <text x="620" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="720" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">기계어 실행파일</text>
    <text x="720" y="178" text-anchor="middle" font-size="12" fill="#52514e">OS가 그대로 메모리에</text>
    <text x="720" y="194" text-anchor="middle" font-size="12" fill="#52514e">적재한다</text>
  </g>

  <!-- Row1 Box4 -->
  <g>
    <rect x="885" y="110" width="235" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="905" cy="128" r="12" fill="#2a78d6"/>
    <text x="905" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="1002" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">CPU 실행</text>
    <text x="1002" y="178" text-anchor="middle" font-size="12" fill="#52514e">추가 해석 없이</text>
    <text x="1002" y="194" text-anchor="middle" font-size="12" fill="#52514e">즉시 실행한다</text>
  </g>

  <!-- Row 2 header -->
  <text x="30" y="258" font-size="15" font-weight="700" fill="#1baf7a">인터프리터 언어 — 예: Python, Ruby</text>

  <!-- Row2 arrows -->
  <line x1="270" y1="320" x2="315" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="555" y1="320" x2="600" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>
  <line x1="840" y1="320" x2="885" y2="320" stroke="#898781" stroke-width="2" marker-end="url(#arrowA)"/>

  <!-- Row2 Box1 -->
  <g>
    <rect x="30" y="270" width="240" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="50" cy="288" r="12" fill="#1baf7a"/>
    <text x="50" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="150" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">소스코드 (.py)</text>
    <text x="150" y="338" text-anchor="middle" font-size="12" fill="#52514e">사람이 작성한 텍스트</text>
    <text x="150" y="354" text-anchor="middle" font-size="12" fill="#52514e">파일</text>
  </g>

  <!-- Row2 Box2 -->
  <g>
    <rect x="315" y="270" width="240" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="335" cy="288" r="12" fill="#1baf7a"/>
    <text x="335" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="435" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">바이트코드 컴파일</text>
    <text x="435" y="338" text-anchor="middle" font-size="12" fill="#52514e">AST → 바이트코드</text>
    <text x="435" y="354" text-anchor="middle" font-size="12" fill="#52514e">(.pyc)로 변환</text>
  </g>

  <!-- Row2 Box3 -->
  <g>
    <rect x="600" y="270" width="240" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="620" cy="288" r="12" fill="#1baf7a"/>
    <text x="620" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="720" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">가상머신(VM)</text>
    <text x="720" y="338" text-anchor="middle" font-size="12" fill="#52514e">바이트코드를 한 명령어씩</text>
    <text x="720" y="354" text-anchor="middle" font-size="12" fill="#52514e">순서대로 해석한다</text>
  </g>

  <!-- Row2 Box4 -->
  <g>
    <rect x="885" y="270" width="235" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="905" cy="288" r="12" fill="#1baf7a"/>
    <text x="905" y="292" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="1002" y="315" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">CPU 실행</text>
    <text x="1002" y="338" text-anchor="middle" font-size="12" fill="#52514e">매 명령어마다 VM이</text>
    <text x="1002" y="354" text-anchor="middle" font-size="12" fill="#52514e">한 번씩 개입한다</text>
  </g>

  <text x="575" y="404" text-anchor="middle" font-size="12" fill="#52514e">인터프리터 경로는 3단계가 하나 더 있고, 그 단계가 매 실행마다 반복됩니다</text>
</svg>
