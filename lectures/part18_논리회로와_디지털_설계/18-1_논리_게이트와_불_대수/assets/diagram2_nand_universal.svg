<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="510" viewBox="0 0 1120 510" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="510" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">NAND 하나로 NOT · AND · OR 만들기</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">{AND, OR, NOT}이 완전한 집합이므로, 이 셋을 NAND로 만들 수 있으면 NAND도 완전합니다</text>

  <!-- ===== ① NOT ===== -->
  <g>
    <rect x="30" y="76" width="1060" height="110" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="55" cy="96" r="12" fill="#2a78d6"/>
    <text x="55" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="78" y="101" font-size="14.5" font-weight="700" fill="#0b0b0b">NOT — 두 입력에 같은 신호를 넣습니다 (NAND 1개)</text>

    <text x="150" y="149" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <line x1="160" y1="145" x2="230" y2="145" stroke="#0b0b0b" stroke-width="2"/>
    <circle cx="230" cy="145" r="3.5" fill="#0b0b0b"/>
    <line x1="230" y1="138" x2="230" y2="152" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="230" y1="138" x2="290" y2="138" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="230" y1="152" x2="290" y2="152" stroke="#0b0b0b" stroke-width="2"/>
    <g transform="translate(290,130)">
      <path d="M0,0 H16 A15,15 0 0 1 16,30 H0 Z" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
      <circle cx="37" cy="15" r="5" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
    </g>
    <line x1="332" y1="145" x2="400" y2="145" stroke="#0b0b0b" stroke-width="2"/>
    <text x="412" y="150" font-size="13" font-weight="700" fill="#2a78d6">A&#773;</text>

    <text x="500" y="138" font-size="12.5" fill="#0b0b0b">A · A&#773; = A&#773;</text>
    <text x="500" y="160" font-size="11.5" fill="#52514e">멱등 법칙 A · A = A 에 의해, 같은 신호를 두 입력에 넣은 NAND는 곧 NOT입니다.</text>
  </g>

  <!-- ===== ② AND ===== -->
  <g>
    <rect x="30" y="200" width="1060" height="110" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="55" cy="220" r="12" fill="#1baf7a"/>
    <text x="55" y="224" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="78" y="225" font-size="14.5" font-weight="700" fill="#0b0b0b">AND — NAND의 출력을 다시 반전합니다 (NAND 2개)</text>

    <text x="150" y="266" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <text x="150" y="280" text-anchor="end" font-size="12.5" fill="#0b0b0b">B</text>
    <line x1="160" y1="262" x2="290" y2="262" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="160" y1="276" x2="290" y2="276" stroke="#0b0b0b" stroke-width="2"/>
    <g transform="translate(290,254)">
      <path d="M0,0 H16 A15,15 0 0 1 16,30 H0 Z" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
      <circle cx="37" cy="15" r="5" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
    </g>
    <line x1="332" y1="269" x2="400" y2="269" stroke="#0b0b0b" stroke-width="2"/>
    <circle cx="400" cy="269" r="3.5" fill="#0b0b0b"/>
    <line x1="400" y1="262" x2="400" y2="276" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="400" y1="262" x2="420" y2="262" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="400" y1="276" x2="420" y2="276" stroke="#0b0b0b" stroke-width="2"/>
    <g transform="translate(420,254)">
      <path d="M0,0 H16 A15,15 0 0 1 16,30 H0 Z" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
      <circle cx="37" cy="15" r="5" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
    </g>
    <line x1="462" y1="269" x2="530" y2="269" stroke="#0b0b0b" stroke-width="2"/>
    <text x="542" y="274" font-size="12.5" font-weight="700" fill="#1baf7a">A · B</text>

    <text x="640" y="262" font-size="12.5" fill="#0b0b0b">A · B&#773;&#773; = A · B</text>
    <text x="640" y="284" font-size="11.5" fill="#52514e">두 번째 NAND는 NOT으로 동작합니다. 이중 부정이 상쇄되어 순수한 AND가 남습니다.</text>
  </g>

  <!-- ===== ③ OR ===== -->
  <g>
    <rect x="30" y="324" width="1060" height="150" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
    <circle cx="55" cy="344" r="12" fill="#d97706"/>
    <text x="55" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="78" y="349" font-size="14.5" font-weight="700" fill="#0b0b0b">OR — 두 입력을 각각 반전한 뒤 NAND (NAND 3개, 드모르간의 법칙)</text>

    <text x="150" y="386" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <line x1="160" y1="382" x2="230" y2="382" stroke="#0b0b0b" stroke-width="2"/>
    <circle cx="230" cy="382" r="3.5" fill="#0b0b0b"/>
    <line x1="230" y1="375" x2="230" y2="389" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="230" y1="375" x2="290" y2="375" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="230" y1="389" x2="290" y2="389" stroke="#0b0b0b" stroke-width="2"/>
    <g transform="translate(290,367)">
      <path d="M0,0 H16 A15,15 0 0 1 16,30 H0 Z" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
      <circle cx="37" cy="15" r="5" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
    </g>

    <text x="150" y="441" text-anchor="end" font-size="12.5" fill="#0b0b0b">B</text>
    <line x1="160" y1="437" x2="230" y2="437" stroke="#0b0b0b" stroke-width="2"/>
    <circle cx="230" cy="437" r="3.5" fill="#0b0b0b"/>
    <line x1="230" y1="430" x2="230" y2="444" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="230" y1="430" x2="290" y2="430" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="230" y1="444" x2="290" y2="444" stroke="#0b0b0b" stroke-width="2"/>
    <g transform="translate(290,422)">
      <path d="M0,0 H16 A15,15 0 0 1 16,30 H0 Z" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
      <circle cx="37" cy="15" r="5" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
    </g>

    <line x1="332" y1="382" x2="390" y2="382" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="390" y1="382" x2="390" y2="402" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="390" y1="402" x2="430" y2="402" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="332" y1="437" x2="390" y2="437" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="390" y1="437" x2="390" y2="416" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="390" y1="416" x2="430" y2="416" stroke="#0b0b0b" stroke-width="2"/>
    <text x="348" y="376" font-size="11" fill="#52514e">A&#773;</text>
    <text x="348" y="455" font-size="11" fill="#52514e">B&#773;</text>

    <g transform="translate(430,394)">
      <path d="M0,0 H16 A15,15 0 0 1 16,30 H0 Z" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
      <circle cx="37" cy="15" r="5" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
    </g>
    <line x1="472" y1="409" x2="540" y2="409" stroke="#0b0b0b" stroke-width="2"/>
    <text x="552" y="414" font-size="12.5" font-weight="700" fill="#d97706">A + B</text>

    <text x="660" y="395" font-size="12.5" fill="#0b0b0b">A&#773; · B&#773;&#773; = A + B</text>
    <text x="660" y="419" font-size="11.5" fill="#52514e">드모르간의 법칙을 그대로 회로로 옮긴 구성입니다.</text>
    <text x="660" y="435" font-size="11.5" fill="#52514e">앞의 두 NAND가 NOT 역할을 하고, 마지막 NAND가</text>
    <text x="660" y="451" font-size="11.5" fill="#52514e">부정을 밖으로 빼내면서 AND를 OR로 바꿉니다.</text>
  </g>
</svg>
