<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="500" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">여섯 가지 기본 논리 게이트</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">D자 뒤판은 AND 계열, 오목한 곡선 뒤판은 OR 계열 — 출력의 작은 동그라미(버블)는 언제나 반전을 뜻합니다</text>

  <!-- ===== AND ===== -->
  <g>
    <rect x="30" y="80" width="340" height="190" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="200" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">AND — 둘 다 1일 때만 1</text>
    <line x1="110" y1="143" x2="150" y2="143" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="110" y1="165" x2="150" y2="165" stroke="#0b0b0b" stroke-width="2"/>
    <text x="100" y="147" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <text x="100" y="169" text-anchor="end" font-size="12.5" fill="#0b0b0b">B</text>
    <path d="M150,132 H176 A22,22 0 0 1 176,176 H150 Z" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
    <line x1="198" y1="154" x2="250" y2="154" stroke="#0b0b0b" stroke-width="2"/>
    <text x="260" y="158" font-size="12.5" font-weight="700" fill="#2a78d6">A · B</text>
    <line x1="55" y1="196" x2="345" y2="196" stroke="#2a78d6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="55" y="219" font-size="11.5" fill="#52514e">입력이 모두 1일 때만 출력이 1입니다.</text>
    <text x="55" y="235" font-size="11.5" fill="#52514e">"조건 A와 조건 B가 동시에 성립하는가"를</text>
    <text x="55" y="251" font-size="11.5" fill="#52514e">묻는 회로에 해당합니다.</text>
  </g>

  <!-- ===== OR ===== -->
  <g>
    <rect x="390" y="80" width="340" height="190" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="560" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">OR — 하나라도 1이면 1</text>
    <line x1="470" y1="143" x2="516" y2="143" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="470" y1="165" x2="516" y2="165" stroke="#0b0b0b" stroke-width="2"/>
    <text x="460" y="147" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <text x="460" y="169" text-anchor="end" font-size="12.5" fill="#0b0b0b">B</text>
    <path d="M510,132 Q532,154 510,176 Q540,176 562,154 Q540,132 510,132 Z" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
    <line x1="562" y1="154" x2="610" y2="154" stroke="#0b0b0b" stroke-width="2"/>
    <text x="620" y="158" font-size="12.5" font-weight="700" fill="#1baf7a">A + B</text>
    <line x1="415" y1="196" x2="705" y2="196" stroke="#1baf7a" stroke-opacity="0.3" stroke-width="1"/>
    <text x="415" y="219" font-size="11.5" fill="#52514e">입력 중 하나라도 1이면 출력이 1입니다.</text>
    <text x="415" y="235" font-size="11.5" fill="#52514e">둘 다 1인 경우도 포함하므로 일상어의</text>
    <text x="415" y="251" font-size="11.5" fill="#52514e">"또는"보다 넓은 의미입니다.</text>
  </g>

  <!-- ===== NOT ===== -->
  <g>
    <rect x="750" y="80" width="340" height="190" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
    <text x="920" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">NOT — 값을 뒤집는다</text>
    <line x1="830" y1="154" x2="876" y2="154" stroke="#0b0b0b" stroke-width="2"/>
    <text x="820" y="158" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <path d="M876,132 L916,154 L876,176 Z" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
    <circle cx="922" cy="154" r="5.5" fill="#ffffff" stroke="#d97706" stroke-width="2.5"/>
    <line x1="928" y1="154" x2="972" y2="154" stroke="#0b0b0b" stroke-width="2"/>
    <text x="982" y="158" font-size="13" font-weight="700" fill="#d97706">A&#773;</text>
    <line x1="775" y1="196" x2="1065" y2="196" stroke="#d97706" stroke-opacity="0.3" stroke-width="1"/>
    <text x="775" y="219" font-size="11.5" fill="#52514e">유일하게 입력이 하나인 게이트입니다.</text>
    <text x="775" y="235" font-size="11.5" fill="#52514e">삼각형은 버퍼(그대로 통과)이고, 반전은</text>
    <text x="775" y="251" font-size="11.5" fill="#52514e">끝에 붙은 버블이 담당합니다.</text>
  </g>

  <!-- ===== NAND ===== -->
  <g>
    <rect x="30" y="290" width="340" height="190" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="200" y="316" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">NAND — AND의 정반대</text>
    <line x1="105" y1="353" x2="145" y2="353" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="105" y1="375" x2="145" y2="375" stroke="#0b0b0b" stroke-width="2"/>
    <text x="95" y="357" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <text x="95" y="379" text-anchor="end" font-size="12.5" fill="#0b0b0b">B</text>
    <path d="M145,342 H171 A22,22 0 0 1 171,386 H145 Z" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5"/>
    <circle cx="199" cy="364" r="5.5" fill="#ffffff" stroke="#8b5cf6" stroke-width="2.5"/>
    <line x1="205" y1="364" x2="248" y2="364" stroke="#0b0b0b" stroke-width="2"/>
    <text x="258" y="368" font-size="13" font-weight="700" fill="#8b5cf6">A · B&#773;</text>
    <line x1="55" y1="406" x2="345" y2="406" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="55" y="429" font-size="11.5" fill="#52514e">둘 다 1일 때만 0, 나머지는 모두 1입니다.</text>
    <text x="55" y="445" font-size="11.5" fill="#52514e">이 게이트 하나만으로 모든 논리 회로를</text>
    <text x="55" y="461" font-size="11.5" fill="#52514e">만들 수 있습니다(범용 게이트).</text>
  </g>

  <!-- ===== NOR ===== -->
  <g>
    <rect x="390" y="290" width="340" height="190" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
    <text x="560" y="316" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">NOR — OR의 정반대</text>
    <line x1="465" y1="353" x2="511" y2="353" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="465" y1="375" x2="511" y2="375" stroke="#0b0b0b" stroke-width="2"/>
    <text x="455" y="357" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <text x="455" y="379" text-anchor="end" font-size="12.5" fill="#0b0b0b">B</text>
    <path d="M505,342 Q527,364 505,386 Q535,386 557,364 Q535,342 505,342 Z" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
    <circle cx="563" cy="364" r="5.5" fill="#ffffff" stroke="#dc2626" stroke-width="2.5"/>
    <line x1="569" y1="364" x2="612" y2="364" stroke="#0b0b0b" stroke-width="2"/>
    <text x="622" y="368" font-size="13" font-weight="700" fill="#dc2626">A + B&#773;</text>
    <line x1="415" y1="406" x2="705" y2="406" stroke="#dc2626" stroke-opacity="0.3" stroke-width="1"/>
    <text x="415" y="429" font-size="11.5" fill="#52514e">둘 다 0일 때만 1입니다. NAND와 마찬가지로</text>
    <text x="415" y="445" font-size="11.5" fill="#52514e">단독으로 기능적 완전성을 가지며, CMOS에서</text>
    <text x="415" y="461" font-size="11.5" fill="#52514e">트랜지스터 4개로 구현됩니다.</text>
  </g>

  <!-- ===== XOR ===== -->
  <g>
    <rect x="750" y="290" width="340" height="190" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="920" y="316" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">XOR — 서로 다를 때만 1</text>
    <line x1="820" y1="353" x2="868" y2="353" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="820" y1="375" x2="868" y2="375" stroke="#0b0b0b" stroke-width="2"/>
    <text x="810" y="357" text-anchor="end" font-size="12.5" fill="#0b0b0b">A</text>
    <text x="810" y="379" text-anchor="end" font-size="12.5" fill="#0b0b0b">B</text>
    <path d="M853,342 Q875,364 853,386" fill="none" stroke="#2a78d6" stroke-width="2.5"/>
    <path d="M865,342 Q887,364 865,386 Q895,386 917,364 Q895,342 865,342 Z" fill="#ffffff" fill-opacity="0.9" stroke="#2a78d6" stroke-width="2.5"/>
    <line x1="917" y1="364" x2="965" y2="364" stroke="#0b0b0b" stroke-width="2"/>
    <text x="975" y="368" font-size="12.5" font-weight="700" fill="#2a78d6">A ⊕ B</text>
    <line x1="775" y1="406" x2="1065" y2="406" stroke="#2a78d6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="775" y="429" font-size="11.5" fill="#52514e">OR 기호 왼쪽에 곡선을 하나 더 그어</text>
    <text x="775" y="445" font-size="11.5" fill="#52514e">구별합니다. 두 비트를 더한 결과의 아랫자리와</text>
    <text x="775" y="461" font-size="11.5" fill="#52514e">정확히 같아 가산기의 핵심이 됩니다.</text>
  </g>
</svg>
