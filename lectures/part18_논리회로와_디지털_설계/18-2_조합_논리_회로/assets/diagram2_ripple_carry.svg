<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="470" viewBox="0 0 1120 470" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="470" fill="#fcfcfb"/>
  <defs>
    <marker id="a1" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0b0b0b"/>
    </marker>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">4비트 리플 캐리 가산기와 자리올림 전파 지연</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">각 자리는 아랫자리의 자리올림이 확정될 때까지 자기 출력을 확정할 수 없습니다</text>

  <!-- ===== 회로 ===== -->
  <g>
    <rect x="30" y="76" width="1060" height="180" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>

    <!-- bit3 -->
    <rect x="120" y="110" width="150" height="90" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="195" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">전가산기 3</text>
    <text x="195" y="164" text-anchor="middle" font-size="11.5" fill="#52514e">A₃ , B₃</text>
    <text x="195" y="184" text-anchor="middle" font-size="11" fill="#dc2626">가장 늦게 확정</text>
    <line x1="160" y1="86" x2="160" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="230" y1="86" x2="230" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="195" y1="200" x2="195" y2="228" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <text x="205" y="226" font-size="12" font-weight="700" fill="#2a78d6">S₃</text>

    <!-- bit2 -->
    <rect x="350" y="110" width="150" height="90" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="425" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">전가산기 2</text>
    <text x="425" y="164" text-anchor="middle" font-size="11.5" fill="#52514e">A₂ , B₂</text>
    <line x1="390" y1="86" x2="390" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="460" y1="86" x2="460" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="425" y1="200" x2="425" y2="228" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <text x="435" y="226" font-size="12" font-weight="700" fill="#2a78d6">S₂</text>

    <!-- bit1 -->
    <rect x="580" y="110" width="150" height="90" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="655" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">전가산기 1</text>
    <text x="655" y="164" text-anchor="middle" font-size="11.5" fill="#52514e">A₁ , B₁</text>
    <line x1="620" y1="86" x2="620" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="690" y1="86" x2="690" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="655" y1="200" x2="655" y2="228" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <text x="665" y="226" font-size="12" font-weight="700" fill="#2a78d6">S₁</text>

    <!-- bit0 -->
    <rect x="810" y="110" width="150" height="90" rx="8" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="885" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">전가산기 0</text>
    <text x="885" y="164" text-anchor="middle" font-size="11.5" fill="#52514e">A₀ , B₀</text>
    <text x="885" y="184" text-anchor="middle" font-size="11" fill="#1baf7a">가장 먼저 확정</text>
    <line x1="850" y1="86" x2="850" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="920" y1="86" x2="920" y2="110" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <line x1="885" y1="200" x2="885" y2="228" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <text x="895" y="226" font-size="12" font-weight="700" fill="#2a78d6">S₀</text>

    <!-- C0 입력 -->
    <line x1="1050" y1="155" x2="960" y2="155" stroke="#0b0b0b" stroke-width="2" marker-end="url(#a1)"/>
    <text x="1005" y="146" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0b0b0b">C₀ = 0</text>

    <!-- 캐리 전파 (오른쪽에서 왼쪽으로) -->
    <line x1="810" y1="155" x2="730" y2="155" stroke="#dc2626" stroke-width="2.5" marker-end="url(#a2)"/>
    <text x="770" y="146" text-anchor="middle" font-size="11.5" font-weight="700" fill="#dc2626">C₁</text>
    <line x1="580" y1="155" x2="500" y2="155" stroke="#dc2626" stroke-width="2.5" marker-end="url(#a2)"/>
    <text x="540" y="146" text-anchor="middle" font-size="11.5" font-weight="700" fill="#dc2626">C₂</text>
    <line x1="350" y1="155" x2="270" y2="155" stroke="#dc2626" stroke-width="2.5" marker-end="url(#a2)"/>
    <text x="310" y="146" text-anchor="middle" font-size="11.5" font-weight="700" fill="#dc2626">C₃</text>
    <line x1="120" y1="155" x2="55" y2="155" stroke="#dc2626" stroke-width="2.5" marker-end="url(#a2)"/>
    <text x="88" y="146" text-anchor="middle" font-size="11.5" font-weight="700" fill="#dc2626">C₄</text>
  </g>

  <!-- ===== 지연 누적 ===== -->
  <g>
    <rect x="30" y="272" width="1060" height="170" rx="10" fill="#d97706" fill-opacity="0.10" stroke="#d97706" stroke-width="2.5"/>
    <text x="55" y="298" font-size="14.5" font-weight="700" fill="#0b0b0b">각 자리의 출력이 확정되기까지 걸리는 시간 (전가산기 한 단의 캐리 지연 = t)</text>

    <text x="240" y="325" text-anchor="end" font-size="12.5" fill="#0b0b0b">0번 자리</text>
    <rect x="250" y="313" width="90" height="16" rx="4" fill="#1baf7a" fill-opacity="0.55" stroke="#1baf7a" stroke-width="1.5"/>
    <text x="352" y="325" font-size="12" font-weight="700" fill="#1baf7a">t</text>

    <text x="240" y="353" text-anchor="end" font-size="12.5" fill="#0b0b0b">1번 자리</text>
    <rect x="250" y="341" width="180" height="16" rx="4" fill="#1baf7a" fill-opacity="0.45" stroke="#1baf7a" stroke-width="1.5"/>
    <text x="442" y="353" font-size="12" font-weight="700" fill="#1baf7a">2t</text>

    <text x="240" y="381" text-anchor="end" font-size="12.5" fill="#0b0b0b">2번 자리</text>
    <rect x="250" y="369" width="270" height="16" rx="4" fill="#d97706" fill-opacity="0.45" stroke="#d97706" stroke-width="1.5"/>
    <text x="532" y="381" font-size="12" font-weight="700" fill="#d97706">3t</text>

    <text x="240" y="409" text-anchor="end" font-size="12.5" fill="#0b0b0b">3번 자리</text>
    <rect x="250" y="397" width="360" height="16" rx="4" fill="#dc2626" fill-opacity="0.45" stroke="#dc2626" stroke-width="1.5"/>
    <text x="622" y="409" font-size="12" font-weight="700" fill="#dc2626">4t  ← 임계 경로</text>

    <line x1="700" y1="308" x2="700" y2="420" stroke="#d97706" stroke-opacity="0.35" stroke-width="1"/>
    <text x="725" y="326" font-size="11.5" fill="#52514e">n비트 리플 캐리 가산기의 최악 지연은 n·t, 즉 O(n)입니다.</text>
    <text x="725" y="346" font-size="11.5" fill="#52514e">CPU의 클럭 주기는 이 임계 경로보다 길어야만 하므로,</text>
    <text x="725" y="366" font-size="11.5" fill="#52514e">덧셈 회로의 지연이 곧 동작 주파수의 상한이 됩니다.</text>
    <text x="725" y="392" font-size="11.5" fill="#0b0b0b">→ 캐리 예측(carry-lookahead)은 각 자리의 생성 G와</text>
    <text x="725" y="410" font-size="11.5" fill="#0b0b0b">   전파 P를 입력만으로 즉시 구해 이 대기를 없앱니다.</text>
  </g>
</svg>
