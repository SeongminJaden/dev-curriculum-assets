<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="460" viewBox="0 0 1120 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="460" fill="#fcfcfb"/>
  <defs>
    <marker id="arw" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#0b0b0b"/>
    </marker>
  </defs>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">반가산기와 전가산기</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">전가산기는 반가산기 두 개와 OR 게이트 하나로 조립됩니다</text>

  <!-- ===== 반가산기 ===== -->
  <g>
    <rect x="30" y="76" width="520" height="350" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="290" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">반가산기(Half Adder)</text>
    <text x="290" y="124" text-anchor="middle" font-size="11.5" fill="#52514e">아래에서 올라온 자리올림을 받는 입력이 없습니다</text>

    <text x="72" y="157" text-anchor="end" font-size="12.5" font-weight="700" fill="#0b0b0b">A</text>
    <text x="72" y="171" text-anchor="end" font-size="12.5" font-weight="700" fill="#0b0b0b">B</text>

    <!-- A 배선 -->
    <line x1="82" y1="153" x2="250" y2="153" stroke="#0b0b0b" stroke-width="2"/>
    <circle cx="190" cy="153" r="3.5" fill="#0b0b0b"/>
    <line x1="190" y1="153" x2="190" y2="243" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="190" y1="243" x2="250" y2="243" stroke="#0b0b0b" stroke-width="2"/>
    <!-- B 배선 -->
    <line x1="82" y1="167" x2="250" y2="167" stroke="#0b0b0b" stroke-width="2"/>
    <circle cx="215" cy="167" r="3.5" fill="#0b0b0b"/>
    <line x1="215" y1="167" x2="215" y2="257" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="215" y1="257" x2="250" y2="257" stroke="#0b0b0b" stroke-width="2"/>

    <!-- XOR -->
    <g transform="translate(252,145)">
      <path d="M-8,0 Q7,15 -8,30" fill="none" stroke="#2a78d6" stroke-width="2.5"/>
      <path d="M0,0 Q15,15 0,30 Q22,30 38,15 Q22,0 0,0 Z" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
      <text x="16" y="19" text-anchor="middle" font-size="11" font-weight="700" fill="#2a78d6">⊕</text>
    </g>
    <line x1="290" y1="160" x2="400" y2="160" stroke="#0b0b0b" stroke-width="2"/>
    <text x="410" y="165" font-size="12.5" font-weight="700" fill="#2a78d6">Sum = A ⊕ B</text>

    <!-- AND -->
    <g transform="translate(252,235)">
      <path d="M0,0 H14 A15,15 0 0 1 14,30 H0 Z" fill="#ffffff" stroke="#2a78d6" stroke-width="2.5"/>
    </g>
    <line x1="281" y1="250" x2="400" y2="250" stroke="#0b0b0b" stroke-width="2"/>
    <text x="410" y="255" font-size="12.5" font-weight="700" fill="#2a78d6">Carry = A · B</text>

    <line x1="55" y1="295" x2="525" y2="295" stroke="#2a78d6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="55" y="320" font-size="11.5" fill="#52514e">진리표의 Sum 열은 0,1,1,0으로 XOR과 정확히 같고,</text>
    <text x="55" y="336" font-size="11.5" fill="#52514e">Carry 열은 0,0,0,1로 AND와 정확히 같습니다.</text>
    <text x="55" y="352" font-size="11.5" fill="#52514e">새 소자를 발명한 것이 아니라, 원하는 진리표와 같은</text>
    <text x="55" y="368" font-size="11.5" fill="#52514e">패턴을 내는 기존 게이트를 찾아낸 것입니다.</text>
    <text x="55" y="392" font-size="11.5" fill="#dc2626">한계 — 여러 자리 덧셈의 맨 아래 자리에만 쓸 수 있습니다.</text>
  </g>

  <!-- ===== 전가산기 ===== -->
  <g>
    <rect x="570" y="76" width="520" height="350" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="830" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">전가산기(Full Adder)</text>
    <text x="830" y="124" text-anchor="middle" font-size="11.5" fill="#52514e">아래 자리에서 올라온 자리올림 C&#8336;&#8336; 까지 받습니다</text>

    <text x="612" y="155" text-anchor="end" font-size="12.5" font-weight="700" fill="#0b0b0b">A</text>
    <text x="612" y="185" text-anchor="end" font-size="12.5" font-weight="700" fill="#0b0b0b">B</text>
    <line x1="622" y1="150" x2="660" y2="150" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="622" y1="180" x2="660" y2="180" stroke="#0b0b0b" stroke-width="2"/>

    <!-- HA1 -->
    <rect x="660" y="128" width="95" height="72" rx="8" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="707" y="156" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">반가산기 1</text>
    <text x="707" y="176" text-anchor="middle" font-size="11" fill="#52514e">XOR + AND</text>

    <!-- HA1 S -> HA2 -->
    <line x1="755" y1="150" x2="790" y2="150" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="790" y1="150" x2="790" y2="200" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="790" y1="200" x2="830" y2="200" stroke="#0b0b0b" stroke-width="2"/>
    <text x="762" y="144" font-size="10.5" fill="#52514e">A ⊕ B</text>

    <!-- Cin -->
    <text x="612" y="325" text-anchor="end" font-size="12.5" font-weight="700" fill="#0b0b0b">C&#8336;&#8336;</text>
    <line x1="622" y1="320" x2="808" y2="320" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="808" y1="320" x2="808" y2="230" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="808" y1="230" x2="830" y2="230" stroke="#0b0b0b" stroke-width="2"/>

    <!-- HA2 -->
    <rect x="830" y="178" width="95" height="72" rx="8" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="877" y="206" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">반가산기 2</text>
    <text x="877" y="226" text-anchor="middle" font-size="11" fill="#52514e">XOR + AND</text>

    <!-- HA2 Sum out -->
    <line x1="925" y1="200" x2="1020" y2="200" stroke="#0b0b0b" stroke-width="2" marker-end="url(#arw)"/>
    <text x="1032" y="205" font-size="12.5" font-weight="700" fill="#1baf7a">Sum</text>

    <!-- HA1 carry -> OR -->
    <line x1="755" y1="180" x2="772" y2="180" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="772" y1="180" x2="772" y2="288" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="772" y1="288" x2="955" y2="288" stroke="#0b0b0b" stroke-width="2"/>
    <!-- HA2 carry -> OR -->
    <line x1="925" y1="240" x2="940" y2="240" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="940" y1="240" x2="940" y2="302" stroke="#0b0b0b" stroke-width="2"/>
    <line x1="940" y1="302" x2="955" y2="302" stroke="#0b0b0b" stroke-width="2"/>

    <!-- OR -->
    <g transform="translate(955,280)">
      <path d="M0,0 Q15,15 0,30 Q22,30 38,15 Q22,0 0,0 Z" fill="#ffffff" stroke="#1baf7a" stroke-width="2.5"/>
    </g>
    <line x1="993" y1="295" x2="1020" y2="295" stroke="#0b0b0b" stroke-width="2" marker-end="url(#arw)"/>
    <text x="1032" y="300" font-size="12.5" font-weight="700" fill="#1baf7a">C&#8338;&#8341;&#8348;</text>

    <line x1="595" y1="352" x2="1065" y2="352" stroke="#1baf7a" stroke-opacity="0.3" stroke-width="1"/>
    <text x="595" y="376" font-size="11.5" fill="#52514e">첫 반가산기가 A+B를 처리해 중간 합을 만들고, 둘째가 거기에 C&#8336;&#8336;을 더합니다.</text>
    <text x="595" y="392" font-size="11.5" fill="#52514e">두 반가산기 중 어느 한쪽에서라도 자리올림이 나오면 위로 넘겨야 하므로 OR로 묶습니다.</text>
    <text x="595" y="410" font-size="12" font-weight="700" fill="#0b0b0b">Sum = A ⊕ B ⊕ C&#8336;&#8336;      C&#8338;&#8341;&#8348; = A·B + C&#8336;&#8336;·(A ⊕ B)</text>
  </g>
</svg>
