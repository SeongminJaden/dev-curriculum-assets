<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="260" viewBox="0 0 1120 260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="260" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">CI/CD 파이프라인 단계</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- connecting arrows -->
  <line x1="180" y1="160" x2="230" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="160" x2="410" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="160" x2="590" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="160" x2="770" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="160" x2="950" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- failure exit note -->
  <path d="M 470 210 C 470 240, 290 240, 290 210" stroke="#898781" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="380" y="252" text-anchor="middle" font-size="12" fill="#52514e">실패 시 그 지점에서 즉시 멈추고 개발자에게 알립니다</text>

  <!-- Stage 1: 커밋/병합 (blue) -->
  <g>
    <rect x="40" y="110" width="140" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="60" cy="128" r="12" fill="#2a78d6"/>
    <text x="60" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="110" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">커밋·병합</text>
    <text x="110" y="178" text-anchor="middle" font-size="12" fill="#52514e">메인 브랜치에</text>
    <text x="110" y="194" text-anchor="middle" font-size="12" fill="#52514e">코드를 합친다</text>
  </g>

  <!-- Stage 2: 빌드 (aqua) -->
  <g>
    <rect x="220" y="110" width="140" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="240" cy="128" r="12" fill="#1baf7a"/>
    <text x="240" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="290" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">빌드</text>
    <text x="290" y="178" text-anchor="middle" font-size="12" fill="#52514e">실행 가능한</text>
    <text x="290" y="194" text-anchor="middle" font-size="12" fill="#52514e">형태로 패키징</text>
  </g>

  <!-- Stage 3: 테스트 (yellow) -->
  <g>
    <rect x="400" y="110" width="140" height="100" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <circle cx="420" cy="128" r="12" fill="#eda100"/>
    <text x="420" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="470" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">자동 테스트</text>
    <text x="470" y="178" text-anchor="middle" font-size="12" fill="#52514e">의도대로 동작</text>
    <text x="470" y="194" text-anchor="middle" font-size="12" fill="#52514e">하는지 검증</text>
  </g>

  <!-- Stage 4: 아티팩트 생성 (green) -->
  <g>
    <rect x="580" y="110" width="140" height="100" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <circle cx="600" cy="128" r="12" fill="#008300"/>
    <text x="600" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="650" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">배포 아티팩트</text>
    <text x="650" y="178" text-anchor="middle" font-size="12" fill="#52514e">배포 가능한</text>
    <text x="650" y="194" text-anchor="middle" font-size="12" fill="#52514e">결과물 생성</text>
  </g>

  <!-- Stage 5: 스테이징 배포 (violet) -->
  <g>
    <rect x="760" y="110" width="140" height="100" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <circle cx="780" cy="128" r="12" fill="#4a3aa7"/>
    <text x="780" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
    <text x="830" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">스테이징 배포</text>
    <text x="830" y="178" text-anchor="middle" font-size="12" fill="#52514e">운영과 동일한</text>
    <text x="830" y="194" text-anchor="middle" font-size="12" fill="#52514e">환경에서 재검증</text>
  </g>

  <!-- Stage 6: 운영 배포 (red) -->
  <g>
    <rect x="940" y="110" width="140" height="100" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <circle cx="960" cy="128" r="12" fill="#e34948"/>
    <text x="960" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
    <text x="1010" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">운영 배포</text>
    <text x="1010" y="178" text-anchor="middle" font-size="12" fill="#52514e">실제 사용자에게</text>
    <text x="1010" y="194" text-anchor="middle" font-size="12" fill="#52514e">반영한다</text>
  </g>
</svg>
