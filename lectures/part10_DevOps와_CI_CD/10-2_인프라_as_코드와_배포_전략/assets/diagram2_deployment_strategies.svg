<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="480" viewBox="0 0 1040 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1040" height="480" fill="#fcfcfb"/>
  <text x="520" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">블루/그린 배포와 카나리 배포 비교</text>
  <text x="520" y="56" text-anchor="middle" font-size="13" fill="#52514e">막대 안 숫자 = 각 버전이 받는 트래픽 비율</text>

  <!-- divider -->
  <line x1="520" y1="80" x2="520" y2="450" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- LEFT: Blue/Green -->
  <text x="260" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">블루/그린 배포 — 한 번에 전환</text>

  <!-- before -->
  <text x="50" y="130" font-size="12.5" font-weight="700" fill="#52514e">전환 전</text>
  <rect x="50" y="140" width="420" height="34" rx="7" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="2"/>
  <text x="260" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">블루(기존 버전) — 100%</text>

  <!-- switch arrow -->
  <line x1="260" y1="180" x2="260" y2="206" stroke="#898781" stroke-width="2" marker-end="url(#arrowbg)"/>
  <defs>
    <marker id="arrowbg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>
  <text x="280" y="198" font-size="11.5" fill="#52514e">트래픽 즉시 전환</text>

  <!-- after -->
  <text x="50" y="230" font-size="12.5" font-weight="700" fill="#52514e">전환 후</text>
  <rect x="50" y="240" width="420" height="34" rx="7" fill="#1baf7a" fill-opacity="0.14" stroke="#1baf7a" stroke-width="2"/>
  <text x="260" y="263" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">그린(신규 버전) — 100%</text>
  <rect x="50" y="284" width="420" height="26" rx="6" fill="#2a78d6" fill-opacity="0.08" stroke="#2a78d6" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="260" y="302" text-anchor="middle" font-size="11.5" fill="#52514e">블루는 대기 상태로 남아, 문제 발생 시 즉시 재전환 가능</text>

  <rect x="50" y="330" width="420" height="60" rx="8" fill="#898781" fill-opacity="0.07" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="260" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">특징</text>
  <text x="260" y="374" text-anchor="middle" font-size="11.5" fill="#52514e">전환이 순식간이라 다운타임이 거의 없다</text>

  <!-- RIGHT: Canary -->
  <text x="780" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">카나리 배포 — 점진적 전환</text>

  <!-- stage 1 -->
  <text x="570" y="130" font-size="12.5" font-weight="700" fill="#52514e">1단계</text>
  <rect x="570" y="140" width="42" height="30" rx="6" fill="#1baf7a" fill-opacity="0.6" stroke="#1baf7a" stroke-width="1.5"/>
  <rect x="614" y="140" width="398" height="30" rx="6" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="1.5"/>
  <text x="591" y="160" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0b0b0b">5%</text>
  <text x="813" y="160" text-anchor="middle" font-size="11.5" fill="#0b0b0b">기존 버전 95%</text>

  <!-- stage 2 -->
  <text x="570" y="200" font-size="12.5" font-weight="700" fill="#52514e">2단계</text>
  <rect x="570" y="210" width="206" height="30" rx="6" fill="#1baf7a" fill-opacity="0.6" stroke="#1baf7a" stroke-width="1.5"/>
  <rect x="780" y="210" width="232" height="30" rx="6" fill="#2a78d6" fill-opacity="0.14" stroke="#2a78d6" stroke-width="1.5"/>
  <text x="673" y="230" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0b0b0b">신규 50%</text>
  <text x="896" y="230" text-anchor="middle" font-size="11.5" fill="#0b0b0b">기존 50%</text>

  <!-- stage 3 -->
  <text x="570" y="270" font-size="12.5" font-weight="700" fill="#52514e">3단계</text>
  <rect x="570" y="280" width="442" height="30" rx="6" fill="#1baf7a" fill-opacity="0.6" stroke="#1baf7a" stroke-width="1.5"/>
  <text x="791" y="300" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0b0b0b">신규 버전 100%</text>

  <rect x="570" y="330" width="442" height="60" rx="8" fill="#898781" fill-opacity="0.07" stroke="#c3c2b7" stroke-width="1.5"/>
  <text x="791" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">특징</text>
  <text x="791" y="374" text-anchor="middle" font-size="11.5" fill="#52514e">문제 발생 시 소수의 사용자만 영향받은 채 조기 감지</text>

  <rect x="50" y="410" width="962" height="50" rx="10" fill="#eda100" fill-opacity="0.10" stroke="#eda100" stroke-width="2"/>
  <text x="531" y="440" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">두 전략 모두 문제 발생 시 트래픽을 이전 상태로 되돌리는 것만으로 즉시 롤백할 수 있습니다</text>
</svg>
