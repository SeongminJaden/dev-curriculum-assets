<svg xmlns="http://www.w3.org/2000/svg" width="620" height="700" viewBox="0 0 620 700" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="620" height="700" fill="#fcfcfb"/>
  <text x="310" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">요청 한 번이 처리되기까지의 계층</text>
  <text x="310" y="58" text-anchor="middle" font-size="13" fill="#52514e">이 커리큘럼은 아래 계층을 순서대로 따라 내려갑니다</text>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- arrows between layers -->
  <line x1="310" y1="140" x2="310" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="310" y1="230" x2="310" y2="250" stroke="#898781" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="310" y1="320" x2="310" y2="340" stroke="#898781" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="310" y1="410" x2="310" y2="430" stroke="#898781" stroke-width="2" marker-end="url(#arrow2)"/>
  <line x1="310" y1="500" x2="310" y2="520" stroke="#898781" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- Layer 1: 사용자 (blue) -->
  <g>
    <rect x="60" y="80" width="500" height="60" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="90" y="107" font-size="15" font-weight="700" fill="#0b0b0b">1. 사용자</text>
    <text x="90" y="127" font-size="12" fill="#52514e">브라우저 또는 모바일 앱에서 요청을 시작한다 — Part 8. 프론트엔드</text>
  </g>

  <!-- Layer 2: 프론트엔드 (aqua) -->
  <g>
    <rect x="60" y="170" width="500" height="60" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="90" y="197" font-size="15" font-weight="700" fill="#0b0b0b">2. 프론트엔드</text>
    <text x="90" y="217" font-size="12" fill="#52514e">화면을 그리고 사용자 입력을 서버 요청으로 변환한다</text>
  </g>

  <!-- Layer 3: 네트워크 (yellow) -->
  <g>
    <rect x="60" y="260" width="500" height="60" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="90" y="287" font-size="15" font-weight="700" fill="#0b0b0b">3. 네트워크</text>
    <text x="90" y="307" font-size="12" fill="#52514e">HTTP 요청이 TCP/IP를 통해 서버로 전달된다 — Part 3. 서버·아키텍처</text>
  </g>

  <!-- Layer 4: 백엔드 서버 (green) -->
  <g>
    <rect x="60" y="350" width="500" height="60" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="90" y="377" font-size="15" font-weight="700" fill="#0b0b0b">4. 백엔드 서버</text>
    <text x="90" y="397" font-size="12" fill="#52514e">비즈니스 로직을 처리하고 데이터베이스와 통신한다 — Part 7. 백엔드</text>
  </g>

  <!-- Layer 5: 운영체제 (violet) -->
  <g>
    <rect x="60" y="440" width="500" height="60" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <text x="90" y="467" font-size="15" font-weight="700" fill="#0b0b0b">5. 운영체제</text>
    <text x="90" y="487" font-size="12" fill="#52514e">프로세스를 스케줄링하고 시스템 콜로 하드웨어에 접근한다</text>
  </g>

  <!-- Layer 6: 하드웨어 (red) -->
  <g>
    <rect x="60" y="530" width="500" height="60" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <text x="90" y="557" font-size="15" font-weight="700" fill="#0b0b0b">6. 하드웨어</text>
    <text x="90" y="577" font-size="12" fill="#52514e">CPU·메모리·반도체가 실제 명령어를 실행한다 — Part 2, 4</text>
  </g>

  <rect x="60" y="615" width="500" height="55" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="310" y="638" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">개발자가 다루는 코드는 이 6개 계층 중</text>
  <text x="310" y="656" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">한두 층만 다루는 작업입니다</text>
</svg>
