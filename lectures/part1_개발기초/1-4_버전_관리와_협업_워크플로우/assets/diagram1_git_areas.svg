<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="300" viewBox="0 0 1120 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="300" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">Git이 파일을 이동시키는 네 개의 영역</text>

  <defs>
    <marker id="arrowg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <line x1="280" y1="170" x2="230" y2="170" stroke="#898781" stroke-width="2" marker-end="url(#arrowg)"/>
  <text x="255" y="160" text-anchor="middle" font-size="11.5" fill="#52514e">git add</text>

  <line x1="510" y1="170" x2="460" y2="170" stroke="#898781" stroke-width="2" marker-end="url(#arrowg)"/>
  <text x="485" y="160" text-anchor="middle" font-size="11.5" fill="#52514e">git commit</text>

  <line x1="740" y1="170" x2="690" y2="170" stroke="#898781" stroke-width="2" marker-end="url(#arrowg)"/>
  <text x="715" y="160" text-anchor="middle" font-size="11.5" fill="#52514e">git push</text>

  <line x1="690" y1="210" x2="740" y2="210" stroke="#898781" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arrowg)"/>
  <text x="715" y="228" text-anchor="middle" font-size="11" fill="#52514e">git pull</text>

  <!-- Area 4: Working Directory (blue) -->
  <g>
    <rect x="40" y="110" width="190" height="120" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="135" y="140" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">작업 디렉터리</text>
    <text x="135" y="165" text-anchor="middle" font-size="11.5" fill="#52514e">파일을 직접 편집하는</text>
    <text x="135" y="181" text-anchor="middle" font-size="11.5" fill="#52514e">실제 폴더</text>
    <text x="135" y="205" text-anchor="middle" font-size="11" fill="#898781">Working Directory</text>
  </g>

  <!-- Area 2: Staging Area (aqua) -->
  <g>
    <rect x="280" y="110" width="180" height="120" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="370" y="140" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">스테이징 영역</text>
    <text x="370" y="165" text-anchor="middle" font-size="11.5" fill="#52514e">다음 커밋에 포함할</text>
    <text x="370" y="181" text-anchor="middle" font-size="11.5" fill="#52514e">변경분만 골라놓는 곳</text>
    <text x="370" y="205" text-anchor="middle" font-size="11" fill="#898781">Staging Area (Index)</text>
  </g>

  <!-- Area 3: Local Repository (yellow) -->
  <g>
    <rect x="510" y="110" width="180" height="120" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="600" y="140" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">로컬 저장소</text>
    <text x="600" y="165" text-anchor="middle" font-size="11.5" fill="#52514e">스냅샷이 커밋 객체로</text>
    <text x="600" y="181" text-anchor="middle" font-size="11.5" fill="#52514e">영구 기록되는 곳</text>
    <text x="600" y="205" text-anchor="middle" font-size="11" fill="#898781">Local Repository (.git)</text>
  </g>

  <!-- Area 4: Remote Repository (green) -->
  <g>
    <rect x="740" y="110" width="190" height="120" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="835" y="140" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0b0b0b">원격 저장소</text>
    <text x="835" y="165" text-anchor="middle" font-size="11.5" fill="#52514e">팀원 전체가 공유하는</text>
    <text x="835" y="181" text-anchor="middle" font-size="11.5" fill="#52514e">중앙 참조 지점</text>
    <text x="835" y="205" text-anchor="middle" font-size="11" fill="#898781">Remote (GitHub 등)</text>
  </g>

  <rect x="40" y="255" width="890" height="35" rx="8" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="485" y="278" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">네 영역 모두 로컬 컴퓨터 안에 있으며, 원격 저장소만 네트워크 너머에 존재합니다</text>
</svg>
