<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="320" viewBox="0 0 1120 320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="320" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">프로그래밍 패러다임의 계보</text>

  <defs>
    <marker id="arrowp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <line x1="180" y1="160" x2="230" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
  <line x1="360" y1="160" x2="410" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
  <line x1="540" y1="160" x2="590" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>

  <path d="M 900 210 C 900 250, 220 250, 220 210" stroke="#898781" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrowp)"/>
  <text x="560" y="272" text-anchor="middle" font-size="12" fill="#52514e">오늘날 Python·Kotlin·JS 등은 세 패러다임을 동시에 지원하는 멀티패러다임 언어로 수렴합니다</text>

  <!-- Stage 1: 람다 계산법 (blue) -->
  <g>
    <rect x="40" y="110" width="140" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="110" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">1936</text>
    <text x="110" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">람다 계산법</text>
    <text x="110" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">알론조 처치</text>
    <text x="110" y="199" text-anchor="middle" font-size="11.5" fill="#52514e">함수형의 이론적 뿌리</text>
  </g>

  <!-- Stage 2: 절차적 (aqua) -->
  <g>
    <rect x="220" y="110" width="140" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="290" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">1957</text>
    <text x="290" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">FORTRAN</text>
    <text x="290" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">폰노이만 구조를</text>
    <text x="290" y="199" text-anchor="middle" font-size="11.5" fill="#52514e">그대로 반영한 절차적 언어</text>
  </g>

  <!-- Stage 3: 객체지향 (yellow) -->
  <g>
    <rect x="400" y="110" width="140" height="100" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="470" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">1972</text>
    <text x="470" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Smalltalk</text>
    <text x="470" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">앨런 케이</text>
    <text x="470" y="199" text-anchor="middle" font-size="11.5" fill="#52514e">객체지향의 원형 정립</text>
  </g>

  <!-- Stage 4: 함수형 대중화 (green) -->
  <g>
    <rect x="580" y="110" width="140" height="100" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <text x="650" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">1990</text>
    <text x="650" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">Haskell</text>
    <text x="650" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">순수 함수형 언어</text>
    <text x="650" y="199" text-anchor="middle" font-size="11.5" fill="#52514e">표준화 및 대중화</text>
  </g>

  <!-- Stage 5: 수렴 (violet) -->
  <g>
    <rect x="800" y="110" width="280" height="100" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <text x="940" y="140" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">2010s~현재</text>
    <text x="940" y="163" text-anchor="middle" font-size="14" font-weight="700" fill="#0b0b0b">멀티패러다임 언어</text>
    <text x="940" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">Python, Kotlin, JavaScript</text>
    <text x="940" y="199" text-anchor="middle" font-size="11.5" fill="#52514e">문제에 맞는 패러다임을 그때그때 선택</text>
  </g>
  <line x1="770" y1="160" x2="795" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
</svg>
