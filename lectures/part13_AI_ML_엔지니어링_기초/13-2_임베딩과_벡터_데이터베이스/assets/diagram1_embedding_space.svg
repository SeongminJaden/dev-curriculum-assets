<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="760" height="560" fill="#fcfcfb"/>
  <text x="380" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">임베딩 공간 개념도</text>
  <text x="380" y="56" text-anchor="middle" font-size="13" fill="#52514e">의미가 비슷한 항목일수록 벡터 공간에서 가까운 좌표에 놓입니다</text>

  <!-- axes -->
  <line x1="60" y1="480" x2="700" y2="480" stroke="#898781" stroke-width="2"/>
  <line x1="60" y1="480" x2="60" y2="90" stroke="#898781" stroke-width="2"/>
  <text x="700" y="503" text-anchor="end" font-size="12" fill="#52514e">의미 차원 1</text>
  <text x="52" y="90" text-anchor="end" font-size="12" fill="#52514e">의미 차원 2</text>

  <!-- cluster 1: 동물 (blue) -->
  <ellipse cx="185" cy="175" rx="90" ry="70" fill="#2a78d6" fill-opacity="0.08" stroke="#2a78d6" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="175" cy="150" r="6" fill="#2a78d6"/>
  <text x="187" y="145" font-size="12" fill="#0b0b0b">강아지</text>
  <circle cx="205" cy="185" r="6" fill="#2a78d6"/>
  <text x="217" y="190" font-size="12" fill="#0b0b0b">고양이</text>
  <circle cx="150" cy="205" r="6" fill="#2a78d6"/>
  <text x="105" y="225" font-size="12" fill="#0b0b0b">호랑이</text>
  <text x="185" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#2a78d6">동물</text>

  <!-- query point -->
  <circle cx="230" cy="130" r="150" fill="none" stroke="#4a3aa7" stroke-width="1.5" stroke-dasharray="3 3"/>
  <path d="M230,120 l6,10 l-12,0 z M225,132 l10,0 l-5,9 z" fill="#4a3aa7"/>
  <text x="248" y="118" font-size="12" font-weight="700" fill="#4a3aa7">쿼리 벡터 (강아지 사진)</text>
  <line x1="228" y1="127" x2="175" y2="150" stroke="#4a3aa7" stroke-width="1.5" stroke-dasharray="2 3"/>
  <line x1="228" y1="127" x2="205" y2="185" stroke="#4a3aa7" stroke-width="1.5" stroke-dasharray="2 3"/>

  <!-- cluster 2: 음식 (aqua) -->
  <ellipse cx="565" cy="175" rx="90" ry="70" fill="#1baf7a" fill-opacity="0.08" stroke="#1baf7a" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="545" cy="150" r="6" fill="#1baf7a"/>
  <text x="510" y="140" font-size="12" fill="#0b0b0b">피자</text>
  <circle cx="590" cy="165" r="6" fill="#1baf7a"/>
  <text x="602" y="160" font-size="12" fill="#0b0b0b">초밥</text>
  <circle cx="565" cy="205" r="6" fill="#1baf7a"/>
  <text x="577" y="222" font-size="12" fill="#0b0b0b">라면</text>
  <text x="565" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#1baf7a">음식</text>

  <!-- cluster 3: 교통수단 (yellow) -->
  <ellipse cx="380" cy="400" rx="100" ry="65" fill="#eda100" fill-opacity="0.10" stroke="#eda100" stroke-width="2" stroke-dasharray="4 3"/>
  <circle cx="350" cy="385" r="6" fill="#eda100"/>
  <text x="305" y="380" font-size="12" fill="#0b0b0b">자동차</text>
  <circle cx="400" cy="405" r="6" fill="#eda100"/>
  <text x="412" y="410" font-size="12" fill="#0b0b0b">자전거</text>
  <circle cx="370" cy="425" r="6" fill="#eda100"/>
  <text x="330" y="445" font-size="12" fill="#0b0b0b">비행기</text>
  <text x="380" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#eda100">교통수단</text>

  <rect x="60" y="510" width="640" height="40" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="380" y="535" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">쿼리와 가장 가까운 두 벡터(강아지, 고양이)가 검색 결과가 됩니다</text>
</svg>
