<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="260" viewBox="0 0 1120 260" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="260" fill="#fcfcfb"/>
  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">머신러닝 파이프라인 6단계</text>

  <defs>
    <marker id="arrowp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- connecting arrows -->
  <line x1="180" y1="160" x2="230" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
  <line x1="360" y1="160" x2="410" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
  <line x1="540" y1="160" x2="590" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
  <line x1="720" y1="160" x2="770" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
  <line x1="900" y1="160" x2="950" y2="160" stroke="#898781" stroke-width="2" marker-end="url(#arrowp)"/>
  <!-- feedback loop from monitoring back to data collection -->
  <path d="M 1010 210 C 1010 245, 110 245, 110 210" stroke="#898781" stroke-width="2" fill="none" stroke-dasharray="4 4" marker-end="url(#arrowp)"/>
  <text x="560" y="252" text-anchor="middle" font-size="12" fill="#52514e">모니터링에서 감지된 데이터 드리프트는 다시 데이터 수집 단계로 순환됩니다</text>

  <!-- Stage 1: 데이터 수집 (blue) -->
  <g>
    <rect x="40" y="110" width="140" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <circle cx="60" cy="128" r="12" fill="#2a78d6"/>
    <text x="60" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">1</text>
    <text x="110" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">데이터 수집</text>
    <text x="110" y="178" text-anchor="middle" font-size="12" fill="#52514e">필요한 데이터를</text>
    <text x="110" y="194" text-anchor="middle" font-size="12" fill="#52514e">모은다</text>
  </g>

  <!-- Stage 2: 전처리 (aqua) -->
  <g>
    <rect x="220" y="110" width="140" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <circle cx="240" cy="128" r="12" fill="#1baf7a"/>
    <text x="240" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">2</text>
    <text x="290" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">전처리</text>
    <text x="290" y="178" text-anchor="middle" font-size="12" fill="#52514e">정제하고 특성을</text>
    <text x="290" y="194" text-anchor="middle" font-size="12" fill="#52514e">추출한다</text>
  </g>

  <!-- Stage 3: 학습 (yellow) -->
  <g>
    <rect x="400" y="110" width="140" height="100" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <circle cx="420" cy="128" r="12" fill="#eda100"/>
    <text x="420" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">3</text>
    <text x="470" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">학습</text>
    <text x="470" y="178" text-anchor="middle" font-size="12" fill="#52514e">모델 파라미터를</text>
    <text x="470" y="194" text-anchor="middle" font-size="12" fill="#52514e">최적화한다</text>
  </g>

  <!-- Stage 4: 평가 (green) -->
  <g>
    <rect x="580" y="110" width="140" height="100" rx="10" fill="#008300" fill-opacity="0.10" stroke="#008300" stroke-width="2.5"/>
    <circle cx="600" cy="128" r="12" fill="#008300"/>
    <text x="600" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">4</text>
    <text x="650" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">평가</text>
    <text x="650" y="178" text-anchor="middle" font-size="12" fill="#52514e">성능 지표로</text>
    <text x="650" y="194" text-anchor="middle" font-size="12" fill="#52514e">검증한다</text>
  </g>

  <!-- Stage 5: 서빙 (violet) -->
  <g>
    <rect x="760" y="110" width="140" height="100" rx="10" fill="#4a3aa7" fill-opacity="0.12" stroke="#4a3aa7" stroke-width="2.5"/>
    <circle cx="780" cy="128" r="12" fill="#4a3aa7"/>
    <text x="780" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">5</text>
    <text x="830" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">서빙</text>
    <text x="830" y="178" text-anchor="middle" font-size="12" fill="#52514e">실시간 추론을</text>
    <text x="830" y="194" text-anchor="middle" font-size="12" fill="#52514e">제공한다</text>
  </g>

  <!-- Stage 6: 모니터링 (red) -->
  <g>
    <rect x="940" y="110" width="140" height="100" rx="10" fill="#e34948" fill-opacity="0.12" stroke="#e34948" stroke-width="2.5"/>
    <circle cx="960" cy="128" r="12" fill="#e34948"/>
    <text x="960" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">6</text>
    <text x="1010" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">모니터링</text>
    <text x="1010" y="178" text-anchor="middle" font-size="12" fill="#52514e">성능과 분포를</text>
    <text x="1010" y="194" text-anchor="middle" font-size="12" fill="#52514e">감시한다</text>
  </g>
</svg>
