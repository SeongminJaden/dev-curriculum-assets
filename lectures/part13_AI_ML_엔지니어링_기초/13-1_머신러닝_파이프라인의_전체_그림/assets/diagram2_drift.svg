<svg xmlns="http://www.w3.org/2000/svg" width="780" height="460" viewBox="0 0 780 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="780" height="460" fill="#fcfcfb"/>
  <text x="390" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">데이터 드리프트 — 분포가 시간에 따라 이동한다</text>

  <defs>
    <marker id="arrowd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- axes -->
  <line x1="60" y1="340" x2="720" y2="340" stroke="#898781" stroke-width="2"/>
  <line x1="60" y1="340" x2="60" y2="90" stroke="#898781" stroke-width="2"/>
  <text x="720" y="365" text-anchor="end" font-size="12" fill="#52514e">특성 값 (예: 사용자 나이, 상품 가격 등)</text>
  <text x="52" y="90" text-anchor="end" font-size="12" fill="#52514e">빈도</text>

  <!-- curve 1: training distribution (blue) -->
  <path d="M80,340 C140,340 180,130 260,130 C340,130 380,340 440,340 Z" fill="#2a78d6" fill-opacity="0.16" stroke="#2a78d6" stroke-width="2.5"/>

  <!-- curve 2: production distribution (red), shifted right -->
  <path d="M280,340 C340,340 380,155 460,155 C540,155 580,340 640,340 Z" fill="#e34948" fill-opacity="0.14" stroke="#e34948" stroke-width="2.5"/>

  <!-- shift arrow between peaks -->
  <line x1="260" y1="120" x2="450" y2="145" stroke="#0b0b0b" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#arrowd)"/>
  <text x="355" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#0b0b0b">평균 이동(드리프트)</text>

  <!-- legend -->
  <rect x="500" y="95" width="16" height="16" fill="#2a78d6" fill-opacity="0.5" stroke="#2a78d6" stroke-width="2"/>
  <text x="524" y="108" font-size="12.5" fill="#0b0b0b">학습 시점 데이터 분포</text>
  <rect x="500" y="120" width="16" height="16" fill="#e34948" fill-opacity="0.5" stroke="#e34948" stroke-width="2"/>
  <text x="524" y="133" font-size="12.5" fill="#0b0b0b">운영 시점 데이터 분포</text>

  <rect x="60" y="385" width="660" height="55" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="390" y="408" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">모니터링 단계는 이 분포 차이를 정기적으로 측정해</text>
  <text x="390" y="426" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">재학습 여부를 판단합니다</text>
</svg>
