<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480" viewBox="0 0 700 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="700" height="480" fill="#fcfcfb"/>
  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">70억(7B) 파라미터 모델의 정밀도별 메모리 사용량</text>
  <text x="350" y="56" text-anchor="middle" font-size="13" fill="#52514e">가중치만 기준, 메모리 사용량 = 파라미터 수 × 파라미터당 바이트 수</text>

  <!-- axes -->
  <line x1="90" y1="400" x2="650" y2="400" stroke="#898781" stroke-width="2"/>
  <line x1="90" y1="400" x2="90" y2="90" stroke="#898781" stroke-width="2"/>
  <text x="60" y="100" font-size="11" fill="#52514e">GB</text>

  <!-- gridlines -->
  <line x1="90" y1="330" x2="650" y2="330" stroke="#e6e5df" stroke-width="1"/>
  <line x1="90" y1="260" x2="650" y2="260" stroke="#e6e5df" stroke-width="1"/>
  <line x1="90" y1="190" x2="650" y2="190" stroke="#e6e5df" stroke-width="1"/>
  <line x1="90" y1="120" x2="650" y2="120" stroke="#e6e5df" stroke-width="1"/>
  <text x="80" y="404" text-anchor="end" font-size="11" fill="#898781">0</text>
  <text x="80" y="334" text-anchor="end" font-size="11" fill="#898781">7</text>
  <text x="80" y="264" text-anchor="end" font-size="11" fill="#898781">14</text>
  <text x="80" y="194" text-anchor="end" font-size="11" fill="#898781">21</text>
  <text x="80" y="124" text-anchor="end" font-size="11" fill="#898781">28</text>

  <!-- bars: scale 1GB = 10px, baseline 400 -->
  <!-- INT4: 3.5GB -->
  <rect x="140" y="365" width="90" height="35" fill="#cde2fb" stroke="#3987e5" stroke-width="2"/>
  <text x="185" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">3.5GB</text>
  <text x="185" y="422" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">INT4</text>
  <text x="185" y="440" text-anchor="middle" font-size="11" fill="#52514e">0.5바이트/파라미터</text>

  <!-- INT8: 7GB -->
  <rect x="270" y="330" width="90" height="70" fill="#8fbdf0" stroke="#3987e5" stroke-width="2"/>
  <text x="315" y="317" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">7GB</text>
  <text x="315" y="422" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">INT8</text>
  <text x="315" y="440" text-anchor="middle" font-size="11" fill="#52514e">1바이트/파라미터</text>

  <!-- FP16: 14GB -->
  <rect x="400" y="260" width="90" height="140" fill="#3987e5" stroke="#3987e5" stroke-width="2"/>
  <text x="445" y="247" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">14GB</text>
  <text x="445" y="422" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">FP16</text>
  <text x="445" y="440" text-anchor="middle" font-size="11" fill="#52514e">2바이트/파라미터</text>

  <!-- FP32: 28GB -->
  <rect x="530" y="120" width="90" height="280" fill="#0d366b" stroke="#0d366b" stroke-width="2"/>
  <text x="575" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">28GB</text>
  <text x="575" y="422" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">FP32</text>
  <text x="575" y="440" text-anchor="middle" font-size="11" fill="#52514e">4바이트/파라미터</text>
</svg>
