<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="760" height="480" fill="#fcfcfb"/>
  <text x="380" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">프리필과 디코드 — KV 캐시가 재계산을 막는 원리</text>

  <defs>
    <marker id="arrowk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#898781"/>
    </marker>
  </defs>

  <!-- Prefill box (blue) -->
  <g>
    <rect x="60" y="90" width="260" height="100" rx="10" fill="#2a78d6" fill-opacity="0.12" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="190" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">1. 프리필(Prefill)</text>
    <text x="190" y="145" text-anchor="middle" font-size="12" fill="#52514e">입력 프롬프트 전체의</text>
    <text x="190" y="163" text-anchor="middle" font-size="12" fill="#52514e">K, V 벡터를 한 번에 계산한다</text>
  </g>

  <!-- Decode box (aqua) -->
  <g>
    <rect x="440" y="90" width="260" height="100" rx="10" fill="#1baf7a" fill-opacity="0.12" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="570" y="122" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">2. 디코드(Decode)</text>
    <text x="570" y="145" text-anchor="middle" font-size="12" fill="#52514e">토큰을 한 개씩 생성하며</text>
    <text x="570" y="163" text-anchor="middle" font-size="12" fill="#52514e">직전까지의 K, V를 재사용한다</text>
  </g>

  <!-- self loop on decode -->
  <path d="M 700 90 C 760 60, 760 220, 700 190" stroke="#898781" stroke-width="2" fill="none" marker-end="url(#arrowk)"/>
  <text x="740" y="140" text-anchor="middle" font-size="11" fill="#52514e" transform="rotate(90 740 140)">다음 토큰마다 반복</text>

  <!-- KV cache box (yellow) -->
  <g>
    <rect x="250" y="300" width="260" height="100" rx="10" fill="#eda100" fill-opacity="0.14" stroke="#eda100" stroke-width="2.5"/>
    <text x="380" y="332" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">KV 캐시</text>
    <text x="380" y="355" text-anchor="middle" font-size="12" fill="#52514e">레이어마다 이전 토큰들의</text>
    <text x="380" y="373" text-anchor="middle" font-size="12" fill="#52514e">키·값 벡터를 저장해둔다</text>
  </g>

  <!-- arrows: prefill -> kv cache (store) -->
  <path d="M190,190 C190,250 300,270 320,300" stroke="#898781" stroke-width="2" fill="none" marker-end="url(#arrowk)"/>
  <text x="150" y="245" font-size="11" fill="#52514e">K, V 저장</text>

  <!-- arrows: kv cache -> decode (reuse) -->
  <path d="M460,300 C500,260 540,220 555,190" stroke="#898781" stroke-width="2" fill="none" marker-end="url(#arrowk)"/>
  <text x="530" y="245" font-size="11" fill="#52514e">K, V 재사용</text>

  <!-- arrows: decode -> kv cache (append new token) -->
  <path d="M585,190 C600,240 520,270 510,300" stroke="#898781" stroke-width="2" fill="none" stroke-dasharray="4 3" marker-end="url(#arrowk)"/>
  <text x="610" y="255" font-size="11" fill="#52514e">새 토큰 K, V 추가</text>

  <rect x="60" y="425" width="640" height="45" rx="10" fill="#898781" fill-opacity="0.08" stroke="#c3c2b7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="380" y="452" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0b0b0b">캐시가 없다면 토큰을 생성할 때마다 이전 전체 시퀀스를 처음부터 다시 계산해야 합니다</text>
</svg>
