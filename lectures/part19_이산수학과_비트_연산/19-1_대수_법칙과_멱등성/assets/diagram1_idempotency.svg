<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="460" viewBox="0 0 1120 460" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="460" fill="#fcfcfb"/>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a78d6"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">멱등 연산과 비멱등 연산 — 요청이 두 번 도달했을 때</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">네트워크 재시도로 같은 요청이 중복 전달되는 상황을 가정합니다</text>

  <!-- Left: idempotent (blue) -->
  <g>
    <rect x="40" y="82" width="510" height="340" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="295" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">멱등: 잔액을 100으로 설정 (PUT)</text>
    <text x="295" y="134" text-anchor="middle" font-size="12" fill="#52514e">balance = 100</text>

    <rect x="70" y="160" width="120" height="56" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
    <text x="130" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">초기 상태</text>
    <text x="130" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">500</text>

    <line x1="196" y1="188" x2="248" y2="188" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="222" y="176" text-anchor="middle" font-size="11" fill="#2a78d6">1회</text>

    <rect x="254" y="160" width="120" height="56" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
    <text x="314" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">1회 실행 후</text>
    <text x="314" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">100</text>

    <line x1="380" y1="188" x2="432" y2="188" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="406" y="176" text-anchor="middle" font-size="11" fill="#2a78d6">재시도</text>

    <rect x="438" y="160" width="82" height="56" rx="10" fill="#2a78d6" fill-opacity="0.22" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="479" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">2회 실행 후</text>
    <text x="479" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">100</text>

    <text x="70" y="256" font-size="12.5" font-weight="700" fill="#0b0b0b">f(f(x)) = f(x)  —  상태가 고정점에 도달</text>
    <line x1="70" y1="270" x2="520" y2="270" stroke="#2a78d6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="70" y="294" font-size="11.5" fill="#52514e">첫 실행이 상태를 100으로 옮긴 뒤, 그 이후의 실행은</text>
    <text x="70" y="310" font-size="11.5" fill="#52514e">상태를 더 이상 움직이지 못합니다. 100은 이 연산의</text>
    <text x="70" y="326" font-size="11.5" fill="#52514e">고정점(fixed point)이기 때문입니다.</text>
    <text x="70" y="356" font-size="12.5" font-weight="700" fill="#2a78d6">→ 응답을 못 받았을 때 그냥 다시 보내도 안전합니다</text>
    <text x="70" y="384" font-size="11.5" fill="#52514e">같은 부류: set(k,v) · max(a,x) · abs(x) · sort(list)</text>
    <text x="70" y="400" font-size="11.5" fill="#52514e">A ∪ A = A · DROP TABLE IF EXISTS</text>
  </g>

  <!-- Right: non-idempotent (red) -->
  <g>
    <rect x="570" y="82" width="510" height="340" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
    <text x="825" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#0b0b0b">비멱등: 잔액에서 100 차감 (POST)</text>
    <text x="825" y="134" text-anchor="middle" font-size="12" fill="#52514e">balance -= 100</text>

    <rect x="600" y="160" width="120" height="56" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="660" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">초기 상태</text>
    <text x="660" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">500</text>

    <line x1="726" y1="188" x2="778" y2="188" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <text x="752" y="176" text-anchor="middle" font-size="11" fill="#dc2626">1회</text>

    <rect x="784" y="160" width="120" height="56" rx="10" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="844" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">1회 실행 후</text>
    <text x="844" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">400</text>

    <line x1="910" y1="188" x2="962" y2="188" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <text x="936" y="176" text-anchor="middle" font-size="11" fill="#dc2626">재시도</text>

    <rect x="968" y="160" width="82" height="56" rx="10" fill="#dc2626" fill-opacity="0.22" stroke="#dc2626" stroke-width="2.5"/>
    <text x="1009" y="184" text-anchor="middle" font-size="11.5" fill="#52514e">2회 실행 후</text>
    <text x="1009" y="203" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">300</text>

    <text x="600" y="256" font-size="12.5" font-weight="700" fill="#0b0b0b">f(f(x)) ≠ f(x)  —  고정점이 없음</text>
    <line x1="600" y1="270" x2="1050" y2="270" stroke="#dc2626" stroke-opacity="0.3" stroke-width="1"/>
    <text x="600" y="294" font-size="11.5" fill="#52514e">실행할 때마다 상태가 계속 이동하므로, 중복 실행은</text>
    <text x="600" y="310" font-size="11.5" fill="#52514e">그대로 데이터 손상이 됩니다. 응답이 유실된 것인지</text>
    <text x="600" y="326" font-size="11.5" fill="#52514e">요청이 도달 못한 것인지 구별할 수 없어 더 위험합니다.</text>
    <text x="600" y="356" font-size="12.5" font-weight="700" fill="#dc2626">→ 멱등성 키(Idempotency-Key)로 감싸야 안전합니다</text>
    <text x="600" y="384" font-size="11.5" fill="#52514e">같은 부류: counter += 1 · list.append(x)</text>
    <text x="600" y="400" font-size="11.5" fill="#52514e">DROP TABLE t · POST /orders</text>
  </g>
</svg>
