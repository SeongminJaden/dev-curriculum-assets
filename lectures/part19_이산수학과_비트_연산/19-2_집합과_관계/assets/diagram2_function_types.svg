<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="480" viewBox="0 0 1120 480" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1120" height="480" fill="#fcfcfb"/>
  <defs>
    <marker id="mB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a78d6"/>
    </marker>
    <marker id="mG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1baf7a"/>
    </marker>
    <marker id="mP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6"/>
    </marker>
    <marker id="mR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <text x="560" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0b0b0b">단사·전사·전단사 — 화살표 패턴으로 구분하기</text>
  <text x="560" y="56" text-anchor="middle" font-size="13" fill="#52514e">왼쪽이 정의역, 오른쪽이 공역입니다</text>

  <!-- 1. Injective (blue) -->
  <g>
    <rect x="24" y="78" width="256" height="380" rx="10" fill="#2a78d6" fill-opacity="0.10" stroke="#2a78d6" stroke-width="2.5"/>
    <text x="152" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">단사 (injective)</text>
    <text x="152" y="126" text-anchor="middle" font-size="11.5" fill="#52514e">도착점이 겹치지 않음</text>

    <circle cx="80" cy="164" r="13" fill="#2a78d6"/><text x="80" y="169" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <circle cx="80" cy="216" r="13" fill="#2a78d6"/><text x="80" y="221" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <circle cx="80" cy="268" r="13" fill="#2a78d6"/><text x="80" y="273" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>

    <circle cx="224" cy="152" r="13" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="224" y="157" text-anchor="middle" font-size="12" fill="#0b0b0b">a</text>
    <circle cx="224" cy="196" r="13" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="224" y="201" text-anchor="middle" font-size="12" fill="#0b0b0b">b</text>
    <circle cx="224" cy="240" r="13" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/><text x="224" y="245" text-anchor="middle" font-size="12" fill="#0b0b0b">c</text>
    <circle cx="224" cy="284" r="13" fill="#ffffff" stroke="#2a78d6" stroke-width="2" stroke-dasharray="3 3"/><text x="224" y="289" text-anchor="middle" font-size="12" fill="#52514e">d</text>

    <line x1="96" y1="162" x2="205" y2="153" stroke="#2a78d6" stroke-width="2" marker-end="url(#mB)"/>
    <line x1="96" y1="213" x2="205" y2="198" stroke="#2a78d6" stroke-width="2" marker-end="url(#mB)"/>
    <line x1="96" y1="266" x2="205" y2="243" stroke="#2a78d6" stroke-width="2" marker-end="url(#mB)"/>

    <line x1="52" y1="312" x2="252" y2="312" stroke="#2a78d6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="52" y="336" font-size="12" font-weight="700" fill="#0b0b0b">f(x₁)=f(x₂) ⟹ x₁=x₂</text>
    <text x="52" y="362" font-size="11.5" fill="#52514e">서로 다른 입력이 절대 같은</text>
    <text x="52" y="378" font-size="11.5" fill="#52514e">출력으로 가지 않습니다.</text>
    <text x="52" y="400" font-size="11.5" fill="#52514e">d처럼 받지 못한 원소가 있어도</text>
    <text x="52" y="416" font-size="11.5" fill="#52514e">단사에는 문제가 없습니다.</text>
    <text x="52" y="442" font-size="11.5" font-weight="700" fill="#2a78d6">사례: UNIQUE 제약, 완전 해시</text>
  </g>

  <!-- 2. Surjective (green) -->
  <g>
    <rect x="292" y="78" width="256" height="380" rx="10" fill="#1baf7a" fill-opacity="0.10" stroke="#1baf7a" stroke-width="2.5"/>
    <text x="420" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">전사 (surjective)</text>
    <text x="420" y="126" text-anchor="middle" font-size="11.5" fill="#52514e">빈 도착점이 없음</text>

    <circle cx="348" cy="152" r="13" fill="#1baf7a"/><text x="348" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <circle cx="348" cy="196" r="13" fill="#1baf7a"/><text x="348" y="201" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <circle cx="348" cy="240" r="13" fill="#1baf7a"/><text x="348" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
    <circle cx="348" cy="284" r="13" fill="#1baf7a"/><text x="348" y="289" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>

    <circle cx="492" cy="174" r="13" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="492" y="179" text-anchor="middle" font-size="12" fill="#0b0b0b">a</text>
    <circle cx="492" cy="222" r="13" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="492" y="227" text-anchor="middle" font-size="12" fill="#0b0b0b">b</text>
    <circle cx="492" cy="270" r="13" fill="#ffffff" stroke="#1baf7a" stroke-width="2"/><text x="492" y="275" text-anchor="middle" font-size="12" fill="#0b0b0b">c</text>

    <line x1="364" y1="155" x2="473" y2="172" stroke="#1baf7a" stroke-width="2" marker-end="url(#mG)"/>
    <line x1="364" y1="196" x2="473" y2="177" stroke="#1baf7a" stroke-width="2" marker-end="url(#mG)"/>
    <line x1="364" y1="241" x2="473" y2="224" stroke="#1baf7a" stroke-width="2" marker-end="url(#mG)"/>
    <line x1="364" y1="284" x2="473" y2="272" stroke="#1baf7a" stroke-width="2" marker-end="url(#mG)"/>

    <line x1="320" y1="312" x2="520" y2="312" stroke="#1baf7a" stroke-opacity="0.3" stroke-width="1"/>
    <text x="320" y="336" font-size="12" font-weight="700" fill="#0b0b0b">∀y ∃x : f(x) = y</text>
    <text x="320" y="362" font-size="11.5" fill="#52514e">공역의 모든 원소가 최소</text>
    <text x="320" y="378" font-size="11.5" fill="#52514e">하나의 화살표를 받습니다.</text>
    <text x="320" y="400" font-size="11.5" fill="#52514e">1과 2가 모두 a로 가므로</text>
    <text x="320" y="416" font-size="11.5" fill="#52514e">단사는 아닙니다.</text>
    <text x="320" y="442" font-size="11.5" font-weight="700" fill="#1baf7a">사례: 모든 버킷이 채워진 분배</text>
  </g>

  <!-- 3. Bijective (purple) -->
  <g>
    <rect x="560" y="78" width="256" height="380" rx="10" fill="#8b5cf6" fill-opacity="0.10" stroke="#8b5cf6" stroke-width="2.5"/>
    <text x="688" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">전단사 (bijective)</text>
    <text x="688" y="126" text-anchor="middle" font-size="11.5" fill="#52514e">완벽한 일대일 대응</text>

    <circle cx="616" cy="168" r="13" fill="#8b5cf6"/><text x="616" y="173" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <circle cx="616" cy="220" r="13" fill="#8b5cf6"/><text x="616" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <circle cx="616" cy="272" r="13" fill="#8b5cf6"/><text x="616" y="277" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>

    <circle cx="760" cy="168" r="13" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="760" y="173" text-anchor="middle" font-size="12" fill="#0b0b0b">a</text>
    <circle cx="760" cy="220" r="13" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="760" y="225" text-anchor="middle" font-size="12" fill="#0b0b0b">b</text>
    <circle cx="760" cy="272" r="13" fill="#ffffff" stroke="#8b5cf6" stroke-width="2"/><text x="760" y="277" text-anchor="middle" font-size="12" fill="#0b0b0b">c</text>

    <line x1="632" y1="168" x2="741" y2="168" stroke="#8b5cf6" stroke-width="2" marker-end="url(#mP)"/>
    <line x1="632" y1="220" x2="741" y2="220" stroke="#8b5cf6" stroke-width="2" marker-end="url(#mP)"/>
    <line x1="632" y1="272" x2="741" y2="272" stroke="#8b5cf6" stroke-width="2" marker-end="url(#mP)"/>

    <line x1="588" y1="312" x2="788" y2="312" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1"/>
    <text x="588" y="336" font-size="12" font-weight="700" fill="#0b0b0b">단사 + 전사 ⟹ 역함수 존재</text>
    <text x="588" y="362" font-size="11.5" fill="#52514e">겹침도 없고 빈 도착점도</text>
    <text x="588" y="378" font-size="11.5" fill="#52514e">없어 화살표를 그대로</text>
    <text x="588" y="394" font-size="11.5" fill="#52514e">되돌릴 수 있습니다.</text>
    <text x="588" y="420" font-size="11.5" font-weight="700" fill="#8b5cf6">사례: Base64, 대칭키 암호화,</text>
    <text x="588" y="440" font-size="11.5" font-weight="700" fill="#8b5cf6">롤백 가능한 마이그레이션</text>
  </g>

  <!-- 4. Neither (red) -->
  <g>
    <rect x="828" y="78" width="266" height="380" rx="10" fill="#dc2626" fill-opacity="0.10" stroke="#dc2626" stroke-width="2.5"/>
    <text x="961" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#0b0b0b">어느 것도 아님</text>
    <text x="961" y="126" text-anchor="middle" font-size="11.5" fill="#52514e">일반적인 해시 함수</text>

    <circle cx="884" cy="152" r="13" fill="#dc2626"/><text x="884" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">1</text>
    <circle cx="884" cy="196" r="13" fill="#dc2626"/><text x="884" y="201" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">2</text>
    <circle cx="884" cy="240" r="13" fill="#dc2626"/><text x="884" y="245" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">3</text>
    <circle cx="884" cy="284" r="13" fill="#dc2626"/><text x="884" y="289" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">4</text>

    <circle cx="1038" cy="174" r="13" fill="#ffffff" stroke="#dc2626" stroke-width="2"/><text x="1038" y="179" text-anchor="middle" font-size="12" fill="#0b0b0b">a</text>
    <circle cx="1038" cy="222" r="13" fill="#ffffff" stroke="#dc2626" stroke-width="2"/><text x="1038" y="227" text-anchor="middle" font-size="12" fill="#0b0b0b">b</text>
    <circle cx="1038" cy="270" r="13" fill="#ffffff" stroke="#dc2626" stroke-width="2" stroke-dasharray="3 3"/><text x="1038" y="275" text-anchor="middle" font-size="12" fill="#52514e">c</text>

    <line x1="900" y1="155" x2="1019" y2="172" stroke="#dc2626" stroke-width="2" marker-end="url(#mR)"/>
    <line x1="900" y1="196" x2="1019" y2="177" stroke="#dc2626" stroke-width="2" marker-end="url(#mR)"/>
    <line x1="900" y1="241" x2="1019" y2="220" stroke="#dc2626" stroke-width="2" marker-end="url(#mR)"/>
    <line x1="900" y1="283" x2="1019" y2="226" stroke="#dc2626" stroke-width="2" marker-end="url(#mR)"/>

    <line x1="856" y1="312" x2="1066" y2="312" stroke="#dc2626" stroke-opacity="0.3" stroke-width="1"/>
    <text x="856" y="336" font-size="12" font-weight="700" fill="#0b0b0b">충돌 있음 + 빈 도착점 있음</text>
    <text x="856" y="362" font-size="11.5" fill="#52514e">입력이 출력보다 많으면</text>
    <text x="856" y="378" font-size="11.5" fill="#52514e">비둘기집 원리에 의해 충돌은</text>
    <text x="856" y="394" font-size="11.5" fill="#52514e">수학적으로 불가피합니다.</text>
    <text x="856" y="420" font-size="11.5" font-weight="700" fill="#dc2626">암호학적 해시가 보장하는 건</text>
    <text x="856" y="440" font-size="11.5" font-weight="700" fill="#dc2626">충돌을 '찾기 어렵다'입니다</text>
  </g>
</svg>
